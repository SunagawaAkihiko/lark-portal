/**
 * レコードをカード形式のDOM要素として生成する
 * mode: 'edit' | 'delete'
 */
function buildRecCard(r, mode) {
  const card = document.createElement('div');
  card.className = 'rec-card';

  // 提供時間の表示（startTime/endTimeがあれば範囲表示、なければ保存値を逆算）
  let timeRange = r.提供時間 || '';
  const upperLimit = durationMap[r.サービス略称] || null;
  if (r.startTime && r.endTime) {
    timeRange = `${r.startTime}〜${r.endTime}`;
  } else if (upperLimit && r.提供時間) {
    const endMins   = timeToMinutes(r.提供時間) + 4;
    const startMins = endMins - upperLimit + 1;
    timeRange = `${minsToTimeStr(((startMins + 1440) % 1440))}〜${minsToTimeStr(endMins % 1440)}`;
  }

  card.innerHTML = `
    <div class="rec-card-header">
      <span class="rec-card-task">${r.作業項目 || '─'}</span>
      <span style="color:var(--text-muted);font-size:0.8rem;">${r.サービス略称 || ''}</span>
    </div>
    <div class="rec-card-meta">
      <span class="rec-card-badge"><i class="fa-solid fa-clock" style="opacity:0.6"></i> ${timeRange}</span>
      <span class="rec-card-badge">${r.提供曜日 || ''}</span>
      ${r.勤務区分 ? `<span class="rec-card-badge">${r.勤務区分}</span>` : ''}
    </div>
  `;

  card.onclick = () => {
    document.querySelectorAll('.rec-card.selected').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
    selectedRecord = r;
    if (mode === 'edit') populateEditForm(r);
    else showDeleteConfirm(r);
  };
  return card;
}

/**
 * 選択したレコードの値を変更フォームに流し込む
 */
function populateEditForm(r) {
  document.getElementById('edit-task').value    = r.作業項目    || '';
  document.getElementById('edit-service').value = r.サービス略称 || '';
  document.getElementById('edit-day').value     = r.提供曜日    || '';
  document.getElementById('edit-kinmu').value   = r.勤務区分    || '';

  // 開始日・終了日（Larkはエポックミリ秒で格納されている場合がある）
  const toDateStr = v => {
    if (!v) return '';
    if (typeof v === 'number') return new Date(v).toISOString().slice(0, 10);
    return v;
  };
  document.getElementById('edit-start').value = toDateStr(r.開始日);
  document.getElementById('edit-end').value   = toDateStr(r.終了日);

  // 提供時間の選択肢を更新してから現在値を選択する
  updateEditTimeOptions(r.提供時間);

  document.getElementById('edit-form-area').style.display = '';
}

/**
 * 変更フォームの提供時間ドロップダウンを更新し、currentVal を初期選択する
 */
function updateEditTimeOptions(currentVal) {
  const task    = document.getElementById('edit-task').value;
  const service = document.getElementById('edit-service').value;
  const timeEl  = document.getElementById('edit-time');
  timeEl.innerHTML = '<option value="">-- 選択してください --</option>';

  const taskDef = TASK_WINDOWS[task];
  if (!taskDef) { timeEl.options[0].text = '作業項目を先に選択してください'; return; }

  const upperLimit = durationMap[service] || null;
  const duration   = upperLimit ? upperLimit - 1 : null;

  for (const win of taskDef.windows) {
    for (let startMins = win.start; startMins < win.end; startMins += 5) {
      if (duration !== null && startMins + duration > win.end) continue;
      const normalStart = startMins % 1440;
      const normalEnd   = (startMins + (duration ?? 0)) % 1440;
      const displayText = duration !== null
        ? `${minsToTimeStr(normalStart)}〜${minsToTimeStr(normalEnd)}`
        : minsToTimeStr(normalStart);
      const storedMins = duration !== null
        ? ((startMins + duration - 4 + 1440) % 1440)
        : startMins % 1440;
      timeEl.appendChild(new Option(displayText, minsToTimeStr(storedMins)));
    }
  }

  // 現在登録されている提供時間を選択する（選択肢にあれば）
  if (currentVal && [...timeEl.options].some(o => o.value === currentVal)) {
    timeEl.value = currentVal;
  }
}

function onEditFormChange() {
  const currentVal = document.getElementById('edit-time').value;
  updateEditTimeOptions(currentVal);
}

/**
 * 変更フォームの内容をAPIに送信する
 */
async function submitEdit() {
  if (!selectedRecord?.recordId) return showToast('変更するレコードが選択されていません', 'error');

  const btn = document.getElementById('edit-save-btn');
  btn.disabled = true;
  btn.innerHTML = '<div class="loading-spinner" style="width:16px;height:16px;border-width:2px"></div> 保存中...';

  try {
    const body = {
      作業項目:    document.getElementById('edit-task').value,
      サービス略称: document.getElementById('edit-service').value,
      提供曜日:    document.getElementById('edit-day').value,
      提供時間:    document.getElementById('edit-time').value,
      勤務区分:    document.getElementById('edit-kinmu').value,
      開始日:      document.getElementById('edit-start').value || null,
      終了日:      document.getElementById('edit-end').value   || null,
    };

    const res = await fetch(`${SERVER}/api/service-schedule/${selectedRecord.recordId}`, {
      method:  'PUT',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(body),
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);

    showToast('変更を保存しました', 'success');
    selectedRecord = null;
    document.getElementById('edit-form-area').style.display = 'none';
    await loadSchedule();
    // 時間割リロード後にリストを再描画する
    loadEditRecords();
  } catch (err) {
    showToast(`保存失敗: ${err.message}`, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> 変更を保存する';
  }
}

/**
 * 選択したレコードの削除確認エリアを表示する
 */
function showDeleteConfirm(r) {
  const upperLimit = durationMap[r.サービス略称] || null;
  let timeRange = r.提供時間 || '';
  if (r.startTime && r.endTime) {
    timeRange = `${r.startTime}〜${r.endTime}`;
  } else if (upperLimit && r.提供時間) {
    const endMins   = timeToMinutes(r.提供時間) + 4;
    const startMins = endMins - upperLimit + 1;
    timeRange = `${minsToTimeStr(((startMins + 1440) % 1440))}〜${minsToTimeStr(endMins % 1440)}`;
  }

  document.getElementById('del-confirm-msg').innerHTML = `
    以下のレコードを削除します。この操作は取り消せません。<br><br>
    <strong>${r.氏名}</strong>｜${r.作業項目 || '─'}｜${r.サービス略称 || '─'}<br>
    ${r.提供曜日}　${timeRange}　${r.勤務区分 || ''}
  `;
  document.getElementById('del-confirm-area').style.display = '';
}

/**
 * 選択したレコードを削除する
 */
async function submitDelete() {
  if (!selectedRecord?.recordId) return showToast('削除するレコードが選択されていません', 'error');

  const btn = document.getElementById('del-confirm-btn');
  btn.disabled = true;
  btn.innerHTML = '<div class="loading-spinner" style="width:16px;height:16px;border-width:2px"></div> 削除中...';

  try {
    const res = await fetch(`${SERVER}/api/service-schedule/${selectedRecord.recordId}`, {
      method: 'DELETE',
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);

    showToast('削除しました', 'success');
    selectedRecord = null;
    document.getElementById('del-confirm-area').style.display = 'none';
    await loadSchedule();
    loadDeleteRecords();
  } catch (err) {
    showToast(`削除失敗: ${err.message}`, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-trash-can"></i> この1件を削除する';
  }
}
