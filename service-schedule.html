<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>顧客別作業設定</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    /* ===== CSS変数（lark-portal統一デザイン） ===== */
    :root {
      --bg-color:      #fdf6ec;
      --text-color:    #4a3f35;
      --text-muted:    #8c7c6b;
      --primary-color: #e76f51;
      --primary-light: #fcece8;
      --card-bg:       #fff0e3;
      --border-color:  #dcbfa6;
      --admin-dark:    #4a3f35;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Zen Kaku Gothic New', sans-serif;
      background: var(--bg-color);
      color: var(--text-color);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* ===== ページヘッダー ===== */
    .page-header {
      position: sticky; top: 0; z-index: 100;
      background: var(--admin-dark);
      color: white;
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.9rem 1rem;
      box-shadow: 0 2px 6px rgba(0,0,0,0.25);
    }
    .page-header h1 { font-size: 1.05rem; font-weight: 700; }
    .header-badge {
      margin-left: auto;
      background: var(--primary-color);
      color: white;
      font-size: 0.7rem;
      padding: 0.2rem 0.55rem;
      border-radius: 20px;
      font-weight: 700;
    }

    /* ===== 事業所タブ ===== */
    .office-tabs {
      display: flex;
      background: var(--admin-dark);
      padding: 0 1rem 0.75rem;
      gap: 0.5rem;
    }
    .tab-btn {
      flex: 1;
      padding: 0.55rem 0;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.6);
    }
    .tab-btn.active {
      background: var(--primary-color);
      color: white;
    }

    /* ===== メインレイアウト（PC: 左右2分割、SP: 縦積み） ===== */
    .main-layout {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 1rem;
      padding: 1rem;
      align-items: start;
    }
    @media (max-width: 900px) {
      .main-layout { grid-template-columns: 1fr; }
    }

    /* ===== 時間割カード ===== */
    .timetable-card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    .timetable-card-header {
      background: var(--card-bg);
      padding: 0.75rem 1rem;
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--text-color);
      border-bottom: 1px solid var(--border-color);
      display: flex; align-items: center; gap: 0.5rem;
    }
    .timetable-wrap {
      overflow-y: auto;
      max-height: calc(100vh - 220px);
    }

    /* ===== 一覧テーブル（シンプル行形式）===== */
    .timetable {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }
    .timetable thead th {
      position: sticky; top: 0; z-index: 10;
      background: var(--admin-dark);
      color: white;
      padding: 0.5rem 0.75rem;
      text-align: left;
      font-weight: 700;
      font-size: 0.8rem;
      border-bottom: 2px solid rgba(255,255,255,0.15);
    }
    .timetable tbody tr {
      border-bottom: 1px solid var(--border-color);
      transition: background 0.15s;
    }
    .timetable tbody tr:hover { background: #fdf0e8; }
    /* 衝突行（フォーム入力中の時間帯と重複）を赤ハイライト */
    .timetable tbody tr.row-conflict td { background: #fff1f1 !important; }
    /* フォームで選択中の時間帯と一致する行を黄ハイライト */
    .timetable tbody tr.row-selected td { background: #fffbe6 !important; }
    .timetable td {
      padding: 0.5rem 0.75rem;
      vertical-align: middle;
    }

    /* 時間帯列 */
    .td-time {
      white-space: nowrap;
      font-weight: 700;
      font-size: 0.8rem;
      color: var(--text-color);
      width: 90px;
    }
    .td-time .time-range { font-size: 0.72rem; color: var(--text-muted); font-weight: 500; }

    /* 氏名・サービス列 */
    .td-name { font-weight: 700; color: #1e293b; }
    .td-service { font-size: 0.75rem; color: var(--text-muted); margin-top: 1px; }

    /* 作業項目バッジ */
    .task-badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 700;
      background: var(--badge-bg, #f1f5f9);
      color: var(--badge-color, #64748b);
      white-space: nowrap;
    }

    /* 曜日バッジ群 */
    .day-badges { display: flex; gap: 3px; flex-wrap: nowrap; }
    .day-badge {
      width: 22px; height: 22px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.68rem;
      font-weight: 700;
      /* 未選択（その曜日に登録なし）はグレー */
      background: #e9e3dc;
      color: #b0a090;
    }
    /* 登録がある曜日は作業項目の色で塗りつぶす */
    .day-badge.active {
      background: var(--entry-accent, #64748b);
      color: white;
    }

    /* ===== 上津役家：勤務区分セクションヘッダー ===== */
    .kinmu-section-header {
      background: var(--admin-dark);
      color: white;
      padding: 0.45rem 0.75rem;
      font-size: 0.82rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.6rem;
    }
    .kinmu-section-header:first-child { margin-top: 0; }

    /* ===== 空き時間帯行 ===== */
    .timetable tbody tr.row-gap td {
      background: #f5f0eb;
      color: var(--text-muted);
      font-size: 0.78rem;
      padding: 0.3rem 0.75rem;
      border-bottom: 1px dashed var(--border-color);
    }
    .gap-label {
      display: flex; align-items: center; gap: 0.4rem;
      color: #b0a090;
    }
    .gap-label .gap-duration {
      font-size: 0.72rem;
      background: #e9e3dc;
      border-radius: 10px;
      padding: 0.1rem 0.45rem;
    }

    /* ===== 空・ローディング状態 ===== */
    .timetable-empty {
      padding: 2rem;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    .loading-spinner {
      display: inline-block;
      width: 22px; height: 22px;
      border: 3px solid var(--border-color);
      border-top-color: var(--primary-color);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== 登録フォームカード ===== */
    .form-card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      overflow: hidden;
      position: sticky;
      top: 100px;
    }
    .form-card-header {
      background: var(--primary-color);
      padding: 0.75rem 1rem;
      font-weight: 700;
      font-size: 0.9rem;
      color: white;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .form-body { padding: 0.9rem 1rem 1rem; }

    /* ===== フォーム部品 ===== */
    .field-group { margin-bottom: 0.85rem; }
    .field-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-muted);
      margin-bottom: 0.3rem;
    }
    .field-label .req { color: var(--primary-color); margin-left: 2px; }
    .form-select, .form-input {
      width: 100%;
      padding: 0.5rem 0.7rem;
      border: 1.5px solid var(--border-color);
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.88rem;
      color: var(--text-color);
      background: white;
      appearance: none;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-select:focus, .form-input:focus {
      border-color: var(--primary-color);
    }

    /* ===== 曜日チェックボックス ===== */
    .day-checkboxes {
      display: flex; flex-wrap: wrap; gap: 0.4rem;
    }
    .day-check-label {
      display: flex; align-items: center; gap: 0.2rem;
      cursor: pointer;
      font-size: 0.82rem;
    }
    .day-check-label input { accent-color: var(--primary-color); width: 15px; height: 15px; }

    /* ===== 勤務区分ラジオ ===== */
    .radio-group { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .radio-label {
      display: flex; align-items: center; gap: 0.25rem;
      cursor: pointer;
      font-size: 0.82rem;
    }
    .radio-label input { accent-color: var(--primary-color); }

    /* ===== 日付行 ===== */
    .date-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }

    /* ===== 衝突警告バナー ===== */
    .conflict-banner {
      display: none;
      margin-bottom: 0.75rem;
      background: #fff1f1;
      border: 1.5px solid #f87171;
      border-radius: 8px;
      padding: 0.5rem 0.75rem;
      font-size: 0.8rem;
      color: #b91c1c;
      font-weight: 600;
    }
    .conflict-banner.visible { display: block; }

    /* ===== 送信ボタン ===== */
    .submit-btn {
      width: 100%;
      padding: 0.75rem;
      background: var(--primary-color);
      color: white;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
    }
    .submit-btn:hover:not(:disabled) { background: #d05a3c; }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ===== トースト通知 ===== */
    .toast {
      position: fixed;
      bottom: 1.5rem; right: 1.5rem;
      background: #1e293b;
      color: white;
      padding: 0.75rem 1.2rem;
      border-radius: 10px;
      font-size: 0.88rem;
      font-weight: 600;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      transform: translateY(80px);
      opacity: 0;
      transition: transform 0.3s, opacity 0.3s;
      z-index: 999;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { background: #0e8a6e; }
    .toast.error   { background: #dc2626; }
  </style>
</head>
<body>

<!-- ===== ページヘッダー ===== -->
<header class="page-header">
  <i class="fa-solid fa-calendar-check"></i>
  <h1>顧客別作業設定</h1>
  <span class="header-badge"><i class="fa-solid fa-lock"></i> 管理者専用</span>
</header>

<!-- ===== 事業所タブ ===== -->
<nav class="office-tabs">
  <button class="tab-btn active" data-office="大浦家" onclick="switchOffice(this)">
    <i class="fa-solid fa-house"></i> 大浦家
  </button>
  <button class="tab-btn" data-office="上津役家" onclick="switchOffice(this)">
    <i class="fa-solid fa-house-chimney"></i> 上津役家
  </button>
</nav>

<!-- ===== メインレイアウト ===== -->
<div class="main-layout">

  <!-- ─── 左：時間割 ─── -->
  <section class="timetable-card">
    <div class="timetable-card-header">
      <i class="fa-solid fa-table-cells"></i>
      <span id="timetable-title">大浦家 時間割</span>
      <button onclick="loadSchedule()" style="margin-left:auto;background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:0.85rem;" title="再読込">
        <i class="fa-solid fa-rotate-right"></i>
      </button>
    </div>
    <div class="timetable-wrap" id="timetable-wrap">
      <div class="timetable-empty">
        <div class="loading-spinner"></div>
        <p style="margin-top:0.75rem">読み込み中...</p>
      </div>
    </div>
  </section>

  <!-- ─── 右：登録フォーム ─── -->
  <section class="form-card">
    <div class="form-card-header">
      <i class="fa-solid fa-plus-circle"></i>
      新規サービス登録
    </div>
    <div class="form-body">

      <!-- 時間帯重複警告（赤） -->
      <div class="conflict-banner" id="conflict-banner">
        <i class="fa-solid fa-triangle-exclamation"></i>
        <span id="conflict-msg"></span>
      </div>

      <!-- 2時間未満ギャップ警告（オレンジ） -->
      <div class="conflict-banner" id="gap-banner" style="background:#fff7ed;border-color:#fb923c;color:#c2410c;">
        <i class="fa-solid fa-clock"></i>
        <span id="gap-msg"></span>
      </div>

      <!-- 氏名 -->
      <div class="field-group">
        <label class="field-label">氏名<span class="req">*</span></label>
        <select class="form-select" id="f-name">
          <option value="">-- 選択してください --</option>
        </select>
      </div>

      <!-- 作業項目 -->
      <div class="field-group">
        <label class="field-label">作業項目</label>
        <select class="form-select" id="f-task">
          <option value="">-- 選択してください --</option>
        </select>
      </div>

      <!-- サービス略称（検索可能） -->
      <div class="field-group">
        <label class="field-label">サービス略称</label>
        <input class="form-input" id="f-service" list="service-list" placeholder="入力して絞り込み...">
        <datalist id="service-list"></datalist>
      </div>

      <!-- 提供曜日（複数選択） -->
      <div class="field-group">
        <label class="field-label">提供曜日<span class="req">*</span></label>
        <div class="day-checkboxes" id="day-checkboxes"></div>
      </div>

      <!-- 提供時間 -->
      <div class="field-group">
        <label class="field-label">提供時間<span class="req">*</span></label>
        <select class="form-select" id="f-time">
          <option value="">-- 選択してください --</option>
        </select>
      </div>

      <!-- 勤務区分 -->
      <div class="field-group">
        <label class="field-label">勤務区分</label>
        <div class="radio-group" id="kinmu-radios"></div>
      </div>

      <!-- 記録内容 -->
      <div class="field-group">
        <label class="field-label">記録内容テンプレート</label>
        <select class="form-select" id="f-record">
          <option value="">-- 選択しない --</option>
        </select>
      </div>

      <!-- 開始日・終了日 -->
      <div class="field-group">
        <label class="field-label">適用期間（任意）</label>
        <div class="date-row">
          <input type="date" class="form-input" id="f-start" placeholder="開始日">
          <input type="date" class="form-input" id="f-end" placeholder="終了日">
        </div>
      </div>

      <!-- 登録ボタン -->
      <button class="submit-btn" id="submit-btn" onclick="submitForm()">
        <i class="fa-solid fa-floppy-disk"></i>
        登録する
      </button>
    </div>
  </section>

</div><!-- /.main-layout -->

<!-- ===== トースト通知 ===== -->
<div class="toast" id="toast"></div>

<script>
// ============================================================
// 定数・グローバル変数
// ============================================================

/** APIサーバーのベースURL（本番はRenderにデプロイされたattendance-app） */
const SERVER = (location.hostname === 'localhost' || location.hostname === '')
  ? 'http://localhost:3000'
  : 'https://attendance-app-irf1.onrender.com';

/** 現在表示中の事業所 */
let currentOffice = '大浦家';

/** 現在取得済みの作業設定レコード（時間割描画・衝突検出に使用） */
let currentRecords = [];

/** フィールド選択肢データ（初回ロード時に取得してキャッシュ） */
let fieldsCache = null;

/** サービス略称 → 時間上限（分）のマップ（サーバーから受信） */
let durationMap = {};

/** 作業項目ごとの色定義 */
const TASK_COLORS = {
  'モーニングケア': { bg: '#fef3c7', accent: '#d97706' },
  'イブニングケア': { bg: '#ede9fe', accent: '#7c3aed' },
  '排泄介助':       { bg: '#d1fae5', accent: '#059669' },
  '入浴介助':       { bg: '#dbeafe', accent: '#2563eb' },
  '排泄介助②':     { bg: '#cffafe', accent: '#0891b2' },
};
const DEFAULT_COLOR = { bg: '#f1f5f9', accent: '#64748b' };

/** 提供曜日の表示順序と列ヘッダー定義 */
const DAY_ORDER = ['月曜', '火曜', '水曜', '木曜', '金曜', '土曜', '日曜'];
const DAY_LABELS = { '月曜': '月', '火曜': '火', '水曜': '水', '木曜': '木', '金曜': '金', '土曜': '土', '日曜': '日' };

// ============================================================
// 初期化
// ============================================================
document.addEventListener('DOMContentLoaded', async () => {
  await loadFields();
  await loadSchedule();
});

/**
 * フィールド選択肢をAPIから取得してフォームを初期化する。
 * サービス略称（524件）はdatalistに展開する。
 */
async function loadFields() {
  try {
    const res = await fetch(`${SERVER}/api/service-schedule/fields`);
    fieldsCache = await res.json();
    if (!fieldsCache.ok) throw new Error(fieldsCache.error);

    // サービス略称→上限分数マップをキャッシュする（衝突チェックで使用）
    durationMap = fieldsCache.durationMap || {};

    const st = fieldsCache.static;

    // 氏名セレクト
    const nameEl = document.getElementById('f-name');
    st.氏名.forEach(n => nameEl.appendChild(new Option(n, n)));

    // 作業項目セレクト
    const taskEl = document.getElementById('f-task');
    st.作業項目.forEach(t => taskEl.appendChild(new Option(t, t)));

    // サービス略称datalist
    const dlEl = document.getElementById('service-list');
    fieldsCache.サービス略称.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s;
      dlEl.appendChild(opt);
    });

    // 提供曜日チェックボックス
    const dayBox = document.getElementById('day-checkboxes');
    st.提供曜日.forEach(d => {
      const lbl = document.createElement('label');
      lbl.className = 'day-check-label';
      lbl.innerHTML = `<input type="checkbox" value="${d}" onchange="checkConflicts()"> ${DAY_LABELS[d] || d}`;
      dayBox.appendChild(lbl);
    });

    // 提供時間セレクト（5分刻み 0:00〜23:55）
    const timeEl = document.getElementById('f-time');
    for (let h = 0; h < 24; h++) {
      for (let m = 0; m < 60; m += 5) {
        const label = `${h}:${String(m).padStart(2, '0')}`;
        timeEl.appendChild(new Option(label, label));
      }
    }

    // 勤務区分ラジオ
    const kinmuEl = document.getElementById('kinmu-radios');
    st.勤務区分.forEach((k, i) => {
      const lbl = document.createElement('label');
      lbl.className = 'radio-label';
      lbl.innerHTML = `<input type="radio" name="kinmu" value="${k}" ${i === 0 ? 'checked' : ''}> ${k}`;
      kinmuEl.appendChild(lbl);
    });

    // 記録内容セレクト
    const recEl = document.getElementById('f-record');
    st.記録内容.forEach((r, i) => recEl.appendChild(new Option(`テンプレート${i + 1}`, r)));

    // 提供時間・サービス略称変更時に衝突チェックを再実行する
    document.getElementById('f-time').addEventListener('change', checkConflicts);
    document.getElementById('f-service').addEventListener('input', checkConflicts);

  } catch (err) {
    console.error('フィールド取得エラー:', err);
    showToast('フィールドの読み込みに失敗しました', 'error');
  }
}

// ============================================================
// 事業所タブ切り替え
// ============================================================

/**
 * タブをクリックしたとき事業所を切り替え、時間割を再取得する
 * @param {HTMLElement} btn クリックされたタブボタン
 */
function switchOffice(btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentOffice = btn.dataset.office;
  document.getElementById('timetable-title').textContent = `${currentOffice} 時間割`;
  // 衝突バナーをリセットする
  document.getElementById('conflict-banner').classList.remove('visible');
  loadSchedule();
}

// ============================================================
// 時間割データ取得・描画
// ============================================================

/**
 * 現在の事業所のスケジュールをAPIから取得し時間割テーブルを描画する
 */
async function loadSchedule() {
  const wrap = document.getElementById('timetable-wrap');
  wrap.innerHTML = `
    <div class="timetable-empty">
      <div class="loading-spinner"></div>
      <p style="margin-top:0.75rem">読み込み中...</p>
    </div>`;

  try {
    const res = await fetch(`${SERVER}/api/service-schedule?office=${encodeURIComponent(currentOffice)}`);
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);

    currentRecords = data.records;
    renderTimetable(currentRecords);
  } catch (err) {
    console.error('スケジュール取得エラー:', err);
    wrap.innerHTML = `<div class="timetable-empty" style="color:#dc2626">
      <i class="fa-solid fa-circle-exclamation"></i>
      <p style="margin-top:0.5rem">取得失敗: ${err.message}</p>
    </div>`;
  }
}

/**
 * 上津役家: 勤務区分ごとにセクションを分けて描画する。
 * 大浦家: 全件を1つのテーブルで描画する。
 * @param {Array} records 作業設定レコード配列
 */
function renderTimetable(records) {
  const wrap = document.getElementById('timetable-wrap');

  if (records.length === 0) {
    wrap.innerHTML = `<div class="timetable-empty">
      <i class="fa-solid fa-calendar-xmark" style="font-size:1.8rem;color:var(--border-color)"></i>
      <p style="margin-top:0.75rem">登録データがありません</p>
    </div>`;
    return;
  }

  wrap.innerHTML = '';

  if (currentOffice === '上津役家') {
    // 勤務区分ごとにセクションヘッダー＋テーブルを挿入する
    const KINMU_ICONS = { '日勤': 'fa-sun', '夜勤担当①': 'fa-moon', '夜勤担当②': 'fa-star-half-stroke' };
    const KINMU_ORDER = ['日勤', '夜勤担当①', '夜勤担当②'];
    for (const kinmu of KINMU_ORDER) {
      const sectionRecords = records.filter(r => r.勤務区分 === kinmu);
      if (sectionRecords.length === 0) continue;

      const header = document.createElement('div');
      header.className = 'kinmu-section-header';
      header.innerHTML = `<i class="fa-solid ${KINMU_ICONS[kinmu] || 'fa-clock'}"></i> ${kinmu}`;
      wrap.appendChild(header);
      wrap.appendChild(buildTable(sectionRecords));
    }
  } else {
    // 大浦家: 全件を1テーブルで表示する
    wrap.appendChild(buildTable(records));
  }

  checkConflicts();
}

/**
 * レコード配列をグループ化して時間割テーブル要素を生成して返す。
 * グループキー = (startTime, 氏名, 作業項目, サービス略称)
 * 同一グループの曜日は曜日バッジで集約して表示する。
 * @param {Array} records
 * @returns {HTMLTableElement}
 */
function buildTable(records) {
  // (startTime, 氏名, 作業項目, サービス略称) をキーにグループ化する
  const groups = new Map();
  for (const r of records) {
    const start = r.startTime || r.提供時間 || '';
    const gKey = `${start}|${r.氏名}|${r.作業項目}|${r.サービス略称}`;
    if (!groups.has(gKey)) {
      groups.set(gKey, {
        startTime:    r.startTime || null,
        endTime:      r.endTime   || null,
        提供時間:     r.提供時間,
        氏名:         r.氏名,
        作業項目:     r.作業項目,
        サービス略称: r.サービス略称,
        days:         new Set(),
      });
    }
    if (r.提供曜日) groups.get(gKey).days.add(r.提供曜日);
  }

  const sorted = [...groups.values()].sort(
    (a, b) => timeToMinutes(a.startTime || a.提供時間) - timeToMinutes(b.startTime || b.提供時間)
  );

  // セクション内の空き時間帯を計算する（カバー区間をマージして隙間を取得）
  const intervals = sorted
    .filter(g => g.startTime && g.endTime)
    .map(g => [timeToMinutes(g.startTime), timeToMinutes(g.endTime)]);
  intervals.sort((a, b) => a[0] - b[0]);

  const merged = [];
  for (const [s, e] of intervals) {
    if (merged.length === 0 || s > merged[merged.length - 1][1] + 1) {
      merged.push([s, e]);
    } else {
      merged[merged.length - 1][1] = Math.max(merged[merged.length - 1][1], e);
    }
  }

  // 隙間 → gapMap（gapStart分 → {from, to, duration}）
  const gapMap = new Map();
  for (let i = 0; i < merged.length - 1; i++) {
    const gapStart = merged[i][1] + 1;
    const gapEnd   = merged[i + 1][0] - 1;
    if (gapEnd >= gapStart) {
      gapMap.set(gapStart, {
        from:     minsToTimeStr(gapStart),
        to:       minsToTimeStr(gapEnd),
        duration: gapEnd - gapStart + 1,
      });
    }
  }

  // テーブル要素を構築する
  const table = document.createElement('table');
  table.className = 'timetable';

  const thead = table.createTHead();
  const hRow = thead.insertRow();
  ['時間帯', '氏名 / サービス', '作業項目', '提供曜日'].forEach(label => {
    const th = document.createElement('th');
    th.textContent = label;
    hRow.appendChild(th);
  });

  const tbody = table.createTBody();
  let prevEndMins = null;

  for (const g of sorted) {
    const color = TASK_COLORS[g.作業項目] || DEFAULT_COLOR;
    const curStartMins = g.startTime ? timeToMinutes(g.startTime) : null;

    // 空き時間帯行を挿入する（直前エントリとの間に隙間がある場合）
    if (prevEndMins !== null && curStartMins !== null && curStartMins > prevEndMins + 1) {
      const gap = gapMap.get(prevEndMins + 1);
      if (gap) {
        const trGap = tbody.insertRow();
        trGap.className = 'row-gap';
        const tdGap = document.createElement('td');
        tdGap.colSpan = 4;
        tdGap.innerHTML = `<span class="gap-label">
          <i class="fa-solid fa-clock"></i>
          空き &nbsp; ${gap.from} 〜 ${gap.to}
          <span class="gap-duration">${gap.duration}分</span>
        </span>`;
        trGap.appendChild(tdGap);
      }
    }
    if (g.endTime) prevEndMins = timeToMinutes(g.endTime);

    const tr = tbody.insertRow();
    tr.dataset.startTime = g.startTime || g.提供時間;
    tr.dataset.endTime   = g.endTime || '';

    // 時間帯セル
    const tdTime = document.createElement('td');
    tdTime.className = 'td-time';
    if (g.startTime && g.endTime) {
      tdTime.innerHTML = `${g.startTime}<span class="time-range"><br>〜${g.endTime}</span>`;
    } else {
      tdTime.textContent = g.提供時間;
    }
    tr.appendChild(tdTime);

    // 氏名・サービス略称セル
    const tdName = document.createElement('td');
    tdName.innerHTML = `<div class="td-name">${g.氏名}</div>
      <div class="td-service">${g.サービス略称 || '―'}</div>`;
    tr.appendChild(tdName);

    // 作業項目バッジセル
    const tdTask = document.createElement('td');
    const badge = document.createElement('span');
    badge.className = 'task-badge';
    badge.style.setProperty('--badge-bg', color.bg);
    badge.style.setProperty('--badge-color', color.accent);
    badge.textContent = g.作業項目 || '―';
    tdTask.appendChild(badge);
    tr.appendChild(tdTask);

    // 曜日バッジセル
    const tdDays = document.createElement('td');
    const dayWrap = document.createElement('div');
    dayWrap.className = 'day-badges';
    for (const day of DAY_ORDER) {
      const db = document.createElement('span');
      db.className = 'day-badge' + (g.days.has(day) ? ' active' : '');
      if (g.days.has(day)) db.style.setProperty('--entry-accent', color.accent);
      db.textContent = DAY_LABELS[day];
      dayWrap.appendChild(db);
    }
    tdDays.appendChild(dayWrap);
    tr.appendChild(tdDays);
  }

  return table;
}

// ============================================================
// 衝突検出
// ============================================================

/**
 * フォームで選択中の曜日×時間が既存レコードと衝突するか確認し、
 * 衝突している場合は警告バナーを表示する。
 * 衝突している時間割セルを赤背景にする。
 */
function checkConflicts() {
  const selectedTime    = document.getElementById('f-time').value;
  const selectedService = document.getElementById('f-service').value;
  const selectedName    = document.getElementById('f-name').value;
  const selectedDays    = getSelectedDays();
  const banner  = document.getElementById('conflict-banner');
  const gapBanner = document.getElementById('gap-banner');
  const msg     = document.getElementById('conflict-msg');
  const gapMsg  = document.getElementById('gap-msg');

  // ハイライトをリセットする
  document.querySelectorAll('.timetable tbody tr').forEach(tr => {
    tr.classList.remove('row-selected', 'row-conflict');
  });

  if (!selectedTime) {
    banner.classList.remove('visible');
    gapBanner.classList.remove('visible');
    return;
  }

  // 新規エントリの時間範囲を計算する（サービス略称から上限分数を取得）
  const upperLimit = durationMap[selectedService] || null;
  let newStart = null, newEnd = null;
  if (upperLimit) {
    newEnd   = timeToMinutes(selectedTime) + 4;
    newStart = newEnd - upperLimit + 1;
  }

  // 選択中の時間帯と重なる行をハイライトする
  document.querySelectorAll('.timetable tbody tr').forEach(tr => {
    const rowStart = tr.dataset.startTime ? timeToMinutes(tr.dataset.startTime) : null;
    const rowEnd   = tr.dataset.endTime   ? timeToMinutes(tr.dataset.endTime)   : null;
    if (rowStart === null) return;
    const overlaps = (newStart !== null && rowEnd !== null)
      ? (newStart <= rowEnd && newEnd >= rowStart)
      : (tr.dataset.startTime === selectedTime);
    if (overlaps) tr.classList.add('row-selected');
  });

  if (selectedDays.length === 0) {
    banner.classList.remove('visible');
    gapBanner.classList.remove('visible');
    return;
  }

  // ── 1. 時間帯重複チェック ──
  const conflicts = currentRecords.filter(r => {
    if (!selectedDays.includes(r.提供曜日)) return false;
    if (newStart !== null && r.startTime && r.endTime) {
      return newStart <= timeToMinutes(r.endTime) && newEnd >= timeToMinutes(r.startTime);
    }
    return r.提供時間 === selectedTime;
  });

  if (conflicts.length > 0) {
    document.querySelectorAll('.timetable tbody tr.row-selected').forEach(tr => {
      const hasConflict = conflicts.some(r => (r.startTime || r.提供時間) === tr.dataset.startTime);
      if (hasConflict) tr.classList.add('row-conflict');
    });
    const detail = conflicts.map(r => {
      const range = (r.startTime && r.endTime) ? `${r.startTime}〜${r.endTime}` : r.提供時間;
      return `${r.提供曜日} ${r.氏名}（${range}）`;
    }).join('、');
    msg.textContent = `時間帯が重複する登録があります：${detail}`;
    banner.classList.add('visible');
  } else {
    banner.classList.remove('visible');
  }

  // ── 2. 同じ氏名のサービス間 2時間未満ギャップチェック ──
  // 訪問介護では同一利用者への2時間以内の連続提供は1回分とみなされるため警告する
  if (selectedName && newStart !== null) {
    const tooClose = currentRecords.filter(r => {
      if (r.氏名 !== selectedName) return false;
      if (!selectedDays.includes(r.提供曜日)) return false;
      if (!r.startTime || !r.endTime) return false;
      const existStart = timeToMinutes(r.startTime);
      const existEnd   = timeToMinutes(r.endTime);
      // 重複は除外（別チェック済み）し、隣接する前後の間隔を確認する
      const gapBefore = newStart - existEnd;   // 既存終了→新規開始の間隔
      const gapAfter  = existStart - newEnd;   // 新規終了→既存開始の間隔
      return (gapBefore > 0 && gapBefore < 120) || (gapAfter > 0 && gapAfter < 120);
    });

    if (tooClose.length > 0) {
      const detail = tooClose.map(r => {
        const range = (r.startTime && r.endTime) ? `${r.startTime}〜${r.endTime}` : r.提供時間;
        const gap = Math.min(
          Math.abs(newStart - timeToMinutes(r.endTime)),
          Math.abs(timeToMinutes(r.startTime) - newEnd)
        );
        return `${r.提供曜日}（間隔 約${gap}分）${range}`;
      }).join('、');
      gapMsg.textContent = `${selectedName} の他サービスとの間隔が2時間未満です：${detail}`;
      gapBanner.classList.add('visible');
    } else {
      gapBanner.classList.remove('visible');
    }
  } else {
    gapBanner.classList.remove('visible');
  }
}

// ============================================================
// フォーム送信
// ============================================================

/**
 * フォームの値を検証してAPIにPOSTし、完了後に時間割を再読み込みする
 */
async function submitForm() {
  const name       = document.getElementById('f-name').value;
  const task       = document.getElementById('f-task').value;
  const service    = document.getElementById('f-service').value;
  const time       = document.getElementById('f-time').value;
  const kinmu      = document.querySelector('input[name="kinmu"]:checked')?.value || '日勤';
  const record     = document.getElementById('f-record').value;
  const startDate  = document.getElementById('f-start').value;
  const endDate    = document.getElementById('f-end').value;
  const days       = getSelectedDays();

  // 必須項目のバリデーション
  if (!name)             return showToast('氏名を選択してください', 'error');
  if (days.length === 0) return showToast('提供曜日を1つ以上選択してください', 'error');
  if (!time)             return showToast('提供時間を選択してください', 'error');

  // 時間帯重複がある場合は登録を阻止する
  if (document.getElementById('conflict-banner').classList.contains('visible')) {
    return showToast('時間帯が重複しているため登録できません', 'error');
  }

  // 2時間未満ギャップがある場合は警告済みであることを確認して続行する
  if (document.getElementById('gap-banner').classList.contains('visible')) {
    if (!confirm('同じ利用者の他サービスとの間隔が2時間未満です。\nこのまま登録しますか？')) return;
  }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.innerHTML = '<div class="loading-spinner" style="width:18px;height:18px;border-width:2px"></div> 登録中...';

  try {
    const body = {
      事業所:       currentOffice,
      氏名:         name,
      作業項目:     task,
      サービス略称: service,
      提供曜日:     days,
      提供時間:     time,
      勤務区分:     kinmu,
      記録内容:     record,
      開始日:       startDate,
      終了日:       endDate,
    };

    const res = await fetch(`${SERVER}/api/service-schedule`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(body),
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);

    showToast(`${data.count}件登録しました`, 'success');
    resetForm();
    await loadSchedule(); // 時間割を最新状態に更新する

  } catch (err) {
    console.error('登録エラー:', err);
    showToast(`登録失敗: ${err.message}`, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> 登録する';
  }
}

/**
 * フォームの入力値をすべてリセットする
 */
function resetForm() {
  document.getElementById('f-name').value = '';
  document.getElementById('f-task').value = '';
  document.getElementById('f-service').value = '';
  document.getElementById('f-time').value = '';
  document.getElementById('f-start').value = '';
  document.getElementById('f-end').value = '';
  document.getElementById('f-record').value = '';
  document.querySelectorAll('#day-checkboxes input[type=checkbox]').forEach(cb => cb.checked = false);
  document.querySelector('input[name="kinmu"]').checked = true;
  document.getElementById('conflict-banner').classList.remove('visible');
  document.getElementById('gap-banner').classList.remove('visible');
  document.querySelectorAll('.timetable tbody tr').forEach(tr => tr.classList.remove('row-selected', 'row-conflict'));
}

// ============================================================
// ユーティリティ
// ============================================================

/**
 * チェックされている提供曜日の配列を返す
 * @returns {string[]}
 */
function getSelectedDays() {
  return [...document.querySelectorAll('#day-checkboxes input:checked')].map(cb => cb.value);
}

/**
 * "H:MM" 形式の時刻文字列を分単位の整数に変換する（ソート・比較用）
 * @param {string} t "7:00" のような文字列
 * @returns {number}
 */
function timeToMinutes(t) {
  const [h, m] = (t || '0:00').split(':').map(Number);
  return (h || 0) * 60 + (m || 0);
}

/**
 * 分を "H:MM" 形式に変換する（衝突チェックのハイライト対象特定に使用）
 * @param {number} mins 0時からの分数
 * @returns {string}
 */
function minsToTimeStr(mins) {
  const h = Math.floor(mins / 60) % 24;
  const m = mins % 60;
  return `${h}:${String(m).padStart(2, '0')}`;
}

/**
 * 画面下部にトースト通知を表示する
 * @param {string} msg  表示メッセージ
 * @param {'success'|'error'|''} type スタイル種別
 */
function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast ${type} show`;
  setTimeout(() => el.classList.remove('show'), 3500);
}
</script>
