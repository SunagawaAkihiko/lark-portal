<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>顧客別作業設定</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    /* ===== CSS変数（lark-portal統一デザイン） ===== */
    :root {
      --bg-color:      #fdf6ec;
      --text-color:    #4a3f35;
      --text-muted:    #8c7c6b;
      --primary-color: #e76f51;
      --primary-light: #fcece8;
      --card-bg:       #fff0e3;
      --border-color:  #dcbfa6;
      --admin-dark:    #4a3f35;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Zen Kaku Gothic New', sans-serif;
      background: var(--bg-color);
      color: var(--text-color);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* ===== ページヘッダー ===== */
    .page-header {
      position: sticky; top: 0; z-index: 100;
      background: var(--admin-dark);
      color: white;
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.9rem 1rem;
      box-shadow: 0 2px 6px rgba(0,0,0,0.25);
    }
    .page-header h1 { font-size: 1.05rem; font-weight: 700; }
    .header-badge {
      margin-left: auto;
      background: var(--primary-color);
      color: white;
      font-size: 0.7rem;
      padding: 0.2rem 0.55rem;
      border-radius: 20px;
      font-weight: 700;
    }

    /* ===== 事業所タブ ===== */
    .office-tabs {
      display: flex;
      background: var(--admin-dark);
      padding: 0 1rem 0.75rem;
      gap: 0.5rem;
    }
    .tab-btn {
      flex: 1;
      padding: 0.55rem 0;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.6);
    }
    .tab-btn.active {
      background: var(--primary-color);
      color: white;
    }

    /* ===== メインレイアウト（PC: 左右2分割、SP: 縦積み） ===== */
    .main-layout {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 1rem;
      padding: 1rem;
      align-items: start;
    }
    @media (max-width: 900px) {
      .main-layout { grid-template-columns: 1fr; }
    }

    /* ===== 時間割カード ===== */
    .timetable-card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    .timetable-card-header {
      background: var(--card-bg);
      padding: 0.75rem 1rem;
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--text-color);
      border-bottom: 1px solid var(--border-color);
      display: flex; align-items: center; gap: 0.5rem;
    }
    .timetable-wrap {
      overflow-y: auto;
      max-height: calc(100vh - 220px);
    }

    /* ===== タイムラインコラムレイアウト ===== */
    .timeline-container {
      overflow-x: auto;
      padding: 0.75rem;
    }
    .timeline-grid {
      display: flex;
      gap: 0.6rem;
      align-items: flex-start;
      min-width: max-content;
    }

    /* 上津役家：勤務区分セクション */
    .kinmu-section { margin-bottom: 1.2rem; }
    .kinmu-section-title {
      background: var(--admin-dark);
      color: white;
      padding: 0.45rem 0.75rem;
      font-size: 0.82rem;
      font-weight: 700;
      border-radius: 6px;
      display: flex; align-items: center; gap: 0.5rem;
      margin-bottom: 0.6rem;
    }

    /* 1サービスコラム */
    .timeline-col {
      width: 150px;
      flex-shrink: 0;
    }

    /* コラムヘッダー */
    .col-header {
      padding: 0.45rem 0.5rem 0.5rem;
      border-radius: 6px 6px 0 0;
      font-size: 0.82rem;
      font-weight: 700;
      color: white;
      text-align: center;
      line-height: 1.4;
      background: var(--col-accent, #64748b);
    }
    .col-header-sub {
      font-size: 0.7rem;
      font-weight: 500;
      opacity: 0.85;
      display: block;
    }
    .col-header-meta {
      display: flex;
      justify-content: center;
      gap: 0.3rem;
      flex-wrap: wrap;
      margin-top: 0.25rem;
    }
    .col-header-badge {
      display: inline-block;
      font-size: 0.62rem;
      font-weight: 700;
      background: rgba(255,255,255,0.22);
      border-radius: 10px;
      padding: 0.1rem 0.4rem;
    }

    /* コラム本体 */
    .col-body {
      border: 2px solid var(--col-accent, #64748b);
      border-top: none;
      border-radius: 0 0 6px 6px;
      background: white;
      overflow: hidden;
    }

    /* エントリーセル */
    .col-entry {
      padding: 0.4rem 0.5rem;
      border-bottom: 1px solid #ede8e2;
      transition: background 0.15s;
      cursor: default;
    }
    .col-entry:last-child { border-bottom: none; }
    .col-entry:hover { background: #fdf8f4; }
    .col-entry-time {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--col-accent, #64748b);
      white-space: nowrap;
      letter-spacing: -0.02em;
    }
    .col-entry-name {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text-color);
      margin-top: 0.1rem;
      letter-spacing: 0.05em;
    }
    .col-entry-service {
      font-size: 0.65rem;
      color: var(--text-muted);
      margin-top: 0.05rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .col-entry-units {
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--col-accent, #64748b);
      margin-top: 0.05rem;
    }
    .col-entry-days {
      display: flex;
      gap: 2px;
      flex-wrap: nowrap;
      margin-top: 0.25rem;
    }
    .col-day-badge {
      width: 17px; height: 17px;
      border-radius: 50%;
      font-size: 0.58rem;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      background: #e9e3dc;
      color: #b0a090;
      flex-shrink: 0;
    }
    .col-day-badge.active {
      background: var(--col-accent, #64748b);
      color: white;
    }

    /* 空き時間帯 */
    .col-gap {
      padding: 0.3rem 0.5rem;
      background: #f5f0eb;
      border-bottom: 1px dashed var(--border-color);
      font-size: 0.65rem;
      color: var(--text-muted);
      text-align: center;
      display: flex; align-items: center; justify-content: center; gap: 0.3rem;
    }
    /* フォームの入力条件に合う空き枠はグリーンでハイライトする */
    .col-gap.highlight {
      background: #dcfce7;
      border-bottom-color: #86efac;
      color: #166534;
    }
    .col-gap-duration {
      background: #e2dbd2;
      border-radius: 8px;
      padding: 0.05rem 0.35rem;
      font-weight: 700;
    }
    .col-gap.highlight .col-gap-duration {
      background: #bbf7d0;
    }
    .col-empty {
      padding: 0.8rem 0.5rem;
      text-align: center;
      font-size: 0.72rem;
      color: #c8beb4;
    }

    /* ===== 空・ローディング状態 ===== */
    .timetable-empty {
      padding: 2rem;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    .loading-spinner {
      display: inline-block;
      width: 22px; height: 22px;
      border: 3px solid var(--border-color);
      border-top-color: var(--primary-color);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== 登録フォームカード ===== */
    .form-card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      overflow: hidden;
      position: sticky;
      top: 100px;
    }
    .form-card-header {
      background: var(--primary-color);
      padding: 0.75rem 1rem;
      font-weight: 700;
      font-size: 0.9rem;
      color: white;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .form-body { padding: 0.9rem 1rem 1rem; }

    /* ===== フォーム部品 ===== */
    .field-group { margin-bottom: 0.85rem; }
    .field-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-muted);
      margin-bottom: 0.3rem;
    }
    .field-label .req { color: var(--primary-color); margin-left: 2px; }
    .form-select, .form-input {
      width: 100%;
      padding: 0.5rem 0.7rem;
      border: 1.5px solid var(--border-color);
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.88rem;
      color: var(--text-color);
      background: white;
      appearance: none;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-select:focus, .form-input:focus { border-color: var(--primary-color); }
    .field-hint {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
      min-height: 1.1em;
    }
    .field-hint.ok   { color: #166534; font-weight: 700; }
    .field-hint.warn { color: #c2410c; font-weight: 700; }

    /* ===== 曜日チェックボックス ===== */
    .day-checkboxes { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .day-check-label {
      display: flex; align-items: center; gap: 0.2rem;
      cursor: pointer; font-size: 0.82rem;
    }
    .day-check-label input { accent-color: var(--primary-color); width: 15px; height: 15px; }

    /* ===== 勤務区分ラジオ ===== */
    .radio-group { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .radio-label { display: flex; align-items: center; gap: 0.25rem; cursor: pointer; font-size: 0.82rem; }
    .radio-label input { accent-color: var(--primary-color); }

    /* ===== 日付行 ===== */
    .date-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }

    /* ===== 衝突警告バナー ===== */
    .conflict-banner {
      display: none;
      margin-bottom: 0.75rem;
      background: #fff1f1;
      border: 1.5px solid #f87171;
      border-radius: 8px;
      padding: 0.5rem 0.75rem;
      font-size: 0.8rem;
      color: #b91c1c;
      font-weight: 600;
    }
    .conflict-banner.visible { display: block; }

    /* ===== 送信ボタン ===== */
    .submit-btn {
      width: 100%;
      padding: 0.75rem;
      background: var(--primary-color);
      color: white;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
    }
    .submit-btn:hover:not(:disabled) { background: #d05a3c; }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ===== 単位数トラッカー ===== */
    .unit-tracker {
      margin-top: 0.9rem;
      border: 1.5px solid var(--border-color);
      border-radius: 10px;
      overflow: hidden;
    }
    .unit-tracker-header {
      background: var(--card-bg);
      padding: 0.45rem 0.75rem;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-color);
      border-bottom: 1px solid var(--border-color);
      display: flex; align-items: center; gap: 0.4rem;
    }
    .unit-tracker-body { padding: 0.65rem 0.75rem 0.75rem; }

    /* 目標入力行 */
    .unit-target-row {
      display: flex; align-items: center; gap: 0.5rem;
      margin-bottom: 0.65rem;
    }
    .unit-target-row label { font-size: 0.78rem; font-weight: 700; color: var(--text-muted); white-space: nowrap; }
    .unit-target-row input {
      flex: 1;
      padding: 0.35rem 0.6rem;
      border: 1.5px solid var(--border-color);
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.85rem;
      color: var(--text-color);
      outline: none;
    }
    .unit-target-row input:focus { border-color: var(--primary-color); }
    .unit-target-row span { font-size: 0.78rem; color: var(--text-muted); }

    /* 数値グリッド */
    .unit-stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0.4rem;
      margin-bottom: 0.65rem;
    }
    .unit-stat {
      background: var(--bg-color);
      border-radius: 7px;
      padding: 0.4rem 0.45rem;
      text-align: center;
    }
    .unit-stat-label { font-size: 0.62rem; color: var(--text-muted); margin-bottom: 0.15rem; }
    .unit-stat-value { font-size: 0.95rem; font-weight: 700; color: var(--text-color); }
    .unit-stat.pending .unit-stat-value { color: var(--primary-color); }

    /* プログレスバー */
    .unit-progress-wrap { }
    .unit-progress-track {
      height: 10px;
      background: #e9e3dc;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }
    /* 登録済み分（落ち着いた色） */
    .unit-progress-fill-current {
      position: absolute; left: 0; top: 0; height: 100%;
      background: #059669;
      border-radius: 10px;
      transition: width 0.4s ease;
    }
    /* 追加予定分（オーバーレイ、薄い色） */
    .unit-progress-fill-pending {
      position: absolute; top: 0; height: 100%;
      background: rgba(231,111,81,0.55);
      border-radius: 10px;
      transition: left 0.4s ease, width 0.4s ease;
    }
    /* 目標線 */
    .unit-progress-target-line {
      position: absolute; top: -2px; height: 14px; width: 2px;
      background: #7c3aed;
      border-radius: 2px;
      transition: left 0.4s ease;
    }
    .unit-progress-label {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 0.3rem;
      display: flex; justify-content: space-between;
    }
    .unit-progress-label .over  { color: #dc2626; font-weight: 700; }
    .unit-progress-label .under { color: #059669; font-weight: 700; }
    .unit-progress-label .exact { color: #7c3aed; font-weight: 700; }

    /* ===== トースト通知 ===== */
    .toast {
      position: fixed;
      bottom: 1.5rem; right: 1.5rem;
      background: #1e293b;
      color: white;
      padding: 0.75rem 1.2rem;
      border-radius: 10px;
      font-size: 0.88rem;
      font-weight: 600;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      transform: translateY(80px);
      opacity: 0;
      transition: transform 0.3s, opacity 0.3s;
      z-index: 999;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { background: #0e8a6e; }
    .toast.error   { background: #dc2626; }
  </style>
</head>
<body>

<!-- ===== ページヘッダー ===== -->
<header class="page-header">
  <i class="fa-solid fa-calendar-check"></i>
  <h1>顧客別作業設定</h1>
  <span class="header-badge"><i class="fa-solid fa-lock"></i> 管理者専用</span>
</header>

<!-- ===== 事業所タブ ===== -->
<nav class="office-tabs">
  <button class="tab-btn active" data-office="大浦家" onclick="switchOffice(this)">
    <i class="fa-solid fa-house"></i> 大浦家
  </button>
  <button class="tab-btn" data-office="上津役家" onclick="switchOffice(this)">
    <i class="fa-solid fa-house-chimney"></i> 上津役家
  </button>
</nav>

<!-- ===== メインレイアウト ===== -->
<div class="main-layout">

  <!-- ─── 左：時間割 ─── -->
  <section class="timetable-card">
    <div class="timetable-card-header">
      <i class="fa-solid fa-table-columns"></i>
      <span id="timetable-title">大浦家 時間割</span>
      <button onclick="loadSchedule()" style="margin-left:auto;background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:0.85rem;" title="再読込">
        <i class="fa-solid fa-rotate-right"></i>
      </button>
    </div>
    <div class="timetable-wrap" id="timetable-wrap">
      <div class="timetable-empty">
        <div class="loading-spinner"></div>
        <p style="margin-top:0.75rem">読み込み中...</p>
      </div>
    </div>
  </section>

  <!-- ─── 右：登録フォーム ─── -->
  <section class="form-card">
    <div class="form-card-header">
      <i class="fa-solid fa-plus-circle"></i>
      新規サービス登録
    </div>
    <div class="form-body">

      <!-- 時間帯重複警告（赤） -->
      <div class="conflict-banner" id="conflict-banner">
        <i class="fa-solid fa-triangle-exclamation"></i>
        <span id="conflict-msg"></span>
      </div>

      <!-- 2時間未満ギャップ警告（オレンジ） -->
      <div class="conflict-banner" id="gap-banner" style="background:#fff7ed;border-color:#fb923c;color:#c2410c;">
        <i class="fa-solid fa-clock"></i>
        <span id="gap-msg"></span>
      </div>

      <!-- 氏名 -->
      <div class="field-group">
        <label class="field-label">氏名<span class="req">*</span></label>
        <select class="form-select" id="f-name">
          <option value="">-- 選択してください --</option>
        </select>
      </div>

      <!-- 作業項目 -->
      <div class="field-group">
        <label class="field-label">作業項目</label>
        <select class="form-select" id="f-task">
          <option value="">-- 選択してください --</option>
        </select>
      </div>

      <!-- サービス略称（検索可能） -->
      <div class="field-group">
        <label class="field-label">サービス略称</label>
        <input class="form-input" id="f-service" list="service-list" placeholder="入力して絞り込み...">
        <datalist id="service-list"></datalist>
        <!-- サービスコードから取得した時間・単位数のプレビュー -->
        <p class="field-hint" id="service-hint"></p>
      </div>

      <!-- 提供曜日（複数選択） -->
      <div class="field-group">
        <label class="field-label">提供曜日<span class="req">*</span></label>
        <div class="day-checkboxes" id="day-checkboxes"></div>
      </div>

      <!-- 提供時間（作業項目＋サービス略称選択後に空き枠のみ表示） -->
      <div class="field-group">
        <label class="field-label">提供時間<span class="req">*</span></label>
        <select class="form-select" id="f-time">
          <option value="">作業項目を選択してください</option>
        </select>
        <!-- 時間ウィンドウと空き枠数ヒント -->
        <p class="field-hint" id="time-hint"></p>
      </div>

      <!-- 勤務区分 -->
      <div class="field-group">
        <label class="field-label">勤務区分</label>
        <div class="radio-group" id="kinmu-radios"></div>
      </div>

      <!-- 記録内容 -->
      <div class="field-group">
        <label class="field-label">記録内容テンプレート</label>
        <select class="form-select" id="f-record">
          <option value="">-- 選択しない --</option>
        </select>
      </div>

      <!-- 開始日・終了日 -->
      <div class="field-group">
        <label class="field-label">適用期間（任意）</label>
        <div class="date-row">
          <input type="date" class="form-input" id="f-start" placeholder="開始日">
          <input type="date" class="form-input" id="f-end" placeholder="終了日">
        </div>
      </div>

      <!-- 登録ボタン -->
      <button class="submit-btn" id="submit-btn" onclick="submitForm()">
        <i class="fa-solid fa-floppy-disk"></i>
        登録する
      </button>

      <!-- ===== 単位数トラッカー ===== -->
      <div class="unit-tracker">
        <div class="unit-tracker-header">
          <i class="fa-solid fa-chart-simple"></i> 単位数トラッカー
        </div>
        <div class="unit-tracker-body">
          <!-- 目標単位数入力 -->
          <div class="unit-target-row">
            <label>目標</label>
            <input type="number" id="unit-target" placeholder="例: 4500" min="0" step="50"
              oninput="saveTarget(); updateUnitTracker()">
            <span>単位/月</span>
          </div>
          <!-- 数値サマリー -->
          <div class="unit-stats">
            <div class="unit-stat">
              <div class="unit-stat-label">登録済（週）</div>
              <div class="unit-stat-value" id="u-weekly">─</div>
            </div>
            <div class="unit-stat">
              <div class="unit-stat-label">月換算</div>
              <div class="unit-stat-value" id="u-monthly">─</div>
            </div>
            <div class="unit-stat pending">
              <div class="unit-stat-label">追加予定</div>
              <div class="unit-stat-value" id="u-pending">─</div>
            </div>
          </div>
          <!-- プログレスバー -->
          <div class="unit-progress-wrap">
            <div class="unit-progress-track" id="unit-progress-track">
              <div class="unit-progress-fill-current"  id="u-fill-current"></div>
              <div class="unit-progress-fill-pending"  id="u-fill-pending"></div>
              <div class="unit-progress-target-line"   id="u-target-line" style="display:none"></div>
            </div>
            <div class="unit-progress-label" id="u-label">目標単位数を入力してください</div>
          </div>
        </div>
      </div>

    </div>
  </section>

</div><!-- /.main-layout -->

<!-- ===== トースト通知 ===== -->
<div class="toast" id="toast"></div>

<script>
// ============================================================
// 定数・グローバル変数
// ============================================================

/** APIサーバーのベースURL（本番はRenderにデプロイされたattendance-app） */
const SERVER = (location.hostname === 'localhost' || location.hostname === '')
  ? 'http://localhost:3000'
  : 'https://attendance-app-irf1.onrender.com';

/** 現在表示中の事業所 */
let currentOffice = '大浦家';

/** 現在取得済みの作業設定レコード（衝突検出・単位数集計に使用） */
let currentRecords = [];

/** フィールド選択肢データ（初回ロード時に取得してキャッシュ） */
let fieldsCache = null;

/** サービス略称 → 時間上限（分）のマップ（サービスコードテーブルから） */
let durationMap = {};

/** サービス略称 → 単位数のマップ（サービスコードテーブルから） */
let unitMap = {};

/** 提供曜日の表示順序と略称定義 */
const DAY_ORDER  = ['月曜', '火曜', '水曜', '木曜', '金曜', '土曜', '日曜'];
const DAY_LABELS = { '月曜': '月', '火曜': '火', '水曜': '水', '木曜': '木', '金曜': '金', '土曜': '土', '日曜': '日' };

/**
 * 作業項目ごとの提供可能時間ウィンドウ定義（分単位）。
 * 排泄介助は日をまたぐため 22:00〜24:00（1320〜1440）と 0:00〜4:00（1440〜1680）の2区間に分割する。
 * windows の end は「含まない」境界値。label は表示用テキスト。
 */
const TASK_WINDOWS = {
  'モーニングケア': { windows: [{ start: 300,  end: 510  }], label: '5:00〜8:30'    },
  'イブニングケア': { windows: [{ start: 1080, end: 1260 }], label: '18:00〜21:00'  },
  '排泄介助':       { windows: [{ start: 1320, end: 1440 }, { start: 1440, end: 1680 }], label: '22:00〜翌4:00' },
  '排泄介助②':     { windows: [{ start: 1320, end: 1440 }, { start: 1440, end: 1680 }], label: '22:00〜翌4:00' },
  '入浴介助':       { windows: [{ start: 540,  end: 1020 }], label: '9:00〜17:00'   },
};

/**
 * 作業項目ごとのコラム定義
 */
const COL_DEFS = [
  { key: 'モーニングケア', label: '起床',    sub: 'モーニング', accent: '#d97706' },
  { key: 'イブニングケア', label: '就寝',    sub: 'イブニング', accent: '#7c3aed' },
  { key: '排泄介助',       label: '排泄介助', sub: '',           accent: '#059669' },
  { key: '排泄介助②',     label: '排泄介助②', sub: '',          accent: '#0891b2' },
  { key: '入浴介助',       label: '入浴介助', sub: '',           accent: '#2563eb' },
];

// ============================================================
// 初期化
// ============================================================
document.addEventListener('DOMContentLoaded', async () => {
  // 目標単位数をlocalStorageから復元する
  const saved = localStorage.getItem('unitTarget');
  if (saved) document.getElementById('unit-target').value = saved;
  await loadFields();
  await loadSchedule();
});

/**
 * フィールド選択肢をAPIから取得してフォームを初期化する
 */
async function loadFields() {
  try {
    const res = await fetch(`${SERVER}/api/service-schedule/fields`);
    fieldsCache = await res.json();
    if (!fieldsCache.ok) throw new Error(fieldsCache.error);

    durationMap = fieldsCache.durationMap || {};
    unitMap     = fieldsCache.unitMap     || {};

    const st = fieldsCache.static;

    // 氏名セレクト
    const nameEl = document.getElementById('f-name');
    st.氏名.forEach(n => nameEl.appendChild(new Option(n, n)));

    // 作業項目セレクト
    const taskEl = document.getElementById('f-task');
    st.作業項目.forEach(t => taskEl.appendChild(new Option(t, t)));

    // サービス略称datalist
    const dlEl = document.getElementById('service-list');
    fieldsCache.サービス略称.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s;
      dlEl.appendChild(opt);
    });

    // 提供曜日チェックボックス（変更時に空き時間・衝突・単位数を再計算する）
    const dayBox = document.getElementById('day-checkboxes');
    st.提供曜日.forEach(d => {
      const lbl = document.createElement('label');
      lbl.className = 'day-check-label';
      lbl.innerHTML = `<input type="checkbox" value="${d}" onchange="onFormChange()"> ${DAY_LABELS[d] || d}`;
      dayBox.appendChild(lbl);
    });

    // 提供時間は動的生成のためここでは初期化しない（updateTimeOptions参照）

    // 勤務区分ラジオ
    const kinmuEl = document.getElementById('kinmu-radios');
    st.勤務区分.forEach((k, i) => {
      const lbl = document.createElement('label');
      lbl.className = 'radio-label';
      lbl.innerHTML = `<input type="radio" name="kinmu" value="${k}" ${i === 0 ? 'checked' : ''}> ${k}`;
      kinmuEl.appendChild(lbl);
    });

    // 記録内容セレクト
    const recEl = document.getElementById('f-record');
    st.記録内容.forEach((r, i) => recEl.appendChild(new Option(`テンプレート${i + 1}`, r)));

    // 各フォーム部品の変更でonFormChangeを呼ぶ
    document.getElementById('f-task').addEventListener('change',    onFormChange);
    document.getElementById('f-time').addEventListener('change',    onFormChange);
    document.getElementById('f-name').addEventListener('change',    onFormChange);
    document.getElementById('f-service').addEventListener('input',  onFormChange);

  } catch (err) {
    console.error('フィールド取得エラー:', err);
    showToast('フィールドの読み込みに失敗しました', 'error');
  }
}

// ============================================================
// フォーム変更ハンドラ（空き時間更新 → 衝突チェック → 単位数更新）
// ============================================================

/**
 * フォームの任意の入力が変化したときに一括で再計算を実行する
 */
function onFormChange() {
  updateServiceHint();
  updateTimeOptions();
  checkConflicts();
  updateUnitTracker();
}

// ============================================================
// サービス略称ヒント（時間・単位数プレビュー）
// ============================================================

/**
 * 選択中のサービス略称からdurationMap・unitMapを参照して
 * 「XX分間・XX単位」のプレビューをフィールド下部に表示する
 */
function updateServiceHint() {
  const service = document.getElementById('f-service').value.trim();
  const hint    = document.getElementById('service-hint');
  if (!service) { hint.textContent = ''; hint.className = 'field-hint'; return; }

  const dur   = durationMap[service];
  const units = unitMap[service];
  if (dur || units) {
    const parts = [];
    if (dur)   parts.push(`⏱ ${dur}分間`);
    if (units) parts.push(`💠 ${units}単位`);
    hint.textContent = parts.join('　');
    hint.className = 'field-hint ok';
  } else {
    hint.textContent = 'サービスコードテーブルに該当なし';
    hint.className = 'field-hint warn';
  }
}

// ============================================================
// 空き時間更新（作業項目＋サービス略称＋提供曜日から動的に生成）
// ============================================================

/**
 * 選択中の作業項目の時間ウィンドウ内で、
 * サービス略称の所要時間（duration）が連続して空いている提供時間のみドロップダウンに表示する。
 * - サービス略称未選択の場合はウィンドウ内の全時刻を表示する
 * - 提供曜日未選択の場合は全曜日の占有を合算して判定する（いずれの曜日でも入れる枠）
 */
function updateTimeOptions() {
  const task    = document.getElementById('f-task').value;
  const service = document.getElementById('f-service').value.trim();
  const days    = getSelectedDays();
  const timeEl  = document.getElementById('f-time');
  const hint    = document.getElementById('time-hint');
  const prevVal = timeEl.value;

  timeEl.innerHTML = '<option value="">-- 選択してください --</option>';

  const taskDef = TASK_WINDOWS[task];
  if (!taskDef) {
    // 作業項目未選択：全時刻を表示する
    hint.textContent = '';
    timeEl.options[0].text = '作業項目を先に選択してください';
    return;
  }
  timeEl.options[0].text = '-- 選択してください --';

  const { windows, label: winLabel } = taskDef;

  // 同作業項目・選択曜日（未選択なら全曜日）の占有区間を収集する
  const targetDays = days.length > 0 ? days : DAY_ORDER;
  const occupiedRanges = currentRecords
    .filter(r => r.作業項目 === task && targetDays.includes(r.提供曜日) && r.startTime && r.endTime)
    .map(r => [timeToMinutes(r.startTime), timeToMinutes(r.endTime)]);

  // 選択サービス略称の所要時間（提供時間T → 開始=T+4-duration+1、終了=T+4）
  const upperLimit = durationMap[service] || null;

  let available = 0;
  let total     = 0;

  for (const win of windows) {
    for (let mins = win.start; mins < win.end; mins += 5) {
      const normalMins = mins % 1440; // 24時間に正規化
      total++;

      let isOccupied = false;
      if (upperLimit) {
        // サービス略称選択済：時間範囲で重複チェックする
        const newEnd   = normalMins + 4;
        const newStart = newEnd - upperLimit + 1;
        isOccupied = occupiedRanges.some(([s, e]) => newStart <= e && newEnd >= s);
      } else {
        // 略称未選択：開始時刻点が占有区間内に入るかだけ確認する
        isOccupied = occupiedRanges.some(([s, e]) => normalMins >= s && normalMins <= e);
      }

      if (!isOccupied) {
        timeEl.appendChild(new Option(minsToTimeStr(normalMins), minsToTimeStr(normalMins)));
        available++;
      }
    }
  }

  // ヒントに時間ウィンドウと空き枠数を表示する
  const pct = total > 0 ? Math.round((available / total) * 100) : 0;
  hint.textContent = `時間帯：${winLabel}　空き ${available} / ${total} 枠（${pct}%）`;
  hint.className = available > 0 ? 'field-hint ok' : 'field-hint warn';

  // 以前の選択値が空き枠に含まれていれば復元する
  if (prevVal && [...timeEl.options].some(o => o.value === prevVal)) {
    timeEl.value = prevVal;
  }

  // 時間割の空きギャップセルをハイライトする
  highlightAvailableGaps(task, upperLimit, days);
}

/**
 * 時間割コラムの空き時間帯セルのうち、選択中のサービスが入る枠を緑でハイライトする
 * @param {string} task      選択中の作業項目
 * @param {number|null} upperLimit サービスの所要時間（分）
 * @param {string[]} days    選択中の曜日配列
 */
function highlightAvailableGaps(task, upperLimit, days) {
  // 全ギャップセルのハイライトをリセットする
  document.querySelectorAll('.col-gap').forEach(el => el.classList.remove('highlight'));
  if (!task || !upperLimit) return;

  document.querySelectorAll('.col-gap[data-gap-task]').forEach(el => {
    if (el.dataset.gapTask !== task) return;
    const gapStart = parseInt(el.dataset.gapStart, 10);
    const gapEnd   = parseInt(el.dataset.gapEnd,   10);
    // 空き枠の長さが所要時間以上あればハイライトする
    if ((gapEnd - gapStart + 1) >= upperLimit) {
      el.classList.add('highlight');
    }
  });
}

// ============================================================
// 事業所タブ切り替え
// ============================================================
function switchOffice(btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentOffice = btn.dataset.office;
  document.getElementById('timetable-title').textContent = `${currentOffice} 時間割`;
  document.getElementById('conflict-banner').classList.remove('visible');
  loadSchedule();
}

// ============================================================
// 時間割データ取得
// ============================================================
async function loadSchedule() {
  const wrap = document.getElementById('timetable-wrap');
  wrap.innerHTML = `
    <div class="timetable-empty">
      <div class="loading-spinner"></div>
      <p style="margin-top:0.75rem">読み込み中...</p>
    </div>`;

  try {
    const res = await fetch(`${SERVER}/api/service-schedule?office=${encodeURIComponent(currentOffice)}`);
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);

    currentRecords = data.records;
    // デバッグ：取得件数・勤務区分・作業項目の実際の値をコンソールに出力する（確認後削除）
    console.log(`[schedule] ${currentOffice} レコード件数:`, currentRecords.length);
    console.log('[schedule] 勤務区分の値一覧:', [...new Set(currentRecords.map(r => r.勤務区分))]);
    console.log('[schedule] 作業項目の値一覧:', [...new Set(currentRecords.map(r => r.作業項目))]);
    if (currentRecords.length > 0) console.log('[schedule] 先頭レコード:', currentRecords[0]);
    renderTimeline(currentRecords);
  } catch (err) {
    console.error('スケジュール取得エラー:', err);
    wrap.innerHTML = `<div class="timetable-empty" style="color:#dc2626">
      <i class="fa-solid fa-circle-exclamation"></i>
      <p style="margin-top:0.5rem">取得失敗: ${err.message}</p>
    </div>`;
  }
}

// ============================================================
// 時間割描画（コラム形式）
// ============================================================

/**
 * レコード配列をコラム形式のタイムラインとして描画する。
 * 大浦家：作業項目ごとに1コラム（横並び）。
 * 上津役家：勤務区分ごとにセクションを分けてそれぞれコラム横並び。
 */
function renderTimeline(records) {
  const wrap = document.getElementById('timetable-wrap');

  if (records.length === 0) {
    wrap.innerHTML = `<div class="timetable-empty">
      <i class="fa-solid fa-calendar-xmark" style="font-size:1.8rem;color:var(--border-color)"></i>
      <p style="margin-top:0.75rem">登録データがありません</p>
    </div>`;
    updateUnitTracker();
    return;
  }

  wrap.innerHTML = '';
  const container = document.createElement('div');
  container.className = 'timeline-container';

  if (currentOffice === '上津役家') {
    // ハードコードに頼らず、実際のレコードから勤務区分を動的に収集する。
    // 表示優先順序は定義しつつ、未知の値も末尾に追加して取りこぼしを防ぐ。
    const KINMU_PREFERRED = ['日勤', '夜勤担当①', '夜勤担当②'];
    const KINMU_ICONS     = { '日勤': 'fa-sun', '夜勤担当①': 'fa-moon', '夜勤担当②': 'fa-star-half-stroke' };
    const kinmuSet = new Set(records.map(r => r.勤務区分).filter(Boolean));
    const kinmuList = [
      ...KINMU_PREFERRED.filter(k => kinmuSet.has(k)),
      ...[...kinmuSet].filter(k => !KINMU_PREFERRED.includes(k)).sort(),
    ];

    // 勤務区分が1件も取得できない場合は全件を1セクションで表示する
    if (kinmuList.length === 0) kinmuList.push('');

    for (const kinmu of kinmuList) {
      const sectionRecords = kinmu
        ? records.filter(r => r.勤務区分 === kinmu)
        : records;
      if (sectionRecords.length === 0) continue;

      const section = document.createElement('div');
      section.className = 'kinmu-section';

      const title = document.createElement('div');
      title.className = 'kinmu-section-title';
      const icon = KINMU_ICONS[kinmu] || 'fa-clock';
      title.innerHTML = `<i class="fa-solid ${icon}"></i> ${kinmu || '全シフト'}`;
      section.appendChild(title);

      const grid = document.createElement('div');
      grid.className = 'timeline-grid';
      for (const colDef of COL_DEFS) {
        const colRecords = sectionRecords.filter(r => r.作業項目 === colDef.key);
        grid.appendChild(buildColumn(colDef, colRecords));
      }
      section.appendChild(grid);
      container.appendChild(section);
    }
  } else {
    const grid = document.createElement('div');
    grid.className = 'timeline-grid';
    for (const colDef of COL_DEFS) {
      const colRecords = records.filter(r => r.作業項目 === colDef.key);
      grid.appendChild(buildColumn(colDef, colRecords));
    }
    container.appendChild(grid);
  }

  wrap.appendChild(container);
  checkConflicts();
  updateUnitTracker();
}

/**
 * 1作業項目分のコラムDOM要素を生成して返す。
 * エントリー間の空き時間帯には data-gap-* 属性を付与して
 * highlightAvailableGaps からハイライト対象として参照できるようにする。
 */
function buildColumn(colDef, records) {
  // (startTime, 氏名, サービス略称) をキーにグループ化して曜日を集約する
  const groups = new Map();
  for (const r of records) {
    const start = r.startTime || r.提供時間 || '';
    const gKey  = `${start}|${r.氏名}|${r.サービス略称}`;
    if (!groups.has(gKey)) {
      groups.set(gKey, {
        startTime:    r.startTime || null,
        endTime:      r.endTime   || null,
        提供時間:     r.提供時間,
        氏名:         r.氏名,
        サービス略称: r.サービス略称,
        days:         new Set(),
      });
    }
    if (r.提供曜日) groups.get(gKey).days.add(r.提供曜日);
  }

  const sorted = [...groups.values()].sort(
    (a, b) => timeToMinutes(a.startTime || a.提供時間) - timeToMinutes(b.startTime || b.提供時間)
  );

  // コラム全体の週あたり単位数合計を計算する（ヘッダーに表示する）
  const colWeeklyUnits = records.reduce((sum, r) => {
    return sum + (unitMap[r.サービス略称] || 0);
  }, 0);

  // コラム要素を構築する
  const col = document.createElement('div');
  col.className = 'timeline-col';
  col.style.setProperty('--col-accent', colDef.accent);

  // ── ヘッダー ──
  const hdr = document.createElement('div');
  hdr.className = 'col-header';
  const hasGap = hasTimeGap(sorted);
  hdr.innerHTML = `
    ${colDef.label}
    ${colDef.sub ? `<span class="col-header-sub">${colDef.sub}</span>` : ''}
    <div class="col-header-meta">
      <span class="col-header-badge">${sorted.length}件</span>
      <span class="col-header-badge">${colWeeklyUnits > 0 ? colWeeklyUnits + '単位/週' : '─'}</span>
      <span class="col-header-badge">${hasGap ? '空きあり' : '空きなし'}</span>
    </div>
  `;
  col.appendChild(hdr);

  // ── 本体 ──
  const body = document.createElement('div');
  body.className = 'col-body';

  if (sorted.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'col-empty';
    empty.innerHTML = '<i class="fa-solid fa-minus" style="opacity:0.4"></i><br>登録なし';
    body.appendChild(empty);
  } else {
    let prevEndMins = null;

    for (const g of sorted) {
      const curStartMins = g.startTime ? timeToMinutes(g.startTime) : null;

      // 空き時間帯行（data-gap-* 属性でハイライト対象として識別する）
      if (prevEndMins !== null && curStartMins !== null && curStartMins > prevEndMins + 1) {
        const gapStart = prevEndMins + 1;
        const gapEnd   = curStartMins - 1;
        const gapMins  = gapEnd - gapStart + 1;
        const gapEl    = document.createElement('div');
        gapEl.className = 'col-gap';
        // ハイライト判定のために作業項目・区間情報をdata属性に保持する
        gapEl.dataset.gapTask  = colDef.key;
        gapEl.dataset.gapStart = gapStart;
        gapEl.dataset.gapEnd   = gapEnd;
        gapEl.innerHTML = `
          <i class="fa-solid fa-clock" style="opacity:0.5"></i>
          空き <span class="col-gap-duration">${gapMins}分</span>
        `;
        body.appendChild(gapEl);
      }

      if (g.endTime) prevEndMins = timeToMinutes(g.endTime);

      // ── エントリーセル ──
      const entry = document.createElement('div');
      entry.className = 'col-entry';

      // 時刻行
      const timeEl = document.createElement('div');
      timeEl.className = 'col-entry-time';
      timeEl.textContent = (g.startTime && g.endTime)
        ? `${g.startTime}〜${g.endTime}`
        : (g.提供時間 || '');
      entry.appendChild(timeEl);

      // 氏名（先頭2文字、フルネームはtooltipで参照）
      const nameEl = document.createElement('div');
      nameEl.className = 'col-entry-name';
      nameEl.title     = g.氏名 || '';
      nameEl.textContent = (g.氏名 || '').slice(0, 2);
      entry.appendChild(nameEl);

      // サービス略称
      if (g.サービス略称) {
        const svcEl = document.createElement('div');
        svcEl.className = 'col-entry-service';
        svcEl.title = g.サービス略称;
        svcEl.textContent = g.サービス略称;
        entry.appendChild(svcEl);
      }

      // 単位数（unitMapに存在する場合のみ表示する）
      const units = unitMap[g.サービス略称];
      if (units) {
        const unitsEl = document.createElement('div');
        unitsEl.className = 'col-entry-units';
        unitsEl.textContent = `${units}単位`;
        entry.appendChild(unitsEl);
      }

      // 曜日バッジ
      const daysEl = document.createElement('div');
      daysEl.className = 'col-entry-days';
      for (const day of DAY_ORDER) {
        const db = document.createElement('span');
        db.className = 'col-day-badge' + (g.days.has(day) ? ' active' : '');
        db.textContent = DAY_LABELS[day];
        daysEl.appendChild(db);
      }
      entry.appendChild(daysEl);

      body.appendChild(entry);
    }
  }

  col.appendChild(body);
  return col;
}

/**
 * ソート済みグループ配列の中に時間的な隙間があるか判定する
 */
function hasTimeGap(sorted) {
  const intervals = sorted
    .filter(g => g.startTime && g.endTime)
    .map(g => [timeToMinutes(g.startTime), timeToMinutes(g.endTime)]);
  if (intervals.length === 0) return true;
  intervals.sort((a, b) => a[0] - b[0]);
  for (let i = 0; i < intervals.length - 1; i++) {
    if (intervals[i + 1][0] > intervals[i][1] + 1) return true;
  }
  return false;
}

// ============================================================
// 衝突検出
// ============================================================
function checkConflicts() {
  const selectedTime    = document.getElementById('f-time').value;
  const selectedService = document.getElementById('f-service').value.trim();
  const selectedName    = document.getElementById('f-name').value;
  const selectedDays    = getSelectedDays();
  const banner    = document.getElementById('conflict-banner');
  const gapBanner = document.getElementById('gap-banner');

  if (!selectedTime) {
    banner.classList.remove('visible');
    gapBanner.classList.remove('visible');
    return;
  }

  const upperLimit = durationMap[selectedService] || null;
  let newStart = null, newEnd = null;
  if (upperLimit) {
    newEnd   = timeToMinutes(selectedTime) + 4;
    newStart = newEnd - upperLimit + 1;
  }

  if (selectedDays.length === 0) {
    banner.classList.remove('visible');
    gapBanner.classList.remove('visible');
    return;
  }

  // ── 1. 時間帯重複チェック ──
  const conflicts = currentRecords.filter(r => {
    if (!selectedDays.includes(r.提供曜日)) return false;
    if (newStart !== null && r.startTime && r.endTime) {
      return newStart <= timeToMinutes(r.endTime) && newEnd >= timeToMinutes(r.startTime);
    }
    return r.提供時間 === selectedTime;
  });

  if (conflicts.length > 0) {
    const detail = conflicts.map(r => {
      const range = (r.startTime && r.endTime) ? `${r.startTime}〜${r.endTime}` : r.提供時間;
      return `${r.提供曜日} ${r.氏名}（${range}）`;
    }).join('、');
    document.getElementById('conflict-msg').textContent = `時間帯が重複する登録があります：${detail}`;
    banner.classList.add('visible');
  } else {
    banner.classList.remove('visible');
  }

  // ── 2. 同一氏名サービス間 2時間未満ギャップチェック ──
  // 訪問介護では同一利用者への2時間以内の連続提供は1回分とみなされるため警告する
  if (selectedName && newStart !== null) {
    const tooClose = currentRecords.filter(r => {
      if (r.氏名 !== selectedName || !selectedDays.includes(r.提供曜日)) return false;
      if (!r.startTime || !r.endTime) return false;
      const existStart = timeToMinutes(r.startTime);
      const existEnd   = timeToMinutes(r.endTime);
      const gapBefore  = newStart - existEnd;
      const gapAfter   = existStart - newEnd;
      return (gapBefore > 0 && gapBefore < 120) || (gapAfter > 0 && gapAfter < 120);
    });

    if (tooClose.length > 0) {
      const detail = tooClose.map(r => {
        const range = (r.startTime && r.endTime) ? `${r.startTime}〜${r.endTime}` : r.提供時間;
        const gap   = Math.min(
          Math.abs(newStart - timeToMinutes(r.endTime)),
          Math.abs(timeToMinutes(r.startTime) - newEnd)
        );
        return `${r.提供曜日}（間隔 約${gap}分）${range}`;
      }).join('、');
      document.getElementById('gap-msg').textContent =
        `${selectedName} の他サービスとの間隔が2時間未満です：${detail}`;
      gapBanner.classList.add('visible');
    } else {
      gapBanner.classList.remove('visible');
    }
  } else {
    gapBanner.classList.remove('visible');
  }
}

// ============================================================
// 単位数トラッカー更新
// ============================================================

/**
 * 登録済みレコードの単位数合計と、フォームで入力中の追加予定単位数を集計し
 * プログレスバーと数値を更新する。
 * - weeklyUnits   : currentRecords の全レコード分（曜日別に1件ずつ）の合計
 * - monthlyUnits  : weeklyUnits × 4.3（月換算）
 * - pendingUnits  : 選択サービス略称の単位数 × 選択曜日数
 */
function updateUnitTracker() {
  // 登録済み週単位数（各レコード1件 = 1曜日1回分）
  const weeklyUnits = currentRecords.reduce((sum, r) => sum + (unitMap[r.サービス略称] || 0), 0);
  const monthlyUnits = Math.round(weeklyUnits * 4.3);

  // 追加予定単位数（選択中のサービス略称×曜日数）
  const service      = document.getElementById('f-service').value.trim();
  const days         = getSelectedDays();
  const svcUnits     = unitMap[service] || 0;
  const pendingUnits = svcUnits * days.length;
  const pendingMonthly = Math.round(pendingUnits * 4.3);

  // 目標値（localStorageに保存済み）
  const target = parseInt(document.getElementById('unit-target').value, 10) || 0;

  // 数値表示を更新する
  document.getElementById('u-weekly').textContent  = weeklyUnits  > 0 ? `${weeklyUnits}` : '─';
  document.getElementById('u-monthly').textContent = monthlyUnits > 0 ? `${monthlyUnits}` : '─';
  document.getElementById('u-pending').textContent = pendingUnits > 0 ? `+${pendingMonthly}` : '─';

  // プログレスバーを更新する
  const fillCurrent = document.getElementById('u-fill-current');
  const fillPending = document.getElementById('u-fill-pending');
  const targetLine  = document.getElementById('u-target-line');
  const label       = document.getElementById('u-label');

  if (target <= 0) {
    fillCurrent.style.width = '0';
    fillPending.style.width = '0';
    targetLine.style.display = 'none';
    label.innerHTML = '目標単位数を入力してください';
    return;
  }

  // バーの基準は目標値の1.2倍（超過してもバーが消えないように余白を持たせる）
  const maxVal  = target * 1.2;
  const curPct  = Math.min((monthlyUnits / maxVal) * 100, 100);
  const addPct  = Math.min(((monthlyUnits + pendingMonthly) / maxVal) * 100, 100) - curPct;
  const tgtPct  = Math.min((target / maxVal) * 100, 100);

  fillCurrent.style.width = `${curPct}%`;
  fillPending.style.left  = `${curPct}%`;
  fillPending.style.width = `${Math.max(addPct, 0)}%`;
  targetLine.style.display = 'block';
  targetLine.style.left = `${tgtPct}%`;

  // 目標に対する過不足を表示する
  const totalMonthly = monthlyUnits + pendingMonthly;
  const diff = totalMonthly - target;
  if (Math.abs(diff) <= target * 0.05) {
    // 目標の±5%以内はちょうどよい
    label.innerHTML = `月${totalMonthly}単位 <span class="exact">目標達成 🎯</span>`;
  } else if (diff > 0) {
    label.innerHTML = `月${totalMonthly}単位 <span class="over">+${diff}単位 超過</span>`;
  } else {
    label.innerHTML = `月${totalMonthly}単位 <span class="under">${diff}単位 不足</span>`;
  }
}

/**
 * 目標単位数をlocalStorageに保存して次回起動時に復元できるようにする
 */
function saveTarget() {
  const val = document.getElementById('unit-target').value;
  if (val) localStorage.setItem('unitTarget', val);
  else     localStorage.removeItem('unitTarget');
}

// ============================================================
// フォーム送信
// ============================================================
async function submitForm() {
  const name      = document.getElementById('f-name').value;
  const task      = document.getElementById('f-task').value;
  const service   = document.getElementById('f-service').value;
  const time      = document.getElementById('f-time').value;
  const kinmu     = document.querySelector('input[name="kinmu"]:checked')?.value || '日勤';
  const record    = document.getElementById('f-record').value;
  const startDate = document.getElementById('f-start').value;
  const endDate   = document.getElementById('f-end').value;
  const days      = getSelectedDays();

  if (!name)             return showToast('氏名を選択してください', 'error');
  if (days.length === 0) return showToast('提供曜日を1つ以上選択してください', 'error');
  if (!time)             return showToast('提供時間を選択してください', 'error');

  if (document.getElementById('conflict-banner').classList.contains('visible')) {
    return showToast('時間帯が重複しているため登録できません', 'error');
  }
  if (document.getElementById('gap-banner').classList.contains('visible')) {
    if (!confirm('同じ利用者の他サービスとの間隔が2時間未満です。\nこのまま登録しますか？')) return;
  }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.innerHTML = '<div class="loading-spinner" style="width:18px;height:18px;border-width:2px"></div> 登録中...';

  try {
    const res = await fetch(`${SERVER}/api/service-schedule`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        事業所: currentOffice, 氏名: name, 作業項目: task,
        サービス略称: service, 提供曜日: days, 提供時間: time,
        勤務区分: kinmu, 記録内容: record, 開始日: startDate, 終了日: endDate,
      }),
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);

    showToast(`${data.count}件登録しました`, 'success');
    resetForm();
    await loadSchedule();
  } catch (err) {
    console.error('登録エラー:', err);
    showToast(`登録失敗: ${err.message}`, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> 登録する';
  }
}

function resetForm() {
  document.getElementById('f-name').value    = '';
  document.getElementById('f-task').value    = '';
  document.getElementById('f-service').value = '';
  document.getElementById('f-time').value    = '';
  document.getElementById('f-start').value   = '';
  document.getElementById('f-end').value     = '';
  document.getElementById('f-record').value  = '';
  document.querySelectorAll('#day-checkboxes input[type=checkbox]').forEach(cb => cb.checked = false);
  document.querySelector('input[name="kinmu"]').checked = true;
  document.getElementById('conflict-banner').classList.remove('visible');
  document.getElementById('gap-banner').classList.remove('visible');
  document.getElementById('service-hint').textContent = '';
  document.getElementById('time-hint').textContent    = '';
  document.querySelectorAll('.col-gap.highlight').forEach(el => el.classList.remove('highlight'));
  updateUnitTracker();
}

// ============================================================
// ユーティリティ
// ============================================================
function getSelectedDays() {
  return [...document.querySelectorAll('#day-checkboxes input:checked')].map(cb => cb.value);
}

function timeToMinutes(t) {
  const [h, m] = (t || '0:00').split(':').map(Number);
  return (h || 0) * 60 + (m || 0);
}

function minsToTimeStr(mins) {
  const h = Math.floor(mins / 60) % 24;
  const m = mins % 60;
  return `${h}:${String(m).padStart(2, '0')}`;
}

function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast ${type} show`;
  setTimeout(() => el.classList.remove('show'), 3500);
}
</script>
