<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>会社Wi-Fiに接続してください</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 32px;
      max-width: 380px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .icon {
      font-size: 64px;
      margin-bottom: 24px;
    }
    h1 {
      font-size: 20px;
      font-weight: 700;
      color: #1a202c;
      margin-bottom: 12px;
    }
    p {
      font-size: 15px;
      color: #4a5568;
      line-height: 1.7;
      margin-bottom: 8px;
    }
    .hint {
      margin-top: 28px;
      background: #ebf8ff;
      border-radius: 10px;
      padding: 16px;
      font-size: 14px;
      color: #2b6cb0;
      line-height: 1.6;
    }
    .retry-btn {
      display: inline-block;
      margin-top: 28px;
      padding: 14px 32px;
      background: #4299e1;
      color: #fff;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📶</div>
    <h1>会社Wi-Fiに接続してください</h1>
    <p>このツールは会社のWi-Fi接続中のみ<br>ご利用いただけます。</p>
    <div class="hint">
      スマートフォンのWi-Fi設定から<br>
      会社のWi-Fiに接続後、<br>
      再度アクセスしてください。
    </div>
    <button class="retry-btn" onclick="location.reload()">再試行</button>
  </div>
</body>
</html>
