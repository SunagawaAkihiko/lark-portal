<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>給与・出勤管理</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <!-- PDFダウンロード用ライブラリ -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    /* ==================== 変数・リセット ==================== */
    :root {
      --bg:          #fdf6ec;
      --text:        #4a3f35;
      --muted:       #8c7c6b;
      --primary:     #e76f51;
      --primary-lt:  #fcece8;
      --card-bg:     #fff0e3;
      --border:      #dcbfa6;
      --brown-dark:  #4a3f35;
      --brown-mid:   #6b4f3a;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Zen Kaku Gothic New', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      /* bodyをflexコンテナにして高さを100dvhに固定し、各タブが残りの高さを使えるようにする */
      /* overflow:clip はhiddenと同様に描画クリップするが、スクロールコンテナを作らないため */
      /* position:sticky の基準がズレる問題を防ぐ */
      height: 100dvh;
      overflow: clip;
      display: flex;
      flex-direction: column;
    }
    button { cursor: pointer; font-family: inherit; }
    input, select, textarea { font-family: inherit; }
    .hidden { display: none !important; }

    /* ==================== ページヘッダー ==================== */
    .page-header {
      background: var(--brown-dark);
      color: white;
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      position: sticky;
      top: 0;
      z-index: 50;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .page-header .title { font-size: 1.05rem; font-weight: 700; flex: 1; }
    .page-header .subtitle { font-size: 0.75rem; opacity: 0.7; }
    /* ==================== 更新アラートバナー ==================== */
    #update-alerts { display: flex; flex-direction: column; }
    .alert-banner {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.55rem 1rem;
      font-size: 0.83rem;
      font-weight: 700;
    }
    .alert-banner.warn  { background: #fff3cd; color: #856404; border-bottom: 1px solid #ffc107; }
    .alert-banner.info  { background: #d1ecf1; color: #0c5460; border-bottom: 1px solid #bee5eb; }
    .alert-banner .alert-close {
      margin-left: auto; background: none; border: none;
      opacity: 0.5; font-size: 1rem; padding: 0 0.2rem;
    }
    .alert-banner .alert-close:hover { opacity: 1; }

    /* ==================== メインタブナビ ==================== */
    .main-tabs {
      display: flex;
      background: #ede0d4;
      border-bottom: 2px solid var(--border);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .main-tab {
      flex: 1;
      min-width: 80px;
      padding: 0.7rem 0.4rem;
      border: none;
      background: transparent;
      color: var(--brown-mid);
      font-size: 0.82rem;
      font-weight: 700;
      white-space: nowrap;
      transition: all 0.18s;
      border-bottom: 3px solid transparent;
    }
    .main-tab.active { color: var(--primary); border-bottom-color: var(--primary); background: rgba(231,111,81,0.06); }
    .main-tab i { display: block; font-size: 1.1rem; margin-bottom: 0.15rem; }

    /* ==================== タブコンテンツ共通 ==================== */
    .tab-content { display: none; }
    /* activeタブはflexコンテナとして残りの高さをすべて使う（スクロールはタブ内で発生させる） */
    .tab-content.active {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      /* overflow:clip はhiddenと同様にクリップするがスクロールコンテナを作らず */
      /* 内部のposition:sticky が正しいスクロールコンテナ（*-scroll）を基準にできる */
      overflow: clip;
    }

    /* ==================== コントロールバー ==================== */
    /* flex子（tab-content.active の中）なので sticky 不要 — kintai-scroll がスクロールしても ctrl-bar は動かない */
    .ctrl-bar {
      display: flex;
      align-items: center;
      flex-wrap: nowrap;
      gap: 0.5rem;
      /* height+box-sizing:border-box で padding込みの高さを固定し全タブを同じ高さに統一する */
      /* overflow:hidden でネイティブ描画が高さを超えても見た目に影響しないようにする     */
      height: 3.2rem;
      box-sizing: border-box;
      overflow: hidden;
      padding: 0.5rem 0.8rem;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .ctrl-bar label { font-size: 0.82rem; font-weight: 700; color: var(--muted); }
    .ctrl-bar input[type=month],
    .ctrl-bar select {
      padding: 0.35rem 0.5rem;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      font-size: 0.88rem;
      background: white;
      color: var(--text);
    }
    /* モバイルのネイティブ描画で input/select/button の高さがバラつくため明示的に統一する */
    /* box-sizing:border-box で border・padding込みの高さを固定する */
    .ctrl-bar .btn-primary,
    .ctrl-bar .btn-secondary,
    .ctrl-bar input[type=month],
    .ctrl-bar select { height: 2.2rem; box-sizing: border-box; }
    /* 月入力欄はデフォルト幅が広いためデスクトップ・モバイル共通で幅を固定する */
    #salary-month, #kintai-month, #treatment-month { width: 118px; }
    .btn-primary {
      padding: 0.38rem 0.9rem;
      border-radius: 6px;
      border: none;
      background: var(--primary);
      color: white;
      font-size: 0.88rem;
      font-weight: 700;
    }
    .btn-primary:hover { opacity: 0.88; }
    .btn-secondary {
      padding: 0.38rem 0.9rem;
      border-radius: 6px;
      border: 1.5px solid var(--brown-mid);
      background: white;
      color: var(--brown-mid);
      font-size: 0.88rem;
      font-weight: 700;
    }
    .btn-secondary:hover { background: #f0e8e0; }

    /* ==================== ローディング・エラー表示 ==================== */
    .status-area { padding: 1.5rem 1rem; text-align: center; color: var(--muted); font-size: 0.9rem; }
    .status-area.error { color: #c0392b; }
    .spinner {
      display: inline-block; width: 1.4rem; height: 1.4rem;
      border: 3px solid var(--border); border-top-color: var(--primary);
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 0.4rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ==================== ▼ タブ1: 給与一覧表 ==================== */
    /* 真の2カラム分割方式:                                           */
    /*   固定パネルは横方向に一切スクロールしない（overflow:hidden）    */
    /*   データパネルだけが縦横スクロールを担当（overflow:auto）         */
    /*   縦スクロール同期は JS で frozen テーブルに translateY を付与   */
    /*   frozen パネルの border-right はパネル自体が動かないため常に表示 */
    .salary-scroll {
      display: flex; flex-direction: column;
      flex: 1; min-height: 0; padding: 0;
    }
    /* PDF用の印刷ヘッダーは画面では非表示（PDF生成時にインラインで表示） */
    .salary-print-header { display: none; }

    /* ── テーブルスクロールラッパー（給与一覧表・出勤簿で共有） ── */
    /* パネル分割方式を廃止し、1枚のテーブル + position:sticky で固定列を実現する。        */
    /* 2テーブル方式では行高さのサブピクセル蓄積により横罫線がズレる問題が発生したため廃止。 */
    .table-scroll-wrap { flex: 1; min-height: 0; overflow: auto; }

    /* ── 給与一覧テーブル ── */
    /* border-separate でセルボーダーを各セル固有にし、レンダリングの一貫性を保つ */
    .salary-table {
      border-collapse: separate; border-spacing: 0;
      font-size: 0.8rem; background: white; width: 100%;
    }
    .salary-table th, .salary-table td {
      border-right: 1px solid #bbb; border-bottom: 1px solid #bbb;
      padding: 3px 6px; text-align: right; white-space: nowrap;
    }
    .salary-table tr > :first-child { border-left: 1px solid #bbb; }
    .salary-table thead tr:first-child th { border-top: 1px solid #bbb; }
    /* ヘッダーを縦スクロール時に固定する（background必須：tbody行が透けないようにする） */
    .salary-table thead th { position: sticky; top: 0; z-index: 4; background: #e8d8c4; }
    /* セクション最初の行に上罫線を表示して前セクションとの区切りを示す */
    .salary-table .sec-start td { border-top: 1px solid #bbb; }
    /* 項目名列（sticky left:0 で左端に固定する） */
    .salary-table .col-item {
      position: sticky; left: 0; z-index: 2;
      text-align: left; min-width: 88px; font-weight: 500; background: #f5ede0;
    }
    .salary-table th.col-item { background: #e8d8c4; font-weight: 700; }
    /* 固定列ヘッダーは sticky-top と sticky-left を兼ねる角セルとして最高 z-index を設定 */
    .salary-table thead th.col-item { z-index: 6; }
    /* スタッフ名ヘッダー */
    .salary-table .col-staff { min-width: 82px; background: #f2e8dc; font-weight: 700; text-align: center; }
    /* 合計列 */
    .salary-table .col-total { background: #fdf0e0 !important; font-weight: 700; min-width: 82px; }
    /* 行ハイライト */
    .salary-table .row-kintai td { background: #f0f5f8; }
    .salary-table .row-gross  td { background: #eef6e8; font-weight: 700; }
    .salary-table .row-net    td { background: #fff8e1; font-weight: 700; font-size: 0.88rem; }
    .salary-table .row-ref    td { background: #f5f5f5; color: var(--muted); font-size: 0.75rem; }
    /* 全tdに白背景を設定（各行クラスがより高い詳細度で上書きする） */
    .salary-table td { background: white; }
    /* ゼロ値 */
    .salary-table td.zero { color: #ccc; font-weight: normal; }

    .print-toolbar {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0.6rem 1rem;
      background: #f7f0e8;
      border-bottom: 1px solid var(--border);
    }
    .print-toolbar .month-label { font-weight: 700; font-size: 0.95rem; color: var(--brown-dark); flex: 1; }

    /* ==================== ▼ タブ2: 有休管理 ==================== */
    /* flex: 1 + min-height: 0 + overflow-y: auto で縦スクロールを発生させる */
    .leave-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 0.8rem;
      padding: 0.8rem;
      overflow-y: auto;
      flex: 1;
      min-height: 0;
      align-content: start;
    }
    .leave-card {
      background: white;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 0.85rem 1rem;
    }
    .leave-card .lc-name { font-weight: 700; font-size: 0.95rem; margin-bottom: 0.45rem; }
    .leave-card .lc-bar-wrap {
      background: #f0e8dc; border-radius: 99px; height: 10px; margin-bottom: 0.5rem; overflow: hidden;
    }
    .leave-card .lc-bar { height: 100%; background: var(--primary); border-radius: 99px; transition: width 0.4s; }
    .leave-card .lc-nums {
      display: flex; justify-content: space-between;
      font-size: 0.78rem; color: var(--muted); margin-bottom: 0.5rem;
    }
    .leave-card .lc-nums .rem { font-size: 1.1rem; font-weight: 700; color: var(--text); }
    .leave-card .lc-next { font-size: 0.76rem; color: var(--muted); margin-bottom: 0.4rem; }
    .leave-card .lc-expiring {
      font-size: 0.76rem; color: var(--muted);
      padding: 0.2rem 0; margin-bottom: 0.5rem;
    }
    .leave-card .lc-expiring.warn {
      color: #b7610a; background: #fff3e0;
      border: 1px solid #ffcc80; border-radius: 5px;
      padding: 0.2rem 0.5rem;
    }
    /* カード名前行：氏名と付与履歴ボタンを横並びにする */
    .leave-card .lc-name-row {
      display: flex; align-items: center; gap: 0.4rem; margin-bottom: 0.45rem;
    }
    .leave-card .lc-name { font-weight: 700; font-size: 0.95rem; margin-bottom: 0; flex: 1; min-width: 0; }
    .leave-card .btn-history {
      flex-shrink: 0;
      padding: 0.15rem 0.5rem; border-radius: 5px;
      border: 1px solid #a0aec0; background: #f7fafc; color: #4a5568;
      font-size: 0.72rem; font-weight: 700; cursor: pointer; white-space: nowrap;
    }
    .leave-card .btn-history:hover { background: #e2e8f0; }
    .leave-card .btn-grant {
      width: 100%; padding: 0.35rem;
      border-radius: 6px; border: 1.5px solid var(--primary);
      background: var(--primary-lt); color: var(--primary);
      font-size: 0.82rem; font-weight: 700;
    }
    .leave-card .btn-grant:hover { background: var(--primary); color: white; }

    /* 5日取得義務セクション */
    .ob-section {
      margin: 0.5rem 0 0.5rem;
      border: 1px solid #dde;
      border-radius: 7px;
      overflow: hidden;
      font-size: 0.76rem;
    }
    .ob-header {
      /* ヘッダー部分：薄い青紫系背景でセクション見出しを示す */
      background: #eef2ff;
      color: #3730a3;
      font-weight: 700;
      padding: 0.2rem 0.55rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      cursor: pointer;
      user-select: none;
    }
    .ob-header .ob-toggle-icon {
      margin-left: auto;
      font-size: 0.65rem;
      opacity: 0.6;
      transition: transform 0.2s;
    }
    .ob-header.collapsed .ob-toggle-icon { transform: rotate(-90deg); }
    .ob-body { padding: 0.35rem 0.55rem; display: flex; flex-direction: column; gap: 0.3rem; }
    .ob-body.hidden { display: none; }
    /* 各義務期間の行 */
    .ob-period {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
      padding: 0.3rem 0.4rem;
      border-radius: 5px;
      border: 1px solid #e0e0e0;
      background: #fafafa;
    }
    /* 達成済み：緑枠 */
    .ob-period.ob-met    { border-color: #a5d6a7; background: #f1f8f1; }
    /* 進行中（未達成）：オレンジ枠 */
    .ob-period.ob-active { border-color: #ffcc80; background: #fffde7; }
    /* 未達成で期間終了：赤枠 */
    .ob-period.ob-missed { border-color: #ef9a9a; background: #fff5f5; }

    .ob-period-dates { font-size: 0.7rem; color: var(--muted); }
    .ob-progress-row {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .ob-pbar-wrap {
      flex: 1;
      background: #e0e0e0;
      border-radius: 99px;
      height: 7px;
      overflow: hidden;
    }
    .ob-pbar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.4s;
    }
    /* 達成済みは緑、進行中はオレンジ、未達成は赤 */
    .ob-met .ob-pbar-fill    { background: #4caf50; }
    .ob-active .ob-pbar-fill { background: #ff9800; }
    .ob-missed .ob-pbar-fill { background: #f44336; }
    .ob-count { font-weight: 700; white-space: nowrap; }
    .ob-met .ob-count    { color: #2e7d32; }
    .ob-active .ob-count { color: #e65100; }
    .ob-missed .ob-count { color: #c62828; }
    /* 達成・未達成バッジ */
    .ob-badge {
      font-size: 0.68rem;
      font-weight: 700;
      padding: 0.05rem 0.35rem;
      border-radius: 99px;
      white-space: nowrap;
    }
    .ob-badge-met    { background: #c8e6c9; color: #1b5e20; }
    .ob-badge-active { background: #fff3e0; color: #bf360c; }
    .ob-badge-missed { background: #ffcdd2; color: #b71c1c; }
    /* 対象外スタッフ向けメッセージ（年10日未満付与） */
    .ob-na { font-size: 0.72rem; color: var(--muted); padding: 0.15rem 0.55rem; }

    /* 付与履歴モーダル */
    .history-modal-box {
      background: white; border-radius: 14px; padding: 1.25rem;
      width: 100%; max-width: 480px; max-height: 80vh;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      display: flex; flex-direction: column; gap: 0.75rem;
    }
    .history-modal-title {
      font-size: 1rem; font-weight: 700; color: var(--brown-dark);
      display: flex; align-items: center; justify-content: space-between;
    }
    .history-table-wrap { overflow-y: auto; flex: 1; min-height: 0; }
    .history-table {
      width: 100%; border-collapse: collapse; font-size: 0.83rem;
    }
    .history-table th {
      background: #f5ede4; color: var(--brown-dark);
      padding: 0.4rem 0.6rem; font-weight: 700; text-align: left;
      border-bottom: 2px solid var(--border);
      position: sticky; top: 0;
    }
    .history-table td {
      padding: 0.4rem 0.6rem; border-bottom: 1px solid var(--border);
      color: var(--text);
    }
    .history-table tr:last-child td { border-bottom: none; }
    /* 有効期限切れの行はグレーアウトする */
    .history-table tr.expired td { color: var(--muted); text-decoration: line-through; }
    .history-days-badge {
      display: inline-block; min-width: 2rem; text-align: center;
      font-weight: 700; background: #e8f5e9; color: #2e7d32;
      border-radius: 4px; padding: 0.05rem 0.3rem;
    }
    .history-empty {
      text-align: center; color: var(--muted); font-size: 0.88rem; padding: 1.5rem 0;
    }

    /* 有休付与モーダル */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45); z-index: 200;
      display: flex; align-items: center; justify-content: center; padding: 1rem;
    }
    .modal-box {
      background: white; border-radius: 14px; padding: 1.5rem;
      width: 100%; max-width: 360px; box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    .modal-box h3 { font-size: 1rem; font-weight: 700; margin-bottom: 1rem; color: var(--brown-dark); }
    .modal-field { margin-bottom: 0.8rem; }
    .modal-field label { display: block; font-size: 0.82rem; font-weight: 700; color: var(--muted); margin-bottom: 0.25rem; }
    .modal-field input, .modal-field select, .modal-field textarea {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      box-sizing: border-box;
      min-width: 0;
      padding: 0.45rem 0.6rem;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      font-size: 0.9rem;
    }
    /* time-input-wrapがvisual幅を決定し、内部inputがはみ出してもクリップする */
    .time-input-wrap {
      display: block;
      width: 100%;
      box-sizing: border-box;
      overflow: hidden;
      border: 1.5px solid var(--border);
      border-radius: 6px;
    }
    /* ラッパー内のinputはborderなし・幅100%でラッパーに完全収納する */
    .time-input-wrap input[type=time] {
      display: block;
      width: 100%;
      max-width: 100%;
      box-sizing: border-box;
      min-width: 0;
      border: none;
      border-radius: 0;
      outline: none;
      padding: 0.45rem 0.6rem;
      font-size: 0.9rem;
      background: transparent;
      -webkit-appearance: none;
      appearance: none;
    }
    .modal-btns { display: flex; gap: 0.6rem; margin-top: 1rem; }
    .modal-btns button { flex: 1; padding: 0.55rem; border-radius: 7px; font-weight: 700; font-size: 0.9rem; border: none; }
    .modal-btns .btn-ok { background: var(--primary); color: white; }
    .modal-btns .btn-ok:hover { opacity: 0.88; }
    .modal-btns .btn-cancel { background: #f0e8e0; color: var(--brown-mid); }

    /* ==================== ▼ タブ3: 出勤簿 ==================== */
    /* 給与一覧表と同じ真の2カラム分割方式を採用 */
    .kintai-scroll {
      display: flex; flex-direction: column;
      flex: 1; min-height: 0; padding: 0;
    }
    .kintai-print-header { display: none; }
    .kintai-table {
      border-collapse: separate; border-spacing: 0;
      font-size: 0.8rem; background: white; width: 100%;
    }
    .kintai-table th, .kintai-table td {
      border-right: 1px solid #ccc; border-bottom: 1px solid #ccc;
      padding: 4px 6px; text-align: center; white-space: nowrap;
    }
    .kintai-table tr > :first-child { border-left: 1px solid #ccc; }
    .kintai-table thead tr:first-child th { border-top: 1px solid #ccc; }
    /* ヘッダーを縦スクロール時に固定する */
    .kintai-table thead th { position: sticky; top: 0; z-index: 3; background: #f2e8dc; }
    .kintai-table th { background: #f2e8dc; font-weight: 700; }
    .kintai-table td { background: white; }
    /* 日付列を sticky left:0 で左端に固定する（1テーブル sticky 方式） */
    .kintai-table .kintai-date {
      position: sticky; left: 0; z-index: 2;
      text-align: left; font-weight: 700; background: white;
    }
    /* 日付列ヘッダーは sticky-top + sticky-left の角セルとして最高 z-index を設定 */
    .kintai-table thead .kintai-date { z-index: 6; background: #f2e8dc; }
    .kintai-table tr.sat td { background: #eef4fb; }
    .kintai-table tr.sun td { background: #fdf0f0; }
    .kintai-table tr.sat .kintai-date  { background: #eef4fb; }
    .kintai-table tr.sun .kintai-date  { background: #fdf0f0; }
    .kintai-table tr.leave-row   .kintai-date { background: #e8f5e9; }
    .kintai-table tr.absence-row .kintai-date { background: #fce4ec; }
    /* ── 出勤簿 コントロールバー: ラベル・スタッフ選択のモバイル調整 ── */
    @media (max-width: 640px) {
      #tab-kintai .ctrl-bar label { font-size: 0.72rem; white-space: nowrap; }
      #kintai-staff { flex: 1; min-width: 0; }
    }
    .kintai-table .col-attend { color: #1a6e2e; font-weight: 700; }
    .kintai-table .col-leave  { color: #7b2d8b; font-weight: 700; }
    .kintai-table .summary-row td { background: #fdf0e0; font-weight: 700; border-top: 2px solid #aaa; }
    /* 有休・欠勤行のスタイル */
    .kintai-table tr.leave-row td { background: #e8f5e9; }
    .kintai-table tr.absence-row td { background: #fce4ec; }
    .leave-badge { display:inline-block; padding:1px 6px; border-radius:4px; font-size:0.78rem; font-weight:700; }
    .leave-badge.yuukyu { background:#c8e6c9; color:#2e7d32; }
    .leave-badge.kekkin  { background:#ffcdd2; color:#c62828; }
    /* 出勤簿行編集ボタン */
    .kintai-edit-btn {
      background: none; border: 1px solid #ccc; border-radius: 4px;
      color: #888; font-size: 0.75rem; padding: 1px 5px; cursor: pointer; line-height: 1.4;
    }
    /* 本人確認ステータスバー */
    .confirm-bar-confirmed {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 10px; background: #e8f5e9; border-radius: 6px;
      border: 1px solid #a5d6a7; color: #2e7d32;
      font-size: 0.8rem; font-weight: 700;
    }
    .confirm-bar-confirmed .confirm-bar-date {
      font-weight: 400; color: #388e3c; margin-left: 4px;
    }
    .confirm-bar-unconfirmed {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 10px; background: #fff8e1; border-radius: 6px;
      border: 1px solid #ffe082; color: #e65100;
      font-size: 0.8rem; font-weight: 700;
    }
    .kintai-edit-btn:hover { background: #f0e8dc; border-color: #a0896c; color: #5a3e2b; }
    /* 出勤簿編集モーダル内の削除ボタン */
    .modal-btns .btn-delete { background: #fce4ec; color: #c62828; flex: none; padding: 0.55rem 1rem; }
    /* ==================== ▼ タブ4: 設定 ==================== */
    /* flex: 1 + min-height: 0 + overflow-y: auto で縦スクロールを発生させる */
    .settings-wrap { padding: 1rem; max-width: 700px; margin: 0 auto; overflow-y: auto; flex: 1; min-height: 0; }
    .settings-section {
      background: white; border: 1.5px solid var(--border);
      border-radius: 10px; margin-bottom: 1.2rem; overflow: hidden;
    }
    .settings-section-title {
      background: var(--brown-dark); color: white;
      font-weight: 700; font-size: 0.88rem; padding: 0.55rem 0.9rem;
      display: flex; align-items: center; gap: 0.4rem;
    }
    .settings-body { padding: 0.8rem; }
    .settings-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.55rem; flex-wrap: wrap; }
    .settings-row label { font-size: 0.82rem; color: var(--muted); font-weight: 700; min-width: 100px; }
    .settings-row input[type=text],
    .settings-row input[type=number],
    .settings-row input[type=month] {
      padding: 0.35rem 0.5rem; border: 1.5px solid var(--border); border-radius: 6px; font-size: 0.88rem; width: 120px;
    }
    .staff-acc-item { border-bottom: 1px solid var(--border); }
    .staff-acc-item:last-child { border-bottom: none; }
    .staff-acc-hdr {
      display: flex; align-items: center; padding: 0.55rem 0.8rem;
      cursor: pointer; gap: 0.5rem; user-select: none;
    }
    .staff-acc-hdr:hover { background: #f9f2ea; }
    .staff-acc-hdr .acc-name { flex: 1; font-weight: 700; font-size: 0.9rem; }
    .staff-acc-hdr .acc-arrow { color: var(--muted); transition: transform 0.2s; }
    .staff-acc-hdr.open .acc-arrow { transform: rotate(90deg); }
    .staff-acc-body { padding: 0.5rem 0.8rem 0.8rem; background: #fdf8f3; display: none; }
    .staff-acc-body.open { display: block; }
    .history-list { list-style: none; margin-bottom: 0.5rem; }
    .history-list li {
      display: flex; align-items: center; gap: 0.4rem;
      padding: 0.25rem 0; font-size: 0.83rem; border-bottom: 1px dashed #e8ddd3;
    }
    .history-list li:last-child { border-bottom: none; }
    .history-list .hl-from { font-weight: 700; min-width: 72px; }
    .history-list .hl-val  { flex: 1; }
    .history-list .btn-del-hist {
      border: none; background: none; color: #c0392b; font-size: 0.9rem; padding: 0 0.2rem;
    }
    .add-hist-row { display: flex; gap: 0.4rem; flex-wrap: wrap; align-items: center; margin-top: 0.4rem; }
    .add-hist-row input {
      padding: 0.3rem 0.4rem; border: 1.5px solid var(--border); border-radius: 5px; font-size: 0.83rem;
    }
    .add-hist-row input[type=month]  { width: 130px; }
    .add-hist-row input[type=number] { width: 100px; }
    .add-hist-row .btn-add-hist {
      padding: 0.3rem 0.65rem; border-radius: 5px; border: none;
      background: var(--brown-mid); color: white; font-size: 0.82rem; font-weight: 700;
    }
    .resident-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; margin-bottom: 0.5rem; }
    .resident-grid .rg-cell label { display: block; font-size: 0.72rem; color: var(--muted); text-align: center; margin-bottom: 2px; }
    .resident-grid .rg-cell input {
      width: 100%; padding: 0.25rem 0.3rem; border: 1.5px solid var(--border);
      border-radius: 4px; font-size: 0.78rem; text-align: right;
    }
    .settings-save-bar {
      position: sticky; bottom: 0; background: var(--bg);
      border-top: 1px solid var(--border); padding: 0.65rem 1rem;
      display: flex; gap: 0.6rem; align-items: center;
    }
    .settings-save-bar .save-status { font-size: 0.82rem; color: #1a8c4e; margin-left: auto; }
    .settings-save-bar .save-status.err { color: #c0392b; }

    /* ==================== ▼ タブ5: 処遇改善加算 ==================== */
    /* タブ全体スクロール（display:flex を使わずブロックレイアウトにすることでoverflow-y:autoが正しく機能する） */
    .treatment-wrap {
      flex: 1; min-height: 0; overflow-y: auto;
      padding: 0.9rem 1rem;
    }
    .treatment-wrap > * + * { margin-top: 0.9rem; }
    /* 報酬総額入力カード */
    .treatment-input-card {
      background: white;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 0.85rem 1rem;
      display: flex; flex-direction: column; gap: 0.5rem;
    }
    .treatment-input-card .card-title {
      font-weight: 700; font-size: 0.88rem; color: var(--brown-mid);
      display: flex; align-items: center; gap: 0.4rem;
    }
    .treatment-input-card .amount-row {
      display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap;
    }
    .treatment-input-card .amount-row label { font-size: 0.82rem; font-weight: 700; color: var(--muted); }
    .treatment-input-card .total-input {
      padding: 0.4rem 0.6rem;
      border: 1.5px solid var(--border); border-radius: 6px;
      font-size: 1rem; text-align: right; width: 160px; color: var(--text);
    }
    .treatment-input-card .total-input:focus { outline: none; border-color: var(--primary); }
    .treatment-input-card .unit { font-size: 0.88rem; color: var(--muted); }
    .treatment-hint {
      font-size: 0.82rem; color: var(--brown-mid);
      display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap;
    }
    .treatment-hint .hint-label { color: var(--muted); }
    .treatment-hint .hint-value { font-weight: 700; font-size: 0.96rem; color: var(--primary); }
    /* スタッフ一覧テーブル（枠なし・全員表示） */
    .treatment-table {
      width: 100%; border-collapse: collapse; font-size: 0.85rem;
      background: white;
    }
    .treatment-table th {
      background: #e8d8c4; padding: 0.5rem 0.7rem;
      text-align: center; font-weight: 700; color: var(--brown-dark);
      border-bottom: 1.5px solid var(--border);
    }
    .treatment-table td {
      padding: 0.45rem 0.7rem; border-bottom: 1px solid #eee;
      vertical-align: middle;
    }
    .treatment-table tr:last-child td { border-bottom: none; }
    .treatment-table .col-name { text-align: left; font-weight: 500; }
    .treatment-table .col-type { text-align: center; }
    .treatment-table .col-ratio { text-align: center; width: 110px; }
    .treatment-table .col-amount { text-align: right; width: 120px; }
    /* 種別バッジ */
    .badge-treatment     { display: inline-block; padding: 0.1rem 0.5rem; border-radius: 99px;
                           font-size: 0.72rem; font-weight: 700;
                           background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
    .badge-treatment-dep { display: inline-block; padding: 0.1rem 0.5rem; border-radius: 99px;
                           font-size: 0.72rem; font-weight: 700;
                           background: #e3f2fd; color: #1565c0; border: 1px solid #90caf9; }
    /* 割合入力欄 */
    .ratio-input {
      width: 80px; padding: 0.3rem 0.4rem; text-align: right;
      border: 1.5px solid var(--border); border-radius: 5px;
      font-size: 0.88rem; color: var(--text);
    }
    .ratio-input:focus { outline: none; border-color: var(--primary); }
    .ratio-input:read-only { background: #f5f0eb; color: var(--muted); cursor: default; }
    /* 合計行 */
    .treatment-table .row-total td {
      background: #f5ede0; font-weight: 700;
      border-top: 1.5px solid var(--border);
    }
    /* 反映ボタンバー */
    .treatment-apply-bar {
      display: flex; align-items: center; gap: 0.8rem;
      justify-content: center; flex-wrap: wrap;
    }
    .btn-apply {
      padding: 0.6rem 1.6rem;
      border-radius: 8px; border: none;
      background: var(--primary); color: white;
      font-size: 0.95rem; font-weight: 700;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .btn-apply:hover { opacity: 0.88; }
    .btn-apply:disabled { opacity: 0.5; cursor: not-allowed; }
    .apply-status { font-size: 0.82rem; color: #1a8c4e; }
    .apply-status.err { color: #c0392b; }

    /* ==================== PDF出力スタイル ==================== */
    /* html2pdf.js でPDF化する際に印刷ヘッダーを見せるための補助スタイル */
    /* （通常時は display:none のままで、downloadXxx() 関数内で一時的に表示する） */
    .salary-print-header, .kintai-print-header { display: none; text-align: center; margin-bottom: 0.8rem; }
    .salary-print-header h2, .kintai-print-header h2 { font-size: 1.1rem; font-weight: 700; }
    .salary-print-header p,  .kintai-print-header p  { font-size: 0.85rem; }
  </style>
</head>
<body>

<!-- ページヘッダー -->
<header class="page-header">
  <i class="fa-solid fa-file-invoice-dollar" style="font-size:1.2rem"></i>
  <span class="title">給与・出勤管理</span>
  <span class="subtitle">合同会社 GLAD Life Create</span>
</header>

<!-- 更新アラートバナー -->
<div id="update-alerts"></div>

<!-- メインタブ -->
<nav class="main-tabs">
  <button class="main-tab active" data-tab="salary">
    <i class="fa-solid fa-table"></i>給与一覧表
  </button>
  <button class="main-tab" data-tab="treatment">
    <i class="fa-solid fa-hand-holding-heart"></i>処遇改善加算
  </button>
  <button class="main-tab" data-tab="leave">
    <i class="fa-solid fa-umbrella-beach"></i>有休管理
  </button>
  <button class="main-tab" data-tab="kintai">
    <i class="fa-solid fa-clock"></i>出勤簿
  </button>
  <button class="main-tab" data-tab="settings">
    <i class="fa-solid fa-gear"></i>設定
  </button>
</nav>

<!-- ===================================================== -->
<!-- タブ1: 給与一覧表                                     -->
<!-- ===================================================== -->
<section id="tab-salary" class="tab-content active">
  <div class="ctrl-bar">
    <label>対象月</label>
    <input type="month" id="salary-month">
    <button class="btn-primary" onclick="loadSalary()">
      <i class="fa-solid fa-rotate"></i> 取得
    </button>
  </div>
  <div class="print-toolbar hidden" id="salary-print-bar">
    <span class="month-label" id="salary-print-label"></span>
    <button class="btn-secondary" id="salary-pdf-btn" onclick="downloadSalary()">
      <i class="fa-solid fa-file-pdf"></i> PDFをDL
    </button>
  </div>
  <div id="salary-status" class="status-area">月を選択して「取得」を押してください。</div>
  <div class="salary-scroll hidden" id="salary-scroll">
    <!-- PDF出力時のみ表示するタイトルヘッダー -->
    <div class="salary-print-header">
      <h2 id="salary-print-title"></h2>
      <p id="salary-print-sub"></p>
    </div>
    <!-- 1テーブル sticky 方式: col-sec・col-item 列を position:sticky で左固定する -->
    <div class="table-scroll-wrap">
      <table class="salary-table" id="salary-table"></table>
    </div>
  </div>
</section>

<!-- ===================================================== -->
<!-- タブ2: 有休管理                                       -->
<!-- ===================================================== -->
<section id="tab-leave" class="tab-content">
  <div class="ctrl-bar">
    <button class="btn-primary" onclick="loadLeave()">
      <i class="fa-solid fa-rotate"></i> 最新状況を取得
    </button>
  </div>
  <div id="leave-status" class="status-area">「最新状況を取得」を押してください。</div>
  <div class="leave-grid hidden" id="leave-grid"></div>
</section>

<!-- 有休付与履歴モーダル -->
<div class="modal-overlay hidden" id="history-modal" onclick="if(event.target===this)closeHistoryModal()">
  <div class="history-modal-box">
    <div class="history-modal-title">
      <span><i class="fa-solid fa-clock-rotate-left"></i> 付与履歴 — <span id="history-staff-name"></span></span>
      <button onclick="closeHistoryModal()" style="background:none;border:none;cursor:pointer;font-size:1.2rem;color:var(--muted);">✕</button>
    </div>
    <div id="history-status" class="status-area" style="display:none;"></div>
    <div class="history-table-wrap">
      <table class="history-table" id="history-table">
        <thead>
          <tr>
            <th>付与日</th>
            <th>有効期限</th>
            <th>付与日数</th>
            <th>備考</th>
          </tr>
        </thead>
        <tbody id="history-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- 有休付与モーダル -->
<div class="modal-overlay hidden" id="grant-modal">
  <div class="modal-box">
    <h3><i class="fa-solid fa-plus-circle"></i> 特別付与</h3>
    <div class="modal-field">
      <label>スタッフ</label>
      <input type="text" id="grant-staff-name" readonly>
      <input type="hidden" id="grant-open-id">
    </div>
    <div class="modal-field">
      <label>付与日</label>
      <input type="date" id="grant-date">
    </div>
    <div class="modal-field">
      <label>付与日数</label>
      <input type="number" id="grant-days" min="0.5" step="0.5" value="10">
    </div>
    <div class="modal-field">
      <label>有効期限</label>
      <input type="date" id="grant-expiry">
    </div>
    <div class="modal-field">
      <label>備考</label>
      <input type="text" id="grant-memo" placeholder="任意">
    </div>
    <div id="grant-status" class="status-area" style="padding:0.4rem 0;font-size:0.82rem;text-align:left;"></div>
    <div class="modal-btns">
      <button class="btn-ok" onclick="submitGrant()">付与する</button>
      <button class="btn-cancel" onclick="closeGrantModal()">キャンセル</button>
    </div>
  </div>
</div>

<!-- 出勤簿編集モーダル -->
<div class="modal-overlay hidden" id="kintai-edit-modal">
  <div class="modal-box">
    <h3 id="kintai-edit-title">出勤簿 編集</h3>
    <!-- 各フィールドに id を付与して openKintaiEdit の visibleField に応じて表示/非表示を切り替える -->
    <div class="modal-field" id="edit-attend-field">
      <label>出勤時刻</label>
      <!-- ラッパーdivでoverflow:hiddenを使い、時刻inputのネイティブ幅を強制的にクリップして揃える -->
      <div class="time-input-wrap">
        <input type="time" id="edit-attend-time">
      </div>
    </div>
    <div class="modal-field" id="edit-leave-field">
      <label>退勤時刻</label>
      <div class="time-input-wrap">
        <input type="time" id="edit-leave-time">
      </div>
    </div>
    <div class="modal-field" id="edit-type-field">
      <label>種別</label>
      <select id="edit-leave-type">
        <option value="">通常出勤</option>
        <option value="有休">有休</option>
        <option value="欠勤">欠勤</option>
      </select>
    </div>
    <!-- 残業時間フィールド：個別スタッフ表示時のみ表示する（30分刻みプルダウン） -->
    <div class="modal-field" id="edit-overtime-field" style="display:none">
      <label>残業時間</label>
      <!-- value は Lark 残業申請テーブルの単一選択オプション文字列と完全一致させる -->
      <select id="edit-overtime" style="width:110px">
        <option value="0">なし</option>
        <option value="0.5">0:30</option>
        <option value="1">1:00</option>
        <option value="1.5">1:30</option>
        <option value="2.0">2:00</option>
      </select>
    </div>
    <div id="kintai-edit-status" class="status-area" style="padding:0.3rem 0;font-size:0.82rem;text-align:left;"></div>
    <div class="modal-btns">
      <button class="btn-ok" onclick="saveKintaiEdit()"><i class="fa-solid fa-floppy-disk"></i> 保存</button>
      <button class="btn-delete" onclick="deleteKintaiDay()"><i class="fa-solid fa-trash"></i> 削除</button>
      <button class="btn-cancel" onclick="closeKintaiEditModal()">キャンセル</button>
    </div>
  </div>
</div>

<!-- ===================================================== -->
<!-- タブ3: 出勤簿                                         -->
<!-- ===================================================== -->
<section id="tab-kintai" class="tab-content">
  <div class="ctrl-bar">
    <label>対象月</label>
    <input type="month" id="kintai-month">
    <label>スタッフ</label>
    <select id="kintai-staff">
      <option value="">（全員）</option>
    </select>
    <button class="btn-primary" onclick="loadKintai()">
      <i class="fa-solid fa-rotate"></i> 取得
    </button>
  </div>
  <div class="print-toolbar hidden" id="kintai-print-bar">
    <span class="month-label" id="kintai-print-label"></span>
    <button class="btn-secondary" id="kintai-pdf-btn" onclick="downloadKintai()">
      <i class="fa-solid fa-file-pdf"></i> PDFをDL
    </button>
  </div>
  <div id="kintai-status" class="status-area">月とスタッフを選択して「取得」を押してください。</div>
  <div class="kintai-scroll hidden" id="kintai-scroll">
    <!-- PDF出力時のみ表示するタイトルヘッダー -->
    <div class="kintai-print-header">
      <h2 id="kintai-print-title"></h2>
      <p id="kintai-print-sub"></p>
    </div>
    <!-- 個別スタッフ表示時の本人確認ステータスバー（全員マトリクス時は非表示） -->
    <div id="kintai-confirm-bar" style="display:none; padding:6px 8px 2px;"></div>
    <!-- 1テーブル sticky 方式: 日付列を position:sticky で左固定する -->
    <div class="table-scroll-wrap">
      <table class="kintai-table" id="kintai-table"></table>
    </div>
  </div>
</section>

<!-- ===================================================== -->
<!-- タブ5: 処遇改善加算                                   -->
<!-- ===================================================== -->
<section id="tab-treatment" class="tab-content">
  <div class="ctrl-bar">
    <label>対象月</label>
    <input type="month" id="treatment-month">
    <button class="btn-primary" onclick="loadTreatment()">
      <i class="fa-solid fa-rotate"></i> 取得
    </button>
  </div>
  <div id="treatment-status" class="status-area">月を選択して「取得」を押してください。</div>
  <div class="treatment-wrap hidden" id="treatment-wrap">
    <!-- 報酬総額入力カード -->
    <div class="treatment-input-card">
      <div class="card-title">
        <i class="fa-solid fa-yen-sign"></i> 報酬総額
      </div>
      <div class="amount-row">
        <label>報酬総額</label>
        <input type="number" id="treatment-total" class="total-input" min="0" step="1" placeholder="0">
        <span class="unit">円</span>

<script>
// ============================================================
// API設定
// ============================================================
const API_BASE = window.location.hostname === 'localhost' ? 'http://localhost:3000' : 'https://attendance-app-irf1.onrender.com';

// ============================================================
// 初期化
// ============================================================
(function init() {
  const now = new Date();
  // 初期表示月を現在月に設定する
  const currentMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  document.getElementById('salary-month').value = currentMonth;
  document.getElementById('kintai-month').value  = currentMonth;
  showUpdateAlerts(now.getMonth() + 1);
  loadStaffList();
  loadSettingsUI();
})();

// ============================================================
// タブ切り替え
// ============================================================
document.querySelectorAll('.main-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.main-tab').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(s => s.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
    // タブ切り替え後にctrl-barの高さを再確認して統一する
    equalizeCtrlBars();
  });
});

// ============================================================
// 更新アラートバナー
// ============================================================
function showUpdateAlerts(month) {
  const wrap = document.getElementById('update-alerts');
  const alerts = [];
  if (month === 3 || month === 4) {
    alerts.push({ type:'warn', icon:'fa-shield-halved',
      msg:'【4月更新】社会保険料率の確認・更新が必要な時期です。「設定」タブで新料率を設定してください。' });
  }
  if (month === 5 || month === 6) {
    alerts.push({ type:'warn', icon:'fa-coins',
      msg:'【6月更新】住民税の年度切替が必要な時期です。「設定」タブで各スタッフの住民税(6月〜翌5月)を更新してください。' });
  }
  if (month === 8 || month === 9) {
    alerts.push({ type:'info', icon:'fa-chart-bar',
      msg:'【9〜10月】標準報酬月額の改定時期です。改定がある場合は「設定」タブで更新してください。' });

// ============================================================
// スタッフリスト取得
// ============================================================
let staffList = [];

async function loadStaffList() {
  try {
    const r = await fetch(`${API_BASE}/api/salary/staff-list`);
    const j = await r.json();
    if (!j.ok) throw new Error(j.error);
    staffList = j.list;
    populateStaffSelect(staffList);
    // 設定が先に読み込まれていた場合、スタッフ別設定を再描画する
    // （loadSettingsUI と loadStaffList の競合対策）
    if (currentSettings) renderStaffSettings(currentSettings);
  } catch(e) {
    console.warn('スタッフリスト取得失敗:', e.message);
  }
}

function populateStaffSelect(list) {
  const sel = document.getElementById('kintai-staff');
  // 「全員」オプションを残して追加する
  while (sel.options.length > 1) sel.remove(1);
  list.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.staffName;
    opt.textContent = s.staffName;
    sel.appendChild(opt);
  });
}

// ============================================================
// 数値フォーマット
// ============================================================
function fmtNum(n) {
  if (n === null || n === undefined || isNaN(n)) return '';
  return Number(n).toLocaleString('ja-JP');
}

// タブ1: 給与一覧表

async function loadSalary() {

  setStatus('salary', 'loading', '給与データを取得中…');
  document.getElementById('salary-scroll').classList.add('hidden');
  document.getElementById('salary-print-bar').classList.add('hidden');
  try {
    const r = await fetch(`${API_BASE}/api/salary/monthly?month=${month}`);

    if (!j.ok) throw new Error(j.error || '取得失敗');
    renderSalaryTable(j.data, month);
    setStatus('salary', '');
    document.getElementById('salary-scroll').classList.remove('hidden');
    document.getElementById('salary-print-bar').classList.remove('hidden');
    document.getElementById('salary-print-label').textContent =
      `${month.replace('-','年')}月分 給与支給控除一覧表`;
  } catch(e) {
    setStatus('salary', 'error', `エラー: ${e.message}`);

}

function renderSalaryTable(rows, month) {

    '三原 和樹', '吉山 康子', '田中 謹礼', '柏木 愛',   '小路 悦子',
    '荒木 由美子', '秋吉 布美子',

    const ia = STAFF_ORDER.indexOf(a.staffName);
    const ib = STAFF_ORDER.indexOf(b.staffName);
    // どちらもリストにある → 指定順
    if (ia !== -1 && ib !== -1) return ia - ib;
    // 片方だけリストにある → リストにある方を前に
    if (ia !== -1) return -1;
    if (ib !== -1) return  1;
    // どちらもリストにない（新規入職者） → サーバー返却順を維持
    return 0;

  // ── 行（項目）定義 ─ PDF順序に準拠 ──────────────────────────
  const rowDefs = [
    // ── 勤怠区分 ──
    { k:'kintai.出勤日数',   label:'出　勤　日　数', sec:'kintai', fmt:'int' },
    { k:'kintai.有休日数',   label:'有　給　日　数', sec:'kintai', fmt:'int' },
    { k:'kintai.欠勤',       label:'欠　勤　日　数', sec:'kintai', fmt:'int' },
    { k:null,                label:'特　別　休　暇', sec:'kintai', fmt:'int' },
    { k:'kintai.実働時間計', label:'出　勤　時　間', sec:'kintai', fmt:'str' },
    { k:'kintai.残業計',     label:'残　業　時　間', sec:'kintai', fmt:'str' },
    { k:null,                label:'休　出　日　数', sec:'kintai', fmt:'int' },
    { k:null,                label:'休　出　時　間', sec:'kintai', fmt:'str' },
    { k:null,                label:'深　夜　残　業', sec:'kintai', fmt:'str' },
    { k:'kintai.遅刻回数',   label:'遅　早　回　数', sec:'kintai', fmt:'int' },
    { k:null,                label:'遅　早　時　間', sec:'kintai', fmt:'str' },
    { k:null,                label:'60ｈ超残業',    sec:'kintai', fmt:'str' },
    { k:'kintai.内夜勤',     label:'夜　勤　回　数', sec:'kintai', fmt:'int' },
    // ── 支給 ──
    { k:'基本給',       label:'基　　本　　給',   sec:'pay' },
    { k:'役職手当',     label:'役　職　手　当',   sec:'pay' },
    { k:'資格手当',     label:'資　格　手　当',   sec:'pay' },
    { k:'夜勤手当',     label:'夜　勤　手　当',   sec:'pay' },
    { k:'割増手当',     label:'割　増　手　当',   sec:'pay' },
    { k:'深夜手当',     label:'深　夜　手　当',   sec:'pay' },
    { k:'年末年始手当', label:'年末年始手当',     sec:'pay' },
    { k:'調整手当',     label:'調　整　手　当',   sec:'pay' },
    { k:'処遇改善手当', label:'処遇改善手当',     sec:'pay' },
    { k:'業績手当',     label:'業　績　手　当',   sec:'pay' },
    { k:'有給手当',     label:'有　給　手　当',   sec:'pay' },
    { k:'残業手当',     label:'残　業　手　当',   sec:'pay' },
    { k:null,           label:'休　日　出　勤',   sec:'pay' },
    { k:null,           label:'深　夜　残　業',   sec:'pay' },
    { k:null,           label:'60ｈ超残業',       sec:'pay' },
    { k:'遅早控除',     label:'遅　早　控　除',   sec:'pay' },
    { k:'欠勤控除',     label:'欠　勤　控　除',   sec:'pay' },

    { k:'非課税計',     label:'非　課　税　計',   sec:'pay' },
    { k:'総支給額',     label:'総　支　給　額',   sec:'pay', hl:'gross' },
    // ── 控除・差引 ──
    { k:'健康保険',           label:'健　康　保　険',       sec:'ded' },
    { k:'介護保険',           label:'介　護　保　険',       sec:'ded' },
    { k:'厚生年金',           label:'厚　生　年　金',       sec:'ded' },
    { k:null,                 label:'年　金　基　金',       sec:'ded' },
    { k:'子ども子育て支援金', label:'子育て支援金',         sec:'ded' },

  // ── 区分ラベル定義（col-sec 列の色・ラベルに使用） ──
  const secDef = {
    kintai: { label: '勤怠区分', cls: 'sec-kintai' },

  // ── ヘッダー行（区分・項目・スタッフ全員・合計） ──

  // ── データ行（全カラムを1行にまとめて生成） ──

    // セクション最初の行に sec-start クラスを付与（CSS で上罫線を表示するため）

    const sd = secDef[def.sec];
    html += `<tr class="${trCls}">`;
    html += `<td class="col-item">${def.label}</td>`;

    // スタッフ値列
    let total = 0;
    rows.forEach(row => {

    // 合計列（文字列・勤怠数値・null・参考欄は合計不要）

    html += noTotal
      ? '<td class="col-total"></td>'
      : `<td class="col-total ${total === 0 ? 'zero' : ''}">${total ? fmtNum(total) : ''}</td>`;
    html += '</tr>';
  });

  html += '</tbody>';
  tbl.innerHTML = html;

// ============================================================
// 共通PDFレンダラー:
//   - 縦方向はA4横1ページに必ず収める（スケール自動計算）
//   - 横方向が溢れた場合は次ページへ水平分割して追加する
// ============================================================
async function renderToPdf(element, filename) {
  // A4横向き・余白8mm後の利用可能寸法（mm）
  const PAGE_W = 281; // 297 - 8*2
  const PAGE_H = 194; // 210 - 8*2
  const MARGIN = 8;

  // html2canvas でフル解像度キャプチャ（scale:2 = 高解像度）
  const canvas = await html2canvas(element, { scale: 2, useCORS: true, logging: false });

  // CSSピクセル換算（scale:2 なので÷2）
  const csW = canvas.width  / 2;
  const csH = canvas.height / 2;

  // 幅に合わせたスケール係数（mm/cssPixel）
  const scaleW = PAGE_W / csW;
  // 幅で合わせたとき縦が収まらない場合は縦優先スケールに切り替える
  const finalScale = csH * scaleW > PAGE_H ? PAGE_H / csH : scaleW;

  // 1ページあたりのCSSピクセル幅
  const pageW_px = PAGE_W / finalScale;
  const numPages = Math.ceil(csW / pageW_px);

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'landscape' });

  for (let i = 0; i < numPages; i++) {
    if (i > 0) pdf.addPage();

    // このページで切り取るキャンバス領域（scale:2座標系）
    const srcX = Math.round(i * pageW_px * 2);
    const srcW = Math.round(Math.min(pageW_px, csW - i * pageW_px) * 2);

    // スライスキャンバスを作成してPDFへ追加
    const slice = document.createElement('canvas');
    slice.width  = srcW;
    slice.height = canvas.height;
    slice.getContext('2d').drawImage(canvas, srcX, 0, srcW, canvas.height, 0, 0, srcW, canvas.height);

    // スライス幅に対応するmm幅（最終ページは短くなる）
    const imgW = (srcW / 2) * finalScale;
    const imgH = csH * finalScale;
    pdf.addImage(slice.toDataURL('image/png'), 'PNG', MARGIN, MARGIN, imgW, imgH);
  }

  pdf.save(filename);
}

async function downloadSalary() {
  const btn        = document.getElementById('salary-pdf-btn');
  const label      = document.getElementById('salary-print-label').textContent;
  const scroll     = document.getElementById('salary-scroll');
  const tabContent = scroll.closest('.tab-content');
  const body       = document.body;

  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 生成中…';

  // position:sticky の thead/col-item はキャプチャ時に重複描画されるため static にリセットする
  const tmpStyle = document.createElement('style');
  tmpStyle.id = 'pdf-sticky-reset';
  tmpStyle.textContent = `
    .salary-table thead th { position: static !important; top: auto !important; }
    .salary-table .col-item { position: static !important; left: auto !important; }
    .table-scroll-wrap { overflow: visible !important; }
  `;
  document.head.appendChild(tmpStyle);

  // 印刷ヘッダーにタイトルをセットして一時表示する
  const header = scroll.querySelector('.salary-print-header');
  if (header) {
    document.getElementById('salary-print-title').textContent = label;
    document.getElementById('salary-print-sub').textContent   = '合同会社 GLAD Life Create';
    header.style.display = 'block';
  }

  // html2canvasがコンテンツ全体をキャプチャできるよう body・tabContent・scroll の
  // flex制約・overflow・height を一時解除する（解除しないと表示領域分しかキャプチャされない）
  const saved = {
    bodyH:   body.style.height,       bodyOv:  body.style.overflow,
    tabFlex: tabContent.style.flex,   tabH:    tabContent.style.height,  tabOv: tabContent.style.overflow,
    sFlx:    scroll.style.flex,       sH:      scroll.style.height,
    sW:      scroll.style.width,      sOv:     scroll.style.overflow,    sMxH:  scroll.style.maxHeight,
  };
  body.style.height         = 'auto';
  body.style.overflow       = 'visible';
  tabContent.style.flex     = 'none';
  tabContent.style.height   = 'auto';
  tabContent.style.overflow = 'visible';
  scroll.style.flex         = 'none';
  scroll.style.height       = 'auto';
  scroll.style.width        = 'max-content';
  scroll.style.overflow     = 'visible';
  scroll.style.maxHeight    = 'none';

  try {
    await renderToPdf(scroll, `${label}.pdf`);
  } finally {
    // 必ず元の状態に戻す
    body.style.height         = saved.bodyH;
    body.style.overflow       = saved.bodyOv;
    tabContent.style.flex     = saved.tabFlex;
    tabContent.style.height   = saved.tabH;
    tabContent.style.overflow = saved.tabOv;
    scroll.style.flex         = saved.sFlx;
    scroll.style.height       = saved.sH;
    scroll.style.width        = saved.sW;
    scroll.style.overflow     = saved.sOv;
    scroll.style.maxHeight    = saved.sMxH;
    document.getElementById('pdf-sticky-reset')?.remove();
    if (header) header.style.display = '';
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-file-pdf"></i> PDFをDL';
  }
}

/**
 * 5日取得義務セクションのHTMLを生成する。
 * 各付与期間ごとに取得状況（達成・進行中・未達成）をプログレスバーと共に表示する。
 * @param {Array|undefined} periods - サーバーから返された obligationPeriods 配列
 * @returns {string} HTML文字列
 */
function buildObligationSection(periods) {
  // 対象期間がない場合（年10日未満付与のスタッフ）は義務対象外を簡潔に表示する
  if (!periods || periods.length === 0) {
    return `
      <div class="ob-section">
        <div class="ob-header">
          <i class="fa-solid fa-scale-balanced"></i> 5日取得義務
          <span class="ob-toggle-icon"><i class="fa-solid fa-chevron-down"></i></span>
        </div>
        <div class="ob-body ob-na hidden">年10日未満付与のため義務対象外</div>
      </div>`;
  }

  // 全期間中に未達成（期間終了済み）のものがあるかチェックしてヘッダー色を変える
  const hasMissed  = periods.some(p => !p.isActive && !p.obligationMet);
  // 現在進行中の期間に5日未取得があるかチェック
  const hasWarning = periods.some(p => p.isActive && !p.obligationMet);

  let headerStyle = '';
  if (hasMissed) {
    headerStyle = 'background:#fff0f0;color:#b91c1c;border-bottom:1px solid #fca5a5;';
  } else if (hasWarning) {
    headerStyle = 'background:#fffbeb;color:#92400e;border-bottom:1px solid #fde68a;';
  }

  const periodsHtml = periods.map(p => {
    // 取得状況に応じてクラスを決定する
    const cls = p.obligationMet ? 'ob-met' : (p.isActive ? 'ob-active' : 'ob-missed');
    // プログレスバーの幅（5日が100%）
    const barPct = Math.min(100, (p.usedInPeriod / 5) * 100);
    // 期間ラベル（例: 2024-10-01 → 2025-09-30）
    const label = `基準日 ${p.grantDate}（義務期間 ～ ${p.periodEnd}）`;
    // バッジテキストと色
    let badge = '';
    if (p.obligationMet) {
      badge = `<span class="ob-badge ob-badge-met"><i class="fa-solid fa-check"></i> 達成</span>`;
    } else if (p.isActive) {
      // 残り日数を計算して表示する（期間終了までの日数）
      const daysLeft = Math.ceil((new Date(p.periodEnd) - new Date()) / 86400000);
      badge = `<span class="ob-badge ob-badge-active">期間中（残${daysLeft}日）</span>`;
    } else {
      badge = `<span class="ob-badge ob-badge-missed"><i class="fa-solid fa-triangle-exclamation"></i> 未達成</span>`;
    }
    return `
      <div class="ob-period ${cls}">
        <div class="ob-period-dates">${label}</div>
        <div class="ob-progress-row">
          <div class="ob-pbar-wrap">
            <div class="ob-pbar-fill" style="width:${barPct.toFixed(1)}%"></div>
          </div>
          <span class="ob-count">${p.usedInPeriod}/5日</span>
          ${badge}
        </div>
      </div>`;
  }).join('');

  return `
    <div class="ob-section">
      <div class="ob-header" style="${headerStyle}">
        <i class="fa-solid fa-scale-balanced"></i> 5日取得義務
        <span class="ob-toggle-icon"><i class="fa-solid fa-chevron-down"></i></span>
      </div>
      <div class="ob-body hidden">${periodsHtml}</div>
    </div>`;
}

// 履歴モーダルを開き、指定スタッフの付与履歴をサーバーから取得して表示する
async function openHistoryModal(openId, staffName) {
  document.getElementById('history-staff-name').textContent = staffName;
  document.getElementById('history-tbody').innerHTML = '';
  const statusEl = document.getElementById('history-status');
  statusEl.style.display = '';
  statusEl.className = 'status-area loading';
  statusEl.innerHTML = '<span class="spinner"></span> 取得中…';
  document.getElementById('history-modal').classList.remove('hidden');

  try {
    const r = await fetch(`${API_BASE}/api/paid-leave/history?openId=${encodeURIComponent(openId)}`);
    const j = await r.json();
    if (!j.ok) throw new Error(j.error || '取得失敗');

    statusEl.style.display = 'none';
    const tbody = document.getElementById('history-tbody');
    const today = new Date().toISOString().slice(0, 10);

    if (j.grants.length === 0) {
      tbody.innerHTML = `<tr><td colspan="4" class="history-empty">付与履歴がありません</td></tr>`;
      return;
    }

    // 付与日の新しい順（降順）で表示する
    [...j.grants].reverse().forEach(g => {
      const isExpired = g.expiryDate && g.expiryDate < today;
      const tr = document.createElement('tr');
      if (isExpired) tr.className = 'expired';
      tr.innerHTML = `
        <td>${g.grantDate}</td>
        <td>${g.expiryDate || '—'}${isExpired ? ' <span style="color:#e74c3c;font-size:0.72rem;">失効</span>' : ''}</td>
        <td><span class="history-days-badge">${g.days}</span> 日</td>
        <td style="color:var(--muted)">${g.memo || '—'}</td>
      `;
      tbody.appendChild(tr);
    });
  } catch (e) {
    statusEl.className = 'status-area error';
    statusEl.textContent = `エラー: ${e.message}`;
  }
}

// 履歴モーダルを閉じる
function closeHistoryModal() { document.getElementById('history-modal').classList.add('hidden'); }

function openGrantModal(openId, staffName) {
  document.getElementById('grant-open-id').value    = openId;
  document.getElementById('grant-staff-name').value = staffName;
  document.getElementById('grant-date').value = new Date().toISOString().slice(0,10);
  const exp = new Date(); exp.setFullYear(exp.getFullYear() + 2);
  document.getElementById('grant-expiry').value = exp.toISOString().slice(0,10);
  document.getElementById('grant-status').textContent = '';
  document.getElementById('grant-modal').classList.remove('hidden');
}
function closeGrantModal() { document.getElementById('grant-modal').classList.add('hidden'); }

async function submitGrant() {
  const openId     = document.getElementById('grant-open-id').value;
  const grantDate  = document.getElementById('grant-date').value;
  const days       = document.getElementById('grant-days').value;
  const expiryDate = document.getElementById('grant-expiry').value;
  const memo       = document.getElementById('grant-memo').value;
  const statusEl   = document.getElementById('grant-status');
  if (!openId || !grantDate || !days) { statusEl.textContent = '⚠ 必須項目を入力してください。'; return; }
  statusEl.innerHTML = '<span class="spinner"></span> 登録中…';
  try {
    const r = await fetch(`${API_BASE}/api/paid-leave/grant`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ staffOpenId:openId, grantDate, days, expiryDate, memo }),
    });
    const j = await r.json();
    if (!j.ok) throw new Error(j.error || '登録失敗');
    statusEl.textContent = '✅ 付与を登録しました。';
    setTimeout(() => { closeGrantModal(); loadLeave(); }, 1200);

}

// ============================================================
// 出勤簿テーブルレンダリング（1テーブル sticky 列方式）
// 日付列を CSS sticky left:0 で固定し、1枚のテーブルで描画する。
// ============================================================
function renderKintaiTable(records, month, staffName) {
  const tbl = document.getElementById('kintai-table');
  tbl.innerHTML = '';
  const [y, m] = month.split('-').map(Number);
  const daysInMonth = new Date(y, m, 0).getDate();
  const dayOfWeek   = ['日','月','火','水','木','金','土'];

  // 有休・欠勤バッジのHTML生成
  const leaveBadge = type =>
    type === '有休' ? '<span class="leave-badge yuukyu">有休</span>'
    : type === '欠勤' ? '<span class="leave-badge kekkin">欠勤</span>'
    : '';

  // 分を "H:MM" 形式に変換するヘルパー
  const minToHhmm = total => {
    const h = Math.floor(total / 60);
    const m = total % 60;
    return `${h}:${String(m).padStart(2, '0')}`;
  };
  // 小数時間（overtime 等）を "H:MM" 形式に変換するヘルパー
  const hoursToHhmm = h => minToHhmm(Math.round(h * 60));
  // "H:MM" 文字列を分に変換するヘルパー
  // 画面表示と同じ workingHours 文字列から集計することで表示値と合計を一致させる
  const hhmmToMin = str => {
    if (!str) return 0;
    const parts = str.split(':');
    return (parseInt(parts[0], 10) || 0) * 60 + (parseInt(parts[1], 10) || 0);
  };

  if (staffName) {
    // ── 1人の日別一覧（1テーブル：日付列 + 勤怠列を同一行に並べる） ──
    // 個別表示時は本人確認バーを非表示にする（確認状態は全員表示のヘッダー行にのみ表示）
    document.getElementById('kintai-confirm-bar').style.display = 'none';

    const byDate = {};
    records.forEach(r => { byDate[r.date] = r; });
    // openId は records 内の任意レコードから取得する（日付レコードがない日の編集でも使用）
    const staffOpenId = records[0]?.openId || '';

    let html = `<thead><tr>
      <th class="kintai-date">日付</th>
      <th>出勤</th><th>退勤</th><th>実働時間</th><th>残業</th><th>遅刻</th><th>早退</th>
    </tr></thead><tbody>`;

    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr    = `${month}-${String(d).padStart(2,'0')}`;
      const dow        = new Date(dateStr).getDay();
      const rec        = byDate[dateStr];
      // 残業時間を "H:MM" 文字列に変換してモーダルに渡す（小数時間 → H:MM）
      const overtimeStr = rec?.overtime ? hoursToHhmm(rec.overtime) : '';

      let rowCls = dow === 0 ? 'sun' : dow === 6 ? 'sat' : '';
      if (rec?.leaveType === '有休') rowCls += ' leave-row';
      else if (rec?.leaveType === '欠勤') rowCls += ' absence-row';

      // 押したセルに対応するフィールドだけ編集モーダルを開く
      // basePayload は全フィールドの現在値（非表示フィールドの既存値保持のため全て渡す）
      const basePayload = `'${staffOpenId}','${staffName}','${dateStr}','${rec?.attendTime||''}','${rec?.leaveTime||''}','${rec?.leaveType||''}','${overtimeStr}'`;
      if (rec?.leaveType) {
        // 有休・欠勤行：日付セルとバッジセルで種別を変更する
        html += `<tr class="${rowCls}">
          <td class="kintai-date" style="cursor:pointer" onclick="openKintaiEdit(${basePayload},'all')">${d}日 (${dayOfWeek[dow]})</td>
          <td colspan="6" style="text-align:center;cursor:pointer" onclick="openKintaiEdit(${basePayload},'type')">${leaveBadge(rec.leaveType)}</td>
        </tr>`;
      } else {
        // 通常行：各セルが対応するフィールドを編集する。実働・遅刻・早退は計算値のためクリック不可
        html += `<tr class="${rowCls}">
          <td class="kintai-date" style="cursor:pointer" onclick="openKintaiEdit(${basePayload},'all')">${d}日 (${dayOfWeek[dow]})</td>
          <td class="col-attend" style="cursor:pointer" onclick="openKintaiEdit(${basePayload},'attend')">${rec?.attendTime || ''}</td>
          <td class="col-leave"  style="cursor:pointer" onclick="openKintaiEdit(${basePayload},'leave')">${rec?.leaveTime  || ''}</td>
          <td>${rec?.workingHours || ''}</td>
          <td style="cursor:pointer" onclick="openKintaiEdit(${basePayload},'overtime')">${rec?.overtime ? hoursToHhmm(rec.overtime) : ''}</td>
          <td style="${rec?.lateMin?'color:#e74c3c;font-weight:700':''}">${rec?.lateMin ? rec.lateMin+'分' : ''}</td>
          <td>${rec?.earlyMin ? rec.earlyMin+'分' : ''}</td>
        </tr>`;
      }
    }

    // 集計行
    const workRecs       = records.filter(r => !r.leaveType);
    const dayDays        = workRecs.filter(r => (r.dayCount   || 0) > 0).length;
    const nightDays      = workRecs.filter(r => (r.nightCount || 0) > 0).length;
    const workDays       = dayDays + nightDays;
    const yuukyuDays     = records.filter(r => r.leaveType === '有休').length;
    const kekkinDays     = records.filter(r => r.leaveType === '欠勤').length;
    const workMinTotal   = workRecs.reduce((s, r) => s + hhmmToMin(r.workingHours), 0);
    const overtimeHTotal = workRecs.reduce((s, r) => s + (r.overtime || 0), 0);
    const lateMinTotal   = records.reduce((s, r) => s + (r.lateMin  || 0), 0);
    const earlyMinTotal  = records.reduce((s, r) => s + (r.earlyMin || 0), 0);
    const summaryParts = [];
    if (dayDays > 0)   summaryParts.push(`日勤 ${dayDays}日`);
    if (nightDays > 0) summaryParts.push(`夜勤 ${nightDays}日`);
    summaryParts.push(`計 ${workDays}日`);
    if (yuukyuDays > 0) summaryParts.push(`有休 ${yuukyuDays}日`);
    if (kekkinDays > 0) summaryParts.push(`欠勤 ${kekkinDays}日`);

    html += `</tbody><tfoot><tr class="summary-row">
      <td class="kintai-date" style="text-align:left">合計</td>
      <td colspan="2" style="text-align:left">${summaryParts.join(' / ')}</td>
      <td>${workMinTotal > 0 ? minToHhmm(workMinTotal) : ''}</td>
      <td>${overtimeHTotal > 0 ? hoursToHhmm(overtimeHTotal) : ''}</td>
      <td style="${lateMinTotal > 0 ? 'color:#e74c3c' : ''}">${lateMinTotal > 0 ? lateMinTotal+'分' : ''}</td>
      <td>${earlyMinTotal > 0 ? earlyMinTotal+'分' : ''}</td>
    </tr></tfoot>`;

    tbl.innerHTML = html;

  } else {
    // ── 全員マトリクス（1テーブル：日付列 + スタッフ列を同一行に並べる） ──
    // 全員表示時は confirm-bar エリア自体は非表示（確認状態はtheadの行内に表示）
    document.getElementById('kintai-confirm-bar').style.display = 'none';

    // ── スタッフ列の表示順を固定する（リスト外の新規入職者は末尾に追加） ──
    const KINTAI_STAFF_ORDER = [
      '中村 夢永', '砂川 竜馬', '榊 志満子',  '池田 祐子', '砂川 繁',
      '秋吉 布美子', '小路 悦子', '川原 将也', '中村 ともみ', '井上 ひかる',
      '鞍馬 玲菜',  '奥田 愛美', '中村 考',   '中川 いずみ', '御手洗 悦子',
      '松山 朋美',  '吉山 康子', '三原 和樹', '荒木 由美子', '柏木 愛',
      '田中 謹礼',
    ];
    const allNames = [...new Set(records.map(r => r.staffName).filter(Boolean))];
    const names = allNames.sort((a, b) => {
      const ia = KINTAI_STAFF_ORDER.indexOf(a);
      const ib = KINTAI_STAFF_ORDER.indexOf(b);
      if (ia !== -1 && ib !== -1) return ia - ib;
      if (ia !== -1) return -1;
      if (ib !== -1) return  1;
      return a.localeCompare(b, 'ja');
    });
    if (names.length === 0) {
      tbl.innerHTML = '<tr><td>データがありません。</td></tr>';
      return;
    }
    const matrix = {};
    records.forEach(r => {
      if (!matrix[r.date]) matrix[r.date] = {};
      matrix[r.date][r.staffName] = r;
    });
    const nameToOpenId = {};
    records.forEach(r => { if (r.openId && r.staffName) nameToOpenId[r.staffName] = r.openId; });
    const colSummary = {};
    names.forEach(n => { colSummary[n] = { day: 0, night: 0, workMin: 0, yuukyu: 0, overtimeMin: 0 }; });
    records.forEach(r => {
      if (!colSummary[r.staffName]) return;
      if (r.leaveType === '有休') {
        colSummary[r.staffName].yuukyu += 1;
      } else if (!r.leaveType) {
        colSummary[r.staffName].day        += r.dayCount   || 0;
        colSummary[r.staffName].night      += r.nightCount || 0;
        colSummary[r.staffName].workMin    += hhmmToMin(r.workingHours);
        colSummary[r.staffName].overtimeMin += Math.round((r.overtime || 0) * 60);
      }
    });

    // thead を2行構成にする:
    //   1行目: 本人確認ステータス行（id="confirm-th-{index}" で後から非同期更新）
    //   2行目: スタッフ氏名行
    let html = '<thead>';
    // 確認状態行（初期は「…」。非同期で取得後に更新する）
    html += '<tr><th class="kintai-date" style="font-size:0.7rem;font-weight:400;color:#888">本人確認</th>';
    names.forEach((n, i) => { html += `<th id="kintai-confirm-th-${i}" style="font-size:0.7rem;font-weight:400;color:#aaa">…</th>`; });
    html += '</tr>';
    // スタッフ氏名行
    html += '<tr><th class="kintai-date">日付</th>';
    names.forEach(n => { html += `<th>${n}</th>`; });
    html += '</tr></thead><tbody>';

    // 確認状態を一括取得してヘッダーセルを更新する（非同期）
    (async () => {
      try {
        const res = await fetch(`${API_BASE}/api/attendance/confirm-all?yearMonth=${month}`);
        const j   = await res.json();
        // openId → 確認情報のマップを作る
        const confirmMap = {};
        (j.list || []).forEach(item => { confirmMap[item.openId] = item; });

        names.forEach((n, i) => {
          const openId = nameToOpenId[n];
          const th     = document.getElementById(`kintai-confirm-th-${i}`);
          if (!th) return;
          const info = openId ? confirmMap[openId] : null;
          if (info) {
            // 確認済み: 緑チェックアイコン + 確認完了テキスト
            th.innerHTML = '<i class="fa-solid fa-circle-check" style="color:#2e7d32"></i><br>確認済';
            th.style.color = '#2e7d32';
            th.title = `確認日時: ${new Date(info.confirmedAt).toLocaleString('ja-JP')}`;
          } else {
            // 未確認: グレーテキスト
            th.innerHTML = '未確認';
            th.style.color = '#bbb';
          }
        });
      } catch(e) {
        // 取得失敗時は全員「未確認」表示のままにする
        names.forEach((n, i) => {
          const th = document.getElementById(`kintai-confirm-th-${i}`);
          if (th) { th.textContent = '未確認'; th.style.color = '#bbb'; }
        });
      }
    })();

    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${month}-${String(d).padStart(2,'0')}`;
      const dow     = new Date(dateStr).getDay();
      const rowCls  = dow === 0 ? 'sun' : dow === 6 ? 'sat' : '';

      html += `<tr class="${rowCls}"><td class="kintai-date">${d}日 (${dayOfWeek[dow]})</td>`;
      names.forEach(n => {
        const rec     = matrix[dateStr]?.[n];
        const openId  = rec?.openId || nameToOpenId[n] || '';
        const payload = `'${openId}','${n}','${dateStr}','${rec?.attendTime||''}','${rec?.leaveTime||''}','${rec?.leaveType||''}'`;
        if (rec?.leaveType) {
          html += `<td style="text-align:center;cursor:pointer" onclick="openKintaiEdit(${payload})">${leaveBadge(rec.leaveType)}</td>`;
        } else if (rec) {
          html += `<td style="font-size:0.72rem;cursor:pointer" onclick="openKintaiEdit(${payload})">
            <span class="col-attend">${rec.attendTime}</span>〜<span class="col-leave">${rec.leaveTime||'?'}</span>
          </td>`;
        } else {
          html += `<td style="cursor:pointer" onclick="openKintaiEdit(${payload})"></td>`;
        }
      });
      html += '</tr>';
    }

    html += '</tbody><tfoot><tr class="summary-row"><td class="kintai-date" style="text-align:left">合計</td>';
    names.forEach(n => {
      const s = colSummary[n];
      html += `<td style="font-size:0.72rem;line-height:1.5">日勤${s.day}<br>夜勤${s.night}<br>有休${s.yuukyu > 0 ? s.yuukyu : '0'}<br>残業${s.overtimeMin > 0 ? minToHhmm(s.overtimeMin) : '0'}<br>実働${s.workMin > 0 ? minToHhmm(s.workMin) : '-'}</td>`;
    });
    html += '</tr></tfoot>';

    tbl.innerHTML = html;
  }
}

// 現在編集中のセル情報（openId・date）を保持する
let kintaiEditState = null;

// セルクリック時に呼ばれる
// visibleField: 表示するフィールドを指定する文字列
//   'attend'   → 出勤時刻のみ
//   'leave'    → 退勤時刻のみ
//   'type'     → 種別のみ
//   'overtime' → 残業時間のみ
//   'all'      → 全フィールド（日付セルクリック時）
function openKintaiEdit(openId, staffName, date, attendTime, leaveTime, leaveType, overtime, visibleField) {
  if (!openId) {
    alert('スタッフIDが取得できません。一度「取得」ボタンで再読み込みしてください。');
    return;
  }
  kintaiEditState = { openId, date };
  const [, m, d] = date.split('-');

  // visibleField に応じてタイトルと表示フィールドを切り替える
  const vf = visibleField || 'all';
  const titles = { attend: '出勤時刻 編集', leave: '退勤時刻 編集', type: '種別 変更', overtime: '残業時間 編集', all: '出勤簿 編集' };
  document.getElementById('kintai-edit-title').textContent =
    `${titles[vf] || '出勤簿 編集'} — ${staffName}  ${parseInt(m)}月${parseInt(d)}日`;

  // 各フィールドの表示/非表示を切り替える
  document.getElementById('edit-attend-field').style.display   = (vf === 'attend'   || vf === 'all') ? '' : 'none';
  document.getElementById('edit-leave-field').style.display    = (vf === 'leave'    || vf === 'all') ? '' : 'none';
  document.getElementById('edit-type-field').style.display     = (vf === 'type'     || vf === 'all') ? '' : 'none';
  document.getElementById('edit-overtime-field').style.display = (vf === 'overtime' || vf === 'all') ? '' : 'none';

  // 全フィールドに現在値をセット（非表示フィールドも既存値を保持して API 送信時にデータが消えないようにする）
  document.getElementById('edit-attend-time').value = attendTime || '';
  document.getElementById('edit-leave-time').value  = leaveTime  || '';
  document.getElementById('edit-leave-type').value  = leaveType  || '';
  // overtime は "H:MM" 文字列で渡されるのでプルダウン用の Lark オプション文字列に変換してセットする
  // Lark の選択肢は "0.5","1","1.5","2.0" のため、2時間だけ "2.0" と特別扱いする
  if (overtime) {
    const parts = overtime.split(':');
    const overtimeNum = (parseInt(parts[0], 10) || 0) + (parseInt(parts[1], 10) || 0) / 60;
    const rounded = Math.round(overtimeNum * 2) / 2;
    document.getElementById('edit-overtime').value = rounded === 2 ? '2.0' : String(rounded);
  } else {
    document.getElementById('edit-overtime').value = '0';
  }

  document.getElementById('kintai-edit-status').textContent = '';
  document.getElementById('kintai-edit-modal').classList.remove('hidden');
}

function closeKintaiEditModal() {
  document.getElementById('kintai-edit-modal').classList.add('hidden');
  kintaiEditState = null;
}

// 出勤・有休・欠勤・残業を保存する
async function saveKintaiEdit() {
  if (!kintaiEditState) return;
  const { openId, date } = kintaiEditState;
  const attendTime = document.getElementById('edit-attend-time').value;
  const leaveTime  = document.getElementById('edit-leave-time').value;
  const leaveType  = document.getElementById('edit-leave-type').value;
  const statusEl   = document.getElementById('kintai-edit-status');

  // 残業時間フィールドが表示中の場合のみ送信する
  // select の value は Lark の単一選択オプション文字列そのもの（"0","0.5","1","1.5","2.0"）
  // parseFloat せず文字列のまま送ることで、サーバー側が Lark に直接書き込める
  let overtime = undefined;
  if (document.getElementById('edit-overtime-field').style.display !== 'none') {
    overtime = document.getElementById('edit-overtime').value;
  }

  statusEl.textContent = '保存中...';
  try {
    const body = { openId, date, attendTime, leaveTime, leaveType };
    if (overtime !== undefined) body.overtime = overtime;
    const r = await fetch(`${API_BASE}/api/attendance/admin-edit`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const j = await r.json();
    if (!j.ok) throw new Error(j.error || '保存失敗');
    statusEl.textContent = '✅ 保存しました';
    // 800ms 後にモーダルを閉じて出勤簿を再取得する
    setTimeout(() => { closeKintaiEditModal(); loadKintai(); }, 800);
  } catch(e) {
    statusEl.textContent = '❌ ' + e.message;
  }
}

// 指定日の打刻・有休欠勤をすべて削除する
async function deleteKintaiDay() {
  if (!kintaiEditState) return;
  const { openId, date } = kintaiEditState;
  if (!confirm(`${date}の出勤・有休記録をすべて削除しますか？`)) return;
  const statusEl = document.getElementById('kintai-edit-status');
  statusEl.textContent = '削除中...';
  try {
    const r = await fetch(`${API_BASE}/api/attendance/admin-edit`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ openId, date, attendTime: '', leaveTime: '', leaveType: '' })
    });
    const j = await r.json();
    if (!j.ok) throw new Error(j.error || '削除失敗');
    statusEl.textContent = '✅ 削除しました';
    setTimeout(() => { closeKintaiEditModal(); loadKintai(); }, 800);
  } catch(e) {
    statusEl.textContent = '❌ ' + e.message;
  }
}

async function downloadKintai() {
  const btn        = document.getElementById('kintai-pdf-btn');
  const label      = document.getElementById('kintai-print-label').textContent;
  const scroll     = document.getElementById('kintai-scroll');
  const tabContent = scroll.closest('.tab-content');
  const body       = document.body;

  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 生成中…';

  // position:sticky の thead・kintai-date 列はキャプチャ時に重複描画されるため static にリセットする
  const tmpStyle = document.createElement('style');
  tmpStyle.id = 'pdf-sticky-reset';
  tmpStyle.textContent = `
    .kintai-table thead th { position: static !important; top: auto !important; }
    .kintai-table .kintai-date { position: static !important; left: auto !important; }
    .table-scroll-wrap { overflow: visible !important; }
  `;
  document.head.appendChild(tmpStyle);

  // 印刷ヘッダーを一時表示する
  const header = scroll.querySelector('.kintai-print-header');
  if (header) header.style.display = 'block';

  // html2canvasがコンテンツ全体をキャプチャできるよう body・tabContent・scroll の
  // flex制約・overflow・height を一時解除する
  const saved = {
    bodyH:   body.style.height,       bodyOv:  body.style.overflow,
    tabFlex: tabContent.style.flex,   tabH:    tabContent.style.height,  tabOv: tabContent.style.overflow,
    sFlx:    scroll.style.flex,       sH:      scroll.style.height,
    sW:      scroll.style.width,      sOv:     scroll.style.overflow,    sMxH:  scroll.style.maxHeight,
  };
  body.style.height         = 'auto';
  body.style.overflow       = 'visible';
  tabContent.style.flex     = 'none';
  tabContent.style.height   = 'auto';
  tabContent.style.overflow = 'visible';
  scroll.style.flex         = 'none';
  scroll.style.height       = 'auto';
  scroll.style.width        = 'max-content';
  scroll.style.overflow     = 'visible';
  scroll.style.maxHeight    = 'none';

  try {
    await renderToPdf(scroll, `${label}.pdf`);
  } finally {
    // 必ず元の状態に戻す
    body.style.height         = saved.bodyH;
    body.style.overflow       = saved.bodyOv;
    tabContent.style.flex     = saved.tabFlex;
    tabContent.style.height   = saved.tabH;
    tabContent.style.overflow = saved.tabOv;
    scroll.style.flex         = saved.sFlx;
    scroll.style.height       = saved.sH;
    scroll.style.width        = saved.sW;
    scroll.style.overflow     = saved.sOv;
    scroll.style.maxHeight    = saved.sMxH;
    document.getElementById('pdf-sticky-reset')?.remove();
    if (header) header.style.display = '';
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-file-pdf"></i> PDFをDL';
  }
}

let currentSettings = null;

async function loadSettingsUI() {
  try {
    const r = await fetch(`${API_BASE}/api/salary/settings`);
    const j = await r.json();
    if (!j.ok) throw new Error(j.error);
    currentSettings = j.settings;
    renderInsuranceSettings(currentSettings);
    renderStaffSettings(currentSettings);
  } catch(e) {
    console.error('設定読み込み失敗:', e.message);

function renderInsuranceSettings(settings) {
  const body  = document.getElementById('insurance-body');
  const rates = settings.insuranceRates || [];
  let html = '<ul class="history-list">';
  rates.forEach((rate, i) => {
    html += `<li>
      <span class="hl-from">${rate.effectiveFrom}〜</span>
      <span class="hl-val" style="font-size:0.8rem">
        健保 <b>${(rate.health*100).toFixed(3)}%</b>
        ／介護 <b>${(rate.nursing*100).toFixed(3)}%</b>
        ／厚年 <b>${(rate.pension*100).toFixed(3)}%</b>
        ／子支援 <b>${((rate.childrenSupport||0)*100).toFixed(3)}%</b>
        ${rate.note ? `<small style="color:var(--muted)"> (${rate.note})</small>` : ''}
      </span>
      <button class="btn-del-hist" onclick="deleteInsRate(${i})" title="削除">
        <i class="fa-solid fa-trash-can"></i>
      </button>
    </li>`;
  });
  html += `</ul>
  <div class="add-hist-row">
    <span style="font-size:0.82rem;font-weight:700;color:var(--muted)">新規追加：</span>
    <input type="month" id="ins-from" placeholder="有効開始月">
    <input type="number" id="ins-health"    placeholder="健保率(%)"  step="0.001" style="width:100px">
    <input type="number" id="ins-nursing"   placeholder="介護率(%)"  step="0.001" style="width:100px">
    <input type="number" id="ins-pension"   placeholder="厚年率(%)"  step="0.001" style="width:100px">
    <input type="number" id="ins-children"  placeholder="子支援率(%)" step="0.001" style="width:100px">
    <button class="btn-add-hist" onclick="addInsRate()">追加</button>
  </div>`;
  body.innerHTML = html;
}

function deleteInsRate(idx) {
  if (!confirm('この保険料率設定を削除しますか？')) return;
  currentSettings.insuranceRates.splice(idx, 1);
  renderInsuranceSettings(currentSettings);
}
function addInsRate() {
  const from     = document.getElementById('ins-from').value;
  const health   = parseFloat(document.getElementById('ins-health').value);
  const nursing  = parseFloat(document.getElementById('ins-nursing').value);
  const pension  = parseFloat(document.getElementById('ins-pension').value);
  const children = parseFloat(document.getElementById('ins-children').value);
  if (!from || isNaN(health) || isNaN(pension)) { alert('有効開始月・健康保険率・厚生年金率は必須です。'); return; }
  currentSettings.insuranceRates = currentSettings.insuranceRates || [];
  currentSettings.insuranceRates.push({
    effectiveFrom:   from,
    health:          health / 100,
    nursing:         isNaN(nursing)  ? 0 : nursing  / 100,
    pension:         pension / 100,
    childrenSupport: isNaN(children) ? 0 : children / 100,
  });
  currentSettings.insuranceRates.sort((a,b) => a.effectiveFrom.localeCompare(b.effectiveFrom));
  renderInsuranceSettings(currentSettings);
}

function renderStaffSettings(settings) {
  const wrap = document.getElementById('staff-acc-list');
  wrap.innerHTML = '';

    wrap.innerHTML = '<p style="padding:0.8rem;color:var(--muted);font-size:0.85rem">スタッフ情報を取得中…</p>';
    return;
  }
  staffList.forEach(s => {
    const sid   = s.staffId;
    const sSett = settings.staff?.[sid] || {};
    const item  = document.createElement('div');
    item.className = 'staff-acc-item';
    item.dataset.staffId = sid;
    item.innerHTML = `
      <div class="staff-acc-hdr" onclick="toggleAcc(this)">
        <i class="fa-solid fa-user" style="color:var(--muted)"></i>

function toggleAcc(hdr) {
