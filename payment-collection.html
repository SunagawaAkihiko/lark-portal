<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>入金管理</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      --bg-color:      #fdf6ec;
      --text-color:    #4a3f35;
      --text-muted:    #8c7c6b;
      --primary-color: #e76f51;
      --border-color:  #dcbfa6;
      --card-bg:       #fff0e3;
      --green:         #2a9d8f;
      --green-light:   #e6f7f5;
      --yellow:        #d4a017;
      --yellow-light:  #fdf5e0;
      --red:           #e63946;
      --red-light:     #fde8ea;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { overflow-x: hidden; }
    body {
      font-family: 'Zen Kaku Gothic New', sans-serif;
      background: var(--bg-color);
      color: var(--text-color);
      -webkit-font-smoothing: antialiased;
      padding-bottom: 5rem;
    }
    .hidden { display: none !important; }

    /* ===== ヘッダー ===== */
    .page-header {
      position: sticky; top: 0; z-index: 15;
      background: var(--text-color);
      padding: 0.75rem 1rem;
    }
    .page-header-label {
      color: white;
      font-size: 1.25rem; font-weight: 700;
      display: flex; align-items: center; gap: 0.4rem;
    }

    /* ===== ローディング ===== */
    .loading-screen {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 4rem 1rem; gap: 1rem; color: var(--text-muted);
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border-color);
      border-top-color: var(--primary-color);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== ステータスタブ（3つ） ===== */
    .status-tabs {
      display: flex; gap: 0.4rem;
      padding: 0.75rem 1rem 0;
      max-width: 640px; margin: 0 auto;
    }
    .status-tab {
      flex: 1; padding: 0.5rem 0.2rem;
      border: none; border-radius: 8px;
      font-family: inherit; font-size: 0.8rem; font-weight: 700; cursor: pointer;
      background: var(--card-bg); color: var(--text-muted);
      transition: background 0.2s, color 0.2s;
      white-space: nowrap;
    }
    /* 各タブのアクティブ色 */
    #tabUnpaid.active { background: var(--red);    color: white; }
    #tabUnsent.active { background: var(--yellow);  color: white; }
    #tabSent.active   { background: var(--green);   color: white; }

    /* ===== メインコンテンツ ===== */
    .main-content {
      padding: 0.5rem 1rem; max-width: 640px; margin: 0 auto;
      display: flex; flex-direction: column; gap: 0.5rem;
    }

    /* ===== サマリーバー ===== */
    .summary-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.4rem 0.1rem;
    }
    .summary-text { font-size: 0.82rem; color: var(--text-muted); }
    .summary-text strong { color: var(--text-color); font-size: 1rem; }
    .select-all-btn {
      padding: 0.3rem 0.8rem; border-radius: 6px; border: 1.5px solid var(--border-color);
      background: white; color: var(--text-muted);
      font-family: inherit; font-size: 0.78rem; font-weight: 700; cursor: pointer;
    }

    /* ===== 空表示 ===== */
    .empty-msg {
      text-align: center; padding: 3rem 1rem;
      color: var(--text-muted); font-size: 0.9rem;
    }
    .empty-msg i { display: block; font-size: 2rem; margin-bottom: 0.5rem; }

    /* ===== カード共通 ===== */
    .payment-card {
      background: white;
      border: 1.5px solid var(--border-color);
      border-radius: 14px; overflow: hidden;
      transition: border-color 0.15s, background 0.15s;
    }
    .payment-card-body {
      padding: 0.85rem 1rem;
      display: flex; align-items: center; gap: 0.7rem;
    }

    /* 各状態のボーダー色 */
    .card-unpaid { border-left: 4px solid var(--red); }
    .card-unsent { border-left: 4px solid var(--yellow); }
    .card-sent   { border-left: 4px solid var(--green); }

    /* 選択済み状態 */
    .card-selected {
      background: #f0faf9;
      border-color: var(--green) !important;
    }

    /* タップ可能カード */
    .payment-card.selectable { cursor: pointer; }
    .payment-card.selectable:active { opacity: 0.8; }

    /* ===== チェックボックス ===== */
    .card-check {
      width: 26px; height: 26px; flex-shrink: 0;
      border: 2px solid var(--border-color); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
      color: transparent; background: white;
    }
    .card-check.checked {
      background: var(--green);
      border-color: var(--green);
      color: white;
    }
    .card-check i { font-size: 0.7rem; }

    /* ===== カード情報 ===== */
    .card-info { flex: 1; min-width: 0; }
    .card-name {
      font-size: 1rem; font-weight: 700;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-sub   { font-size: 0.78rem; color: var(--text-muted); margin-top: 0.12rem; }
    .card-email { font-size: 0.72rem; color: var(--text-muted); margin-top: 0.08rem; }

    /* 未入金カード：コンパクト1行レイアウト */
    .payment-card-body--compact {
      padding: 0.55rem 0.8rem;
      align-items: center;
    }
    .card-month {
      flex: 1; min-width: 0;
      font-size: 0.95rem; font-weight: 700;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-date-input {
      flex-shrink: 0; width: 130px;
      padding: 0.22rem 0.3rem;
      border: 1.5px solid var(--border-color); border-radius: 6px;
      font-family: inherit; font-size: 0.8rem; color: var(--text-color);
      background: white;
    }

    /* ===== 金額 ===== */
    .card-amount { flex-shrink: 0; text-align: right; }
    .card-amount-value { font-size: 1rem; font-weight: 700; }

    /* ===== 送信済バッジ ===== */
    .sent-badge {
      flex-shrink: 0;
      padding: 0.28rem 0.55rem; border-radius: 6px;
      font-size: 0.72rem; font-weight: 700;
      background: var(--green-light); color: var(--green);
    }

    /* ===== 単体送信ボタン（入金済未送信用） ===== */
    .send-btn {
      flex-shrink: 0;
      padding: 0.5rem 0.75rem; border-radius: 8px;
      background: var(--green); color: white;
      border: none; font-family: inherit; font-size: 0.85rem; font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ===== 一括処理フローティングバー ===== */
    .bulk-bar {
      position: fixed; bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 100%; max-width: 640px;
      background: var(--text-color);
      padding: 0.85rem 1.25rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between; gap: 1rem;
      z-index: 20;
      border-radius: 16px 16px 0 0;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.2);
    }
    .bulk-count {
      color: white; font-size: 0.9rem; font-weight: 700;
    }
    .bulk-action-btn {
      padding: 0.6rem 1.2rem; border-radius: 10px;
      background: var(--green); color: white;
      border: none; font-family: inherit; font-size: 0.9rem; font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; gap: 0.4rem;
      white-space: nowrap;
    }

    /* ===== モーダル共通 ===== */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 50;
      background: rgba(74,63,53,0.45);
      display: flex; align-items: flex-end; justify-content: center;
    }
    .modal-sheet {
      width: 100%; max-width: 640px;
      background: white; border-radius: 20px 20px 0 0;
      padding: 1.25rem 1.25rem 2.5rem;
      display: flex; flex-direction: column; gap: 0.9rem;
      max-height: 85vh; overflow-y: auto;
    }
    .modal-handle {
      width: 40px; height: 4px; border-radius: 2px;
      background: var(--border-color); margin: 0 auto 0.1rem;
      flex-shrink: 0;
    }
    .modal-title {
      font-size: 1.05rem; font-weight: 700;
      display: flex; align-items: center; gap: 0.5rem;
      flex-shrink: 0;
    }

    /* ===== 一括モーダル ===== */
    .bulk-notice {
      background: var(--bg-color); border-radius: 10px;
      padding: 0.65rem 0.9rem;
      font-size: 0.85rem; color: var(--text-muted);
      flex-shrink: 0;
    }
    .bulk-record-list {
      display: flex; flex-direction: column; gap: 0.35rem;
      overflow-y: auto; flex-shrink: 1;
      max-height: 30vh;
    }
    .bulk-record-item {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.5rem 0.7rem;
      background: var(--card-bg); border-radius: 8px;
    }
    .bulk-record-info { flex: 1; min-width: 0; }
    .bulk-record-name { font-size: 0.85rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bulk-record-sub  { font-size: 0.75rem; color: var(--text-muted); }
    /* 個別発行日の日付入力フィールド */
    .bulk-date-input {
      flex-shrink: 0; width: 130px;
      padding: 0.3rem 0.35rem;
      border: 1.5px solid var(--border-color); border-radius: 6px;
      font-family: inherit; font-size: 0.8rem; color: var(--text-color);
      background: white;
    }
    .bulk-progress {
      text-align: center; padding: 0.5rem;
      font-size: 0.9rem; color: var(--text-muted);
      flex-shrink: 0;
    }

    /* ===== 単体送信モーダル ===== */
    .modal-target {
      background: var(--bg-color); border-radius: 10px;
      padding: 0.75rem 1rem;
      flex-shrink: 0;
    }
    .modal-target-name   { font-size: 1rem; font-weight: 700; }
    .modal-target-sub    { font-size: 0.78rem; color: var(--text-muted); margin-top: 0.2rem; }
    .modal-target-email  { font-size: 0.78rem; color: var(--text-muted); margin-top: 0.1rem; }
    .modal-target-amount { font-size: 1.1rem; font-weight: 700; color: var(--primary-color); margin-top: 0.4rem; }

    /* ===== ボタン ===== */
    .confirm-btn {
      width: 100%; padding: 1rem; flex-shrink: 0;
      background: var(--green); color: white; border: none; border-radius: 12px;
      font-family: inherit; font-size: 1.05rem; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      box-shadow: 0 3px 10px rgba(42,157,143,0.35);
      transition: opacity 0.15s;
    }
    .confirm-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .cancel-btn {
      width: 100%; padding: 0.7rem; flex-shrink: 0;
      background: none; color: var(--text-muted); border: 1px solid var(--border-color);
      border-radius: 10px; font-family: inherit; font-size: 0.9rem; cursor: pointer;
    }

    /* ===== トースト ===== */
    .toast {
      position: fixed; bottom: 2rem; left: 50%;
      transform: translateX(-50%) translateY(1rem);
      background: var(--text-color); color: white;
      padding: 0.65rem 1.4rem; border-radius: 99px;
      font-size: 0.88rem; font-weight: 700;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s, transform 0.25s;
      white-space: nowrap; z-index: 100;
    }
    .toast.show    { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { background: var(--green); }
    .toast.error   { background: #c1121f; }

    /* ===== 横画面 ===== */
    @media (orientation: landscape) {
      .page-header { padding: 0.5rem 1rem; }
      .page-header-label { font-size: 1.1rem; }
    }
  </style>
</head>
<body>

<!-- ページヘッダー（事業所タブなし・タイトルのみ） -->
<div class="page-header">
  <span class="page-header-label">
    <i class="fa-solid fa-yen-sign"></i> 入金管理
  </span>
</div>

<!-- ローディング -->
<div class="loading-screen" id="loadingScreen">
  <div class="spinner"></div>
  <span>読み込み中...</span>
</div>

<!-- ステータスタブ（3つ） -->
<div class="status-tabs hidden" id="statusTabs">
  <button class="status-tab active" id="tabUnpaid" onclick="switchStatus('unpaid')">
    <i class="fa-solid fa-circle-exclamation"></i> 未入金
  </button>
  <button class="status-tab" id="tabUnsent" onclick="switchStatus('unsent')">
    <i class="fa-solid fa-clock"></i> 入金済（未送信）
  </button>
  <button class="status-tab" id="tabSent" onclick="switchStatus('sent')">
    <i class="fa-solid fa-circle-check"></i> 送信済
  </button>
</div>

<!-- メインコンテンツ -->
<div class="main-content hidden" id="mainContent">
  <div class="summary-bar">
    <div class="summary-text" id="summaryText"></div>
    <button class="select-all-btn hidden" id="selectAllBtn" onclick="toggleSelectAll()">全選択</button>
  </div>
  <div id="cardList"></div>
</div>

<!-- 一括処理フローティングバー -->
<div class="bulk-bar hidden" id="bulkBar">
  <span class="bulk-count" id="bulkCount">0件選択中</span>
  <button class="bulk-action-btn" onclick="openBulkModal()">
    <i class="fa-solid fa-paper-plane"></i>
    <span id="bulkBtnLabel">一括処理</span>
  </button>
</div>

<!-- 一括確認モーダル -->
<div class="modal-overlay hidden" id="bulkModal" onclick="if(event.target===this)closeBulkModal()">
  <div id="bulkModalContent"></div>
</div>

<!-- 単体送信確認モーダル（入金済未送信用） -->
<div class="modal-overlay hidden" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">
      <i class="fa-solid fa-paper-plane" style="color:var(--green)"></i>
      領収書メールを送信しますか？
    </div>
    <div class="modal-target">
      <div class="modal-target-name"  id="modalName"></div>
      <div class="modal-target-sub"   id="modalMonth"></div>
      <div class="modal-target-email" id="modalEmail"></div>
      <div class="modal-target-amount" id="modalAmount"></div>
    </div>
    <button class="confirm-btn" id="confirmBtn" onclick="submitSend()">
      <i class="fa-solid fa-paper-plane"></i> 送信する
    </button>
    <button class="cancel-btn" onclick="closeModal()">キャンセル</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // APIベースURLをローカル開発と本番Renderで切り替える
  const isLocal  = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
  const API_BASE = isLocal ? 'http://localhost:3000' : 'https://attendance-app-irf1.onrender.com';

  // ===== 状態管理 =====
  let allUnpaid    = [];          // 未入金レコード
  let allUnsent    = [];          // 入金済・未送信レコード
  let allSent      = [];          // 送信済レコード
  let activeStatus = 'unpaid';    // 'unpaid' | 'unsent' | 'sent'
  let selectedIds  = new Set();   // 選択中のrecordId
  let activeRecord = null;        // 単体送信モーダル対象レコード
  let cardDates    = {};          // 未入金カードの入金日（recordId → YYYY-MM-DD）

  // 未入金カードの入金日変更時にcardDatesを更新する
  function updateCardDate(recordId, value) {
    cardDates[recordId] = value;
  }

  // XSS対策のHTMLエスケープ
  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // JSTの今日をdate inputのvalue形式（YYYY-MM-DD）で返す
  function todayDateStr() {
    const n = new Date(Date.now() + 9 * 60 * 60 * 1000);
    return `${n.getUTCFullYear()}-${String(n.getUTCMonth()+1).padStart(2,'0')}-${String(n.getUTCDate()).padStart(2,'0')}`;
  }

  // LarkのnyukinDate（ms数値 or 配列 or null）をdate inputのvalue形式に変換する
  function nyukinDateToStr(val) {
    if (!val) return todayDateStr();
    const ms = typeof val === 'number' ? val : (Array.isArray(val) ? val[0] : null);
    if (!ms) return todayDateStr();
    const d = new Date(ms);
    return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
  }

  // ===== 初期化 =====
  async function init() {
    try {
      const r = await fetch(`${API_BASE}/api/payment/all-records`);
      const j = await r.json();
      if (!j.ok) throw new Error(j.error);

      allUnpaid = j.unpaid;
      allUnsent = j.unsent;
      allSent   = j.sent;

      document.getElementById('loadingScreen').classList.add('hidden');
      document.getElementById('statusTabs').classList.remove('hidden');
      document.getElementById('mainContent').classList.remove('hidden');
      renderCards();

    } catch (err) {
      document.getElementById('loadingScreen').innerHTML =
        `<div style="color:#c1121f"><i class="fa-solid fa-circle-exclamation"></i> 読み込み失敗<br><small>${esc(err.message)}</small></div>`;
    }
  }

  // ===== ステータスタブ切り替え =====
  function switchStatus(status) {
    activeStatus = status;
    selectedIds.clear();
    document.getElementById('tabUnpaid').classList.toggle('active', status === 'unpaid');
    document.getElementById('tabUnsent').classList.toggle('active', status === 'unsent');
    document.getElementById('tabSent').classList.toggle('active',   status === 'sent');
    renderCards();
    updateBulkBar();
  }

  // ===== チェックボックス切り替え =====
  function toggleSelect(recordId) {
    if (selectedIds.has(recordId)) selectedIds.delete(recordId);
    else selectedIds.add(recordId);

    // カードと円チェックの見た目を更新する
    const card  = document.querySelector(`.payment-card[data-rid="${CSS.escape(recordId)}"]`);
    const check = document.querySelector(`.card-check[data-rid="${CSS.escape(recordId)}"]`);
    if (card)  card.classList.toggle('card-selected', selectedIds.has(recordId));
    if (check) check.classList.toggle('checked', selectedIds.has(recordId));

    // 全選択ボタンのラベルを更新する
    updateSelectAllBtn();
    updateBulkBar();
  }

  // ===== 全選択・全解除 =====
  function toggleSelectAll() {
    const list = activeStatus === 'unpaid' ? allUnpaid : allUnsent;
    const allSelected = list.length > 0 && list.every(r => selectedIds.has(r.recordId));
    if (allSelected) list.forEach(r => selectedIds.delete(r.recordId));
    else             list.forEach(r => selectedIds.add(r.recordId));
    renderCards();
    updateBulkBar();
  }

  // ===== 全選択ボタンのラベル更新 =====
  function updateSelectAllBtn() {
    const list = activeStatus === 'unpaid' ? allUnpaid : allUnsent;
    const allSelected = list.length > 0 && list.every(r => selectedIds.has(r.recordId));
    document.getElementById('selectAllBtn').textContent = allSelected ? '全解除' : '全選択';
  }

  // ===== 一括バー更新 =====
  function updateBulkBar() {
    const bar   = document.getElementById('bulkBar');
    const count = selectedIds.size;
    if (count === 0 || activeStatus === 'sent') {
      bar.classList.add('hidden');
      return;
    }
    bar.classList.remove('hidden');
    document.getElementById('bulkCount').textContent   = `${count}件選択中`;
    document.getElementById('bulkBtnLabel').textContent =
      activeStatus === 'unpaid' ? '一括入金登録＋送信' : '一括メール送信';
  }

  // ===== カード一覧描画 =====
  function renderCards() {
    const list   = activeStatus === 'unpaid' ? allUnpaid : activeStatus === 'unsent' ? allUnsent : allSent;
    const listEl = document.getElementById('cardList');

    // サマリーバー
    const labels = { unpaid:'未入金', unsent:'入金済（未送信）', sent:'送信済' };
    document.getElementById('summaryText').innerHTML =
      `${labels[activeStatus]} <strong>${list.length}</strong> 件`;

    const selBtn = document.getElementById('selectAllBtn');
    if (activeStatus !== 'sent' && list.length > 0) {
      selBtn.classList.remove('hidden');
      const allSelected = list.every(r => selectedIds.has(r.recordId));
      selBtn.textContent = allSelected ? '全解除' : '全選択';
    } else {
      selBtn.classList.add('hidden');
    }

    listEl.innerHTML = '';

    if (list.length === 0) {
      const cfg = {
        unpaid: { icon:'fa-circle-exclamation', color:'var(--red)',    msg:'未入金の記録はありません' },
        unsent: { icon:'fa-clock',              color:'var(--yellow)', msg:'未送信の領収書はありません' },
        sent:   { icon:'fa-circle-check',       color:'var(--green)',  msg:'送信済の領収書はありません' },
      }[activeStatus];
      listEl.innerHTML =
        `<div class="empty-msg"><i class="fa-solid ${cfg.icon}" style="color:${cfg.color}"></i>${cfg.msg}</div>`;
      return;
    }

    list.forEach(record => {
      const card      = document.createElement('div');
      const isChecked = selectedIds.has(record.recordId);
      const amtStr    = record.amount != null ? '¥' + record.amount.toLocaleString() : '―';
      const emailStr  = esc(record.email || '（メールアドレス未登録）');
      const subStr    = esc(record.month || '―') + (record.office ? ' ／ ' + esc(record.office) : '');

      if (activeStatus === 'sent') {
        // 送信済カード（選択不可・バッジ表示）
        card.className = 'payment-card card-sent';
        card.innerHTML = `
          <div class="payment-card-body">
            <span class="sent-badge"><i class="fa-solid fa-circle-check"></i> 送信済</span>
            <div class="card-info">
              <div class="card-name">${esc(record.name)}</div>
              <div class="card-sub">${subStr}</div>
              <div class="card-email"><i class="fa-solid fa-envelope" style="font-size:.65rem"></i> ${emailStr}</div>
            </div>
            <div class="card-amount"><div class="card-amount-value">${amtStr}</div></div>
          </div>`;

      } else {
        // 未入金・入金済未送信カード（チェックボックス付き・タップで選択）
        const borderClass = activeStatus === 'unpaid' ? 'card-unpaid' : 'card-unsent';
        card.className = `payment-card ${borderClass} selectable ${isChecked ? 'card-selected' : ''}`;
        card.dataset.rid = record.recordId;
        card.onclick = () => toggleSelect(record.recordId);

        // 入金済未送信のみ単体送信ボタンを表示する
        const sendBtn = activeStatus === 'unsent'
          ? `<button class="send-btn" onclick="event.stopPropagation();openModal(event,'${esc(record.recordId)}')">
               <i class="fa-solid fa-paper-plane"></i>
             </button>`
          : '';

        if (activeStatus === 'unpaid') {
          // 未入金カード：●月分・入金日・請求額のみのコンパクト表示
          const dateVal = cardDates[record.recordId] || todayDateStr();
          card.innerHTML = `
            <div class="payment-card-body payment-card-body--compact">
              <div class="card-check ${isChecked ? 'checked' : ''}" data-rid="${esc(record.recordId)}">
                <i class="fa-solid fa-check"></i>
              </div>
              <span class="card-month">${esc(record.month || '―')}</span>
              <input type="date" class="card-date-input"
                value="${dateVal}"
                onclick="event.stopPropagation()"
                oninput="event.stopPropagation(); updateCardDate('${esc(record.recordId)}', this.value)">
              <div class="card-amount"><div class="card-amount-value">${amtStr}</div></div>
            </div>`;
        } else {
          // 入金済未送信カード：氏名・月・メール・金額・送信ボタン
          card.innerHTML = `
            <div class="payment-card-body">
              <div class="card-check ${isChecked ? 'checked' : ''}" data-rid="${esc(record.recordId)}">
                <i class="fa-solid fa-check"></i>
              </div>
              <div class="card-info">
                <div class="card-name">${esc(record.name)}</div>
                <div class="card-sub">${subStr}</div>
                <div class="card-email"><i class="fa-solid fa-envelope" style="font-size:.65rem"></i> ${emailStr}</div>
              </div>
              <div class="card-amount"><div class="card-amount-value">${amtStr}</div></div>
              ${sendBtn}
            </div>`;
        }
      }
      listEl.appendChild(card);
    });
  }

  // ===== 一括処理モーダルを開く =====
  function openBulkModal() {
    if (selectedIds.size === 0) return;
    const list    = activeStatus === 'unpaid' ? allUnpaid : allUnsent;
    const targets = list.filter(r => selectedIds.has(r.recordId));

    // 今日の日付（JST）を表示用に生成する
    const nowJST   = new Date(Date.now() + 9 * 60 * 60 * 1000);
    const todayStr = `${nowJST.getUTCFullYear()}年${nowJST.getUTCMonth()+1}月${nowJST.getUTCDate()}日`;

    const isUnpaid = activeStatus === 'unpaid';
    const title    = isUnpaid
      ? `<i class="fa-solid fa-file-invoice-dollar" style="color:var(--red)"></i> 一括入金登録＋送信`
      : `<i class="fa-solid fa-paper-plane" style="color:var(--green)"></i> 一括メール送信`;
    const notice   = isUnpaid
      ? `<div class="bulk-notice">今日（${todayStr}）付けで入金済に登録し、領収書メールを送信します。</div>`
      : `<div class="bulk-notice">選択した ${targets.length} 件に領収書メールを送信します。</div>`;

    const recordRows = targets.map(r => {
      const amtStr  = r.amount != null ? '¥' + r.amount.toLocaleString() : '―';
      // 未入金はカードで設定した入金日、入金済未送信はLark記録済みの入金日を表示する
      const dateStr = isUnpaid
        ? (cardDates[r.recordId] || todayDateStr())
        : nyukinDateToStr(r.nyukinDate);
      const [y, m, d] = dateStr.split('-');
      const dateDisplay = `${y}年${parseInt(m)}月${parseInt(d)}日`;
      return `<div class="bulk-record-item">
        <div class="bulk-record-info">
          <div class="bulk-record-name">${esc(r.name)}</div>
          <div class="bulk-record-sub">${esc(r.month||'―')} / ${amtStr}</div>
        </div>
        <span style="flex-shrink:0;font-size:.8rem;color:var(--text-muted);white-space:nowrap">${dateDisplay}</span>
      </div>`;
    }).join('');

    document.getElementById('bulkModalContent').innerHTML = `
      <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-title">${title}</div>
        ${notice}
        <div class="bulk-record-list">${recordRows}</div>
        <button class="confirm-btn" id="bulkConfirmBtn" onclick="submitBulk()">
          <i class="fa-solid fa-check"></i> ${targets.length}件を実行する
        </button>
        <button class="cancel-btn" id="bulkCancelBtn" onclick="closeBulkModal()">キャンセル</button>
      </div>`;
    document.getElementById('bulkModal').classList.remove('hidden');
  }

  function closeBulkModal() {
    document.getElementById('bulkModal').classList.add('hidden');
  }

  // ===== 一括処理を実行する =====
  async function submitBulk() {
    const list    = activeStatus === 'unpaid' ? allUnpaid : allUnsent;
    const targets = list.filter(r => selectedIds.has(r.recordId));
    if (targets.length === 0) return;

    const isUnpaid = activeStatus === 'unpaid';

    const records = targets.map(r => ({
      recordId:     r.recordId,
      needsPayment: isUnpaid,
      // 未入金はカードの入金日入力欄の値、入金済未送信はLark記録済みの入金日を使う
      payDate: isUnpaid
        ? (cardDates[r.recordId] || todayDateStr())
        : nyukinDateToStr(r.nyukinDate),
    }));

    const confirmBtn = document.getElementById('bulkConfirmBtn');
    const cancelBtn  = document.getElementById('bulkCancelBtn');
    confirmBtn.disabled = true;
    confirmBtn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> 処理中... (0/${records.length})`;
    cancelBtn.style.display = 'none';

    try {
      const res  = await fetch(`${API_BASE}/api/payment/bulk-process`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ records }),
      });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || '処理に失敗しました');

      const succeeded = data.results.filter(r => r.ok);
      const failed    = data.results.filter(r => !r.ok);
      const successIds = new Set(succeeded.map(r => r.recordId));

      // 成功したレコードを送信済リストへ移動する
      if (isUnpaid) {
        const moved = allUnpaid.filter(r => successIds.has(r.recordId)).map(r => ({...r, sent:true}));
        allUnpaid = allUnpaid.filter(r => !successIds.has(r.recordId));
        allSent   = [...moved, ...allSent];
      } else {
        const moved = allUnsent.filter(r => successIds.has(r.recordId)).map(r => ({...r, sent:true}));
        allUnsent = allUnsent.filter(r => !successIds.has(r.recordId));
        allSent   = [...moved, ...allSent];
      }
      selectedIds.clear();
      closeBulkModal();
      renderCards();
      updateBulkBar();

      if (failed.length === 0) {
        showToast(`${succeeded.length}件の処理が完了しました`, 'success');
      } else {
        showToast(`${succeeded.length}件成功・${failed.length}件失敗`, 'error');
      }

    } catch (err) {
      showToast(`エラー: ${err.message}`, 'error');
      confirmBtn.disabled = false;
      confirmBtn.innerHTML = `<i class="fa-solid fa-check"></i> 再試行`;
      if (cancelBtn) cancelBtn.style.display = '';
    }
  }

  // ===== 単体送信モーダルを開く（入金済未送信用） =====
  function openModal(event, recordId) {
    event.stopPropagation();
    const record = allUnsent.find(r => r.recordId === recordId);
    if (!record) return;
    activeRecord = record;

    document.getElementById('modalName').textContent   = record.name;
    document.getElementById('modalMonth').textContent  = record.month || '―';
    document.getElementById('modalEmail').textContent  = record.email
      ? `送信先: ${record.email}` : '⚠ メールアドレス未登録（送信スキップ）';
    document.getElementById('modalAmount').textContent =
      record.amount != null ? '¥' + record.amount.toLocaleString() : '―';
    document.getElementById('confirmBtn').disabled = false;
    document.getElementById('confirmBtn').innerHTML = '<i class="fa-solid fa-paper-plane"></i> 送信する';
    document.getElementById('modal').classList.remove('hidden');
  }

  function closeModal() {
    document.getElementById('modal').classList.add('hidden');
    activeRecord = null;
  }

  // ===== 単体送信を実行する =====
  async function submitSend() {
    if (!activeRecord) return;
    const btn = document.getElementById('confirmBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 送信中...';
    try {
      const res  = await fetch(`${API_BASE}/api/payment/send-receipt`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ recordId: activeRecord.recordId }),
      });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || '送信に失敗しました');

      const moved = { ...activeRecord, sent: true };
      allUnsent = allUnsent.filter(r => r.recordId !== activeRecord.recordId);
      allSent.unshift(moved);
      selectedIds.delete(activeRecord.recordId);

      closeModal();
      renderCards();
      updateBulkBar();

      const msg = data.skipped
        ? `${activeRecord.name}：メール未登録のためスキップしました`
        : `${activeRecord.name}に領収書を送信しました`;
      showToast(msg, 'success');

    } catch (err) {
      showToast(`エラー: ${err.message}`, 'error');
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> 送信する';
    }
  }

  // ===== トースト通知 =====
  function showToast(msg, type = '') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className   = `toast ${type} show`;
    setTimeout(() => { el.className = `toast ${type}`; }, 3500);
  }

  document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
