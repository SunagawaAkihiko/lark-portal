<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>スタッフ入職登録（プレビュー）</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    /* ===== CSS変数（lark-portal統一デザイン） ===== */
    :root {
      --bg-color:      #fdf6ec;
      --text-color:    #4a3f35;
      --text-muted:    #8c7c6b;
      --primary-color: #e76f51;
      --primary-light: #fcece8;
      --card-bg:       #fff0e3;
      --border-color:  #dcbfa6;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Zen Kaku Gothic New', sans-serif;
      background: var(--bg-color);
      color: var(--text-color);
      -webkit-font-smoothing: antialiased;
      padding-bottom: 5rem;
    }

    /* ===== ページヘッダー ===== */
    .page-header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--primary-color);
      color: white;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.9rem 1rem;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }
    .page-header h1 { font-size: 1.05rem; font-weight: 700; }
    .back-btn {
      background: none;
      border: none;
      color: white;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 0.2rem;
    }

    /* ===== フォーム全体コンテナ ===== */
    .form-container {
      padding: 1rem;
      max-width: 600px;
      margin: 0 auto;
    }

    /* ===== セクション見出し ===== */
    .section-heading {
      padding: 0.5rem 0.7rem;
      background: var(--primary-light);
      border-radius: 6px;
      margin: 1.4rem 0 0.8rem;
    }
    .section-heading:first-of-type { margin-top: 0.4rem; }
    .section-heading-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--primary-color);
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .section-heading-note {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
      padding-left: 0.1rem;
      line-height: 1.4;
    }

    /* ===== フォームグループ ===== */
    .form-group { margin-bottom: 0.9rem; }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.7rem;
      margin-bottom: 0.9rem;
    }
    .form-row .form-group { margin-bottom: 0; }

    /* ===== ラベル ===== */
    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-muted);
      margin-bottom: 0.3rem;
    }
    label .required { color: var(--primary-color); margin-left: 0.2rem; }

    /* ===== 入力フィールド共通 ===== */
    input[type="text"],
    input[type="tel"],
    input[type="email"],
    select, textarea {
      width: 100%;
      padding: 0.7rem 0.75rem;
      border: 1.5px solid var(--border-color);
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.95rem;
      background: var(--card-bg);
      color: var(--text-color);
      -webkit-appearance: none;
      appearance: none;
      max-width: 100%;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--primary-color);
    }

    /* ===== 日付セレクト（月・日）パディング縮小 ===== */
    .date-select-sm {
      padding-left: 0.3rem;
      padding-right: 0.2rem;
    }

    /* ===== 郵便番号入力行 ===== */
    .zip-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.6rem;
    }
    .zip-row input { flex: 1; }
    .zip-btn {
      flex-shrink: 0;
      padding: 0.7rem 1rem;
      background: var(--primary-color);
      color: white;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }
    .zip-btn:disabled { opacity: 0.6; cursor: default; }

    /* ===== 住所自動補完表示欄 ===== */
    .address-auto {
      background: white;
      border: 1.5px solid var(--border-color);
      border-radius: 8px;
      padding: 0.55rem 0.75rem;
      font-size: 0.88rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      min-height: 2.4rem;
    }
    .address-auto.filled { color: var(--text-color); }

    /* ===== 資格チェックボックスグリッド ===== */
    .checkbox-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
    }
    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.55rem 0.7rem;
      background: var(--card-bg);
      border: 1.5px solid var(--border-color);
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      /* 未選択時はやや薄い色にして選択済みとの差をわかりやすくする */
      color: var(--text-muted);
      transition: all 0.15s;
    }
    .checkbox-item input[type="checkbox"] {
      width: auto;
      accent-color: var(--primary-color);
      transform: scale(1.2);
      flex-shrink: 0;
    }
    .checkbox-item:has(input:checked) {
      background: var(--primary-light);
      border-color: var(--primary-color);
      color: var(--primary-color);
      font-weight: 700;
    }

    /* ===== 送信ボタン（画面下部固定） ===== */
    .submit-area {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 0.8rem 1rem;
      background: var(--bg-color);
      border-top: 1px solid var(--border-color);
      z-index: 10;
    }
    .submit-btn {
      width: 100%;
      padding: 0.9rem;
      background: var(--primary-color);
      color: white;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
    }

    /* ===== トースト通知 ===== */
    .toast {
      position: fixed;
      bottom: 5.5rem;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: white;
      padding: 0.7rem 1.4rem;
      border-radius: 20px;
      font-size: 0.9rem;
      white-space: nowrap;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
    .toast.success { background: #2e7d32; }
    .toast.error   { background: #c62828; }
  </style>
</head>
<body>

  <!-- ===== ページヘッダー ===== -->
  <header class="page-header">
    <button class="back-btn" onclick="history.back()">
      <i class="fa-solid fa-arrow-left"></i>
    </button>
    <h1><i class="fa-solid fa-user-tie" style="margin-right:.4rem"></i>スタッフ入職登録</h1>
  </header>

  <div class="form-container">

    <!-- ===== 勤務情報セクション ===== -->
    <div class="section-heading">
      <div class="section-heading-title">
        <i class="fa-solid fa-briefcase"></i> 勤務情報
      </div>
    </div>

    <!-- 入社日（全幅で年が見切れないようにする） -->
    <div class="form-group">
      <label>入社日 <span class="required">*</span></label>
      <div style="display:flex; gap:0.4rem; align-items:center">
        <select style="flex:3">
          <option>2025年（令和7年）</option>
          <option selected>2026年（令和8年）</option>
          <option>2027年（令和9年）</option>
        </select>
        <select style="flex:2" class="date-select-sm">
          <option>4月</option>
        </select>
        <select style="flex:2" class="date-select-sm">
          <option>1日</option>
        </select>
      </div>
    </div>

    <!-- 勤務開始日（全幅で年が見切れないようにする） -->
    <div class="form-group">
      <label>勤務開始日 <span class="required">*</span></label>
      <div style="display:flex; gap:0.4rem; align-items:center">
        <select style="flex:3">
          <option>2025年（令和7年）</option>
          <option selected>2026年（令和8年）</option>
          <option>2027年（令和9年）</option>
        </select>
        <select style="flex:2" class="date-select-sm">
          <option>4月</option>
        </select>
        <select style="flex:2" class="date-select-sm">
          <option>1日</option>
        </select>
      </div>
    </div>

    <!-- 事業所名・雇用形態 -->
    <div class="form-row">
      <div class="form-group">
        <label>事業所名（複数選択可） <span class="required">*</span></label>
        <div class="checkbox-grid">
          <label class="checkbox-item">
            <input type="checkbox"> 大浦家
          </label>
          <label class="checkbox-item">
            <input type="checkbox"> 上津役家
          </label>
        </div>
      </div>
      <div class="form-group">
        <label>雇用形態 <span class="required">*</span></label>
        <select>
          <option value="">選択</option>
          <option>正社員</option>
          <option>パート</option>
          <option>アルバイト</option>
          <option>契約社員</option>
          <option>その他</option>
        </select>
      </div>
    </div>

    <!-- ===== 本人情報セクション ===== -->
    <div class="section-heading">
      <div class="section-heading-title">
        <i class="fa-solid fa-circle-user"></i> 本人情報
      </div>
    </div>

    <!-- 姓・名（テキスト入力） -->
    <div class="form-row">
      <div class="form-group">
        <label>姓 <span class="required">*</span></label>
        <input type="text" placeholder="例: 田中" required>
      </div>
      <div class="form-group">
        <label>名 <span class="required">*</span></label>
        <input type="text" placeholder="例: 一郎" required>
      </div>
    </div>

    <!-- 住所 -->
    <div class="form-group">
      <label>住所 <span class="required">*</span></label>
      <div class="zip-row">
        <input type="text" placeholder="郵便番号（ハイフン不要・7桁）" maxlength="7" inputmode="numeric">
        <button class="zip-btn">
          <i class="fa-solid fa-magnifying-glass"></i> 検索
        </button>
      </div>
      <div class="address-auto">← 郵便番号を入力して検索すると自動入力されます</div>
      <input type="hidden">
      <input type="text" placeholder="番地・建物名・号室を入力">
    </div>

    <!-- 生年月日 -->
    <div class="form-group">
      <label>生年月日 <span class="required">*</span></label>
      <div style="display:flex; gap:0.4rem; align-items:center">
        <select style="flex:3">
          <option>1990年（平成2年）</option>
        </select>
        <select style="flex:2" class="date-select-sm">
          <option>1月</option>
        </select>
        <select style="flex:2" class="date-select-sm">
          <option>1日</option>
        </select>
      </div>
    </div>

    <!-- 電話番号・メールアドレス -->
    <div class="form-row">
      <div class="form-group">
        <label>電話番号（ハイフン不要） <span class="required">*</span></label>
        <input type="tel" placeholder="例: 09012345678" required>
      </div>
      <div class="form-group">
        <label>メールアドレス（給与明細などの受取先） <span class="required">*</span></label>
        <input type="email" placeholder="例: tanaka@example.com" required>
      </div>
    </div>

    <!-- ===== 保有資格セクション ===== -->
    <div class="section-heading">
      <div class="section-heading-title">
        <i class="fa-solid fa-certificate"></i> 保有資格 <span class="required" style="margin-left:.3rem">*</span>
      </div>
      <div class="section-heading-note">
        ※該当するものをすべて選択してください。（なし含む）
      </div>
    </div>

    <div class="form-group">
      <div class="checkbox-grid">
        <label class="checkbox-item">
          <input type="checkbox"> なし
        </label>
        <label class="checkbox-item">
          <input type="checkbox"> 自動車運転免許
        </label>
        <label class="checkbox-item">
          <input type="checkbox"> 初任者研修
        </label>
        <label class="checkbox-item">
          <input type="checkbox"> 実務者研修
        </label>
        <label class="checkbox-item">
          <input type="checkbox"> 介護福祉士
        </label>
        <label class="checkbox-item">
          <input type="checkbox"> ケアマネ
        </label>
        <label class="checkbox-item">
          <input type="checkbox"> 認定介護福祉士
        </label>
        <label class="checkbox-item">
          <input type="checkbox"> 認知症介護基礎研修
        </label>
        <label class="checkbox-item">
          <input type="checkbox"> 認知症ケア専門士
        </label>
        <label class="checkbox-item">
          <input type="checkbox"> ガイドヘルパー
        </label>
        <label class="checkbox-item">
          <input type="checkbox"> 社会福祉士
        </label>
        <label class="checkbox-item">
          <input type="checkbox"> 准看護師
        </label>
        <label class="checkbox-item">
          <input type="checkbox"> 正看護師
        </label>
        <label class="checkbox-item">
          <input type="checkbox"> 作業療法士
        </label>
      </div>
    </div>

  </div><!-- /form-container -->

  <!-- ===== 送信ボタン（画面下部固定） ===== -->
  <div class="submit-area">
    <button class="submit-btn">
      <i class="fa-solid fa-floppy-disk" style="margin-right:.4rem"></i>登録する
    </button>
  </div>

  <!-- ===== トースト通知 ===== -->
  <div class="toast" id="toast"></div>

</body>
</html>
