<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>シフト管理</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    /* ==================== 変数・リセット ==================== */
    :root {
      --bg:         #fdf6ec;
      --text:       #4a3f35;
      --muted:      #8c7c6b;
      --primary:    #e76f51;
      --primary-lt: #fcece8;
      --card-bg:    #fff0e3;
      --border:     #dcbfa6;
      --brown-dark: #4a3f35;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Zen Kaku Gothic New', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      /* overflow:clip はhiddenと同様に描画クリップするが、スクロールコンテナを作らないため */
      /* position:sticky の基準スクロールコンテナが正しく .shift-wrapper になるよう設定 */
      overflow: clip;
      display: flex;
      flex-direction: column;
    }
    button { cursor: pointer; font-family: inherit; }
    .hidden { display: none !important; }

    /* ==================== ヘッダー ==================== */
    .page-header {
      background: var(--brown-dark);
      color: #fff;
      padding: 0.6rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-shrink: 0;
    }
    .page-header .back-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      color: #fff;
      padding: 0.3rem 0.7rem;
      border-radius: 6px;
      font-size: 0.85rem;
    }
    .page-header .title { font-size: 1rem; font-weight: 700; flex: 1; }

    /* ==================== ツールバー ==================== */
    .toolbar {
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
      padding: 0.6rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .month-nav { display: flex; align-items: center; gap: 0.4rem; }
    .month-nav button {
      background: var(--primary-lt);
      border: 1px solid var(--border);
      color: var(--primary);
      width: 2rem; height: 2rem;
      border-radius: 6px;
      font-size: 0.9rem;
      display: flex; align-items: center; justify-content: center;
    }
    .month-label {
      font-weight: 700;
      font-size: 1rem;
      min-width: 7rem;
      text-align: center;
    }
    .toolbar-right { margin-left: auto; display: flex; gap: 0.5rem; }
    .btn {
      border: none;
      border-radius: 8px;
      padding: 0.45rem 0.9rem;
      font-size: 0.85rem;
      font-weight: 700;
      display: flex; align-items: center; gap: 0.4rem;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-outline {
      background: #fff;
      border: 1.5px solid var(--border);
      color: var(--text);
    }
    .btn-green  { background: #52b788; color: #fff; }
    .btn-purple { background: #6a0572; color: #fff; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ==================== タブ ==================== */
    .tabs {
      display: flex;
      background: var(--card-bg);
      border-bottom: 2px solid var(--border);
      flex-shrink: 0;
    }
    .tab {
      padding: 0.6rem 1.5rem;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--muted);
      border: none;
      background: transparent;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      cursor: pointer;
    }
    .tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    /* ==================== シフトテーブルラッパー ==================== */
    /* flex: 1 + min-height: 0 でこのdivが縦方向のスクロールコンテナになる */
    /* overflow: auto でposition:sticky の基準スクロールコンテナとして機能する */
    .shift-wrapper {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 0.5rem;
    }

    /* ==================== シフトマトリクステーブル ==================== */
    /* border-collapse:collapse は position:sticky と組み合わせると Safari 等で
       固定が全く機能しないため、separate + border-spacing:0 方式を使用する。
       salary-admin.html の salary-table と同じ方式。                          */
    .shift-table {
      border-collapse: separate;
      border-spacing: 0;
      min-width: max-content;
      font-size: 0.78rem;
    }
    .shift-table th, .shift-table td {
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 0.25rem 0.3rem;
      white-space: nowrap;
      text-align: center;
    }
    /* 各行の先頭セルに左ボーダーを付与（separate方式では自動付与されないため） */
    .shift-table tr > :first-child { border-left: 1px solid var(--border); }
    /* ヘッダー先頭行のみ上ボーダーを付与 */
    .shift-table thead tr:first-child th { border-top: 1px solid var(--border); }

    /* 固定列（スタッフ名）: z-indexとbackgroundを確実に設定して横スクロール時のすり抜けを防ぐ */
    .shift-table .col-name {
      position: sticky;
      left: 0;
      /* !important でsat/sun行の背景色より優先させる */
      background: #fff0e3 !important;
      z-index: 2;
      text-align: left;
      min-width: 6rem;
      font-weight: 700;
      /* 右側に影を付けてスクロール時の視覚的な区切りを作る */
      box-shadow: 2px 0 4px rgba(0,0,0,0.08);
    }

    /* ヘッダー行：縦方向sticky */
    .shift-table thead th {
      background: var(--brown-dark);
      color: #fff;
      font-weight: 700;
      position: sticky;
      top: 0;
      z-index: 3;
    }

    /* ヘッダー左上の角セル：縦横両方のstickyを兼ねるため最高z-indexにする */
    .shift-table thead .col-name {
      background: #4a3f35 !important;
      color: #fff;
      z-index: 5;
    }

    /* 土・日の列色 */
    .shift-table td.sat { background: #e8f4ff; }
    .shift-table td.sun { background: #fff0f0; }
    .shift-table th.sat { background: #4472c4 !important; }
    .shift-table th.sun { background: #c0392b !important; }

    /* 集計行 */
    .shift-table .summary-row td {
      background: #f0f0f0;
      font-weight: 700;
      font-size: 0.72rem;
    }
    .shift-table .summary-row .col-name {
      background: #e0e0e0 !important;
    }

    /* 事業所セクション区切り行（全事業所ビュー用） */
    .shift-table .shop-section-row td {
      background: var(--brown-dark) !important;
      color: #fff;
      font-weight: 700;
      font-size: 0.82rem;
      padding: 0.35rem 0.6rem;
      text-align: left;
    }

    /* ==================== シフトバッジ ==================== */
    .shift-badge {
      display: inline-block;
      border-radius: 4px;
      padding: 0.1rem 0.35rem;
      font-size: 0.72rem;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      min-width: 2.8rem;
      user-select: none;
    }
    .shift-badge:hover { opacity: 0.85; }

    /* ==================== ドロップダウン ==================== */
    .cell-dropdown {
      position: fixed;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      z-index: 200;
      padding: 0.4rem;
      min-width: 9rem;
    }
    .cell-dropdown .dd-item {
      display: block;
      width: 100%;
      padding: 0.4rem 0.6rem;
      border: none;
      background: transparent;
      text-align: left;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
    }
    .cell-dropdown .dd-item:hover { background: var(--primary-lt); }

    /* ==================== トースト・ローディング ==================== */
    #toast {
      position: fixed; bottom: 5rem; left: 50%;
      transform: translateX(-50%);
      background: #333; color: #fff;
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      font-size: 0.85rem;
      z-index: 300;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; }

    #overlay {
      position: fixed; inset: 0;
      background: rgba(255,255,255,0.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 500;
    }
    .spinner {
      width: 2.5rem; height: 2.5rem;
      border: 4px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ==================== 警告パネル ==================== */
    #warning-panel {
      background: #fff3cd;
      border-left: 4px solid #ffc107;
      padding: 0.6rem 1rem;
      font-size: 0.8rem;
      flex-shrink: 0;
      max-height: 6rem;
      overflow-y: auto;
    }
    #warning-panel .warn-title { font-weight: 700; margin-bottom: 0.3rem; }
    #warning-panel ul { padding-left: 1.2rem; }

    /* ==================== 右端集計カラム ==================== */
    /* 3列を右端に sticky 固定する。right 値は列幅(3.5rem)の積み上げで計算する */
    .col-total, .col-kyukyu, .col-yukyu {
      width: 3.5rem;
      font-weight: 700;
      position: sticky;
      z-index: 2;
    }
    /* 勤務日数: 右から3列目 */
    .col-total  { right: 7rem;    background: #fffbe6; }
    /* 休み日数: 右から2列目 */
    .col-kyukyu { right: 3.5rem;  background: #eef2f7; }
    /* 有休日数: 右端 */
    .col-yukyu  { right: 0;       background: #eef9f3; }

    /* ヘッダー行の右端集計列は top + right 両方 sticky になるため z-index を上げる */
    .shift-table thead .col-total,
    .shift-table thead .col-kyukyu,
    .shift-table thead .col-yukyu  { z-index: 4; background: var(--brown-dark); }

    /* 集計行の右端集計列は背景をはっきり指定してセルが透けないようにする */
    .shift-table .summary-row .col-total  { background: #f5f0c8 !important; }
    .shift-table .summary-row .col-kyukyu { background: #dde4ee !important; }
    .shift-table .summary-row .col-yukyu  { background: #d8f0e3 !important; }
  </style>
</head>
<body>

<!-- ヘッダー -->
<header class="page-header">
  <span class="title"><i class="fa fa-calendar-alt"></i> シフト管理</span>
</header>

<!-- ツールバー -->
<div class="toolbar">
  <div class="month-nav">
    <button onclick="changeMonth(-1)"><i class="fa fa-chevron-left"></i></button>
    <span class="month-label" id="month-label">読み込み中...</span>
    <button onclick="changeMonth(1)"><i class="fa fa-chevron-right"></i></button>
  </div>
  <div class="toolbar-right">
    <button class="btn btn-purple" id="btn-generate" onclick="onGenerate()">
      <i class="fa fa-magic"></i> 自動作成
    </button>
    <button class="btn btn-green" id="btn-save" onclick="onSave()" disabled>
      <i class="fa fa-save"></i> 保存
    </button>
    <button class="btn btn-outline" onclick="onPrint()">
      <i class="fa fa-print"></i> PDF
    </button>
  </div>
</div>

<!-- 警告パネル（自動作成の警告を表示） -->
<div id="warning-panel" class="hidden">
  <div class="warn-title">⚠ 自動作成の警告</div>
  <ul id="warning-list"></ul>
</div>

<!-- タブ：全事業所を既定として両事業所の兼務スタッフも一覧で確認できるようにする -->
<div class="tabs">
  <button class="tab active" id="tab-all"    onclick="switchTab('all')">全事業所</button>
  <button class="tab"        id="tab-oura"   onclick="switchTab('大浦家')">大浦家</button>
  <button class="tab"        id="tab-kozuya" onclick="switchTab('上津役家')">上津役家</button>
</div>

<!-- シフトテーブル本体 -->
<div class="shift-wrapper" id="shift-wrapper">
  <div style="text-align:center;padding:3rem;color:var(--muted);">
    <i class="fa fa-circle-notch fa-spin fa-2x"></i><br><br>データを読み込み中...
  </div>
</div>

<!-- ローディングオーバーレイ -->
<div id="overlay" class="hidden"><div class="spinner"></div></div>

<!-- ドロップダウンメニュー（クリック編集用） -->
<div class="cell-dropdown hidden" id="dropdown"></div>

<!-- トースト通知 -->
<div id="toast"></div>

<script>
// ============================================================
// 定数
// ============================================================
const API = 'https://attendance-app-irf1.onrender.com';
const SHIFT_TYPES = ['日勤', '日勤(16)', '日勤(18)', '夜勤', '明け', '公休', '公休(希)', '定休', '有休'];
const DOW_JA = ['日', '月', '火', '水', '木', '金', '土'];

// シフト種別カラーマップ
const BADGE_COLOR = {
  '日勤':      '#3a86ff',
  '日勤(16)':  '#1d7fc4',
  '日勤(18)':  '#0a4f8f',
  '夜勤':      '#6a0572',
  '明け':      '#c77dff',
  '公休':      '#adb5bd',
  '公休(希)':  '#82a0b0',
  '定休':      '#8d99ae',
  '有休':      '#52b788',
};

// 事業所の表示順（全事業所ビューでのセクション順序）
const SHOPS = ['大浦家', '上津役家'];

// ============================================================
// 状態管理
// ============================================================
let currentYear  = new Date().getFullYear();
let currentMonth = new Date().getMonth() + 1;
// 既定を「全事業所」にして兼務スタッフも含め全体を俯瞰できるようにする
let currentShop  = 'all';
let staffList    = [];   // スタッフマスタ
let shifts       = [];   // 現在表示中のシフトデータ（全事業所）
let dirty        = false; // 未保存変更あり

// ============================================================
// 初期化
// ============================================================
document.addEventListener('DOMContentLoaded', async () => {
  await loadStaff();
  await loadShiftResult();
});

async function loadStaff() {
  try {
    const res = await fetch(`${API}/api/shift/staff`);
    const d   = await res.json();
    if (d.ok) staffList = d.staff;
  } catch (e) {
    console.error('スタッフ読み込みエラー:', e);
  }
}

async function loadShiftResult() {
  showOverlay(true);
  try {
    const res = await fetch(`${API}/api/shift/result?year=${currentYear}&month=${currentMonth}`);
    const d   = await res.json();
    if (d.ok) {
      shifts = d.shifts;
      dirty  = false;
      document.getElementById('btn-save').disabled = true;
    }
    updateMonthLabel();
    renderTable();
  } catch (e) {
    showToast('データの読み込みに失敗しました', 'error');
  } finally {
    showOverlay(false);
  }
}

// ============================================================
// 月切り替え
// ============================================================
function changeMonth(delta) {
  if (dirty && !confirm('未保存の変更があります。移動しますか？')) return;
  currentMonth += delta;
  if (currentMonth > 12) { currentMonth = 1;  currentYear++; }
  if (currentMonth < 1)  { currentMonth = 12; currentYear--; }
  loadShiftResult();
}

function updateMonthLabel() {
  document.getElementById('month-label').textContent =
    `${currentYear}年 ${currentMonth}月`;
}

// ============================================================
// タブ切り替え
// ============================================================
function switchTab(shop) {
  currentShop = shop;
  document.getElementById('tab-all').classList.toggle('active',    shop === 'all');
  document.getElementById('tab-oura').classList.toggle('active',   shop === '大浦家');
  document.getElementById('tab-kozuya').classList.toggle('active', shop === '上津役家');
  renderTable();
}

// ============================================================
// シフトマップ構築（事業所でフィルタ）
// staffName + date をキーにして素早く参照できる形にする
// ============================================================
function buildShiftMap(shop) {
  const map = {};
  for (const s of shifts) {
    if (s.shop !== shop) continue;
    map[`${s.staffName}__${s.date}`] = s;
  }
  return map;
}

// ============================================================
// テーブル描画
// ============================================================
function renderTable() {
  const wrapper = document.getElementById('shift-wrapper');

  // 対象月の日付リストを生成
  const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
  const dates = Array.from({ length: daysInMonth }, (_, i) => {
    const d = i + 1;
    return {
      str: `${currentYear}/${String(currentMonth).padStart(2,'0')}/${String(d).padStart(2,'0')}`,
      day: d,
      dow: new Date(currentYear, currentMonth - 1, d).getDay(),
    };
  });

  const table = document.createElement('table');
  table.className = 'shift-table';

  // ---- ヘッダー行（全ビュー共通） ----
  const thead = table.createTHead();
  const headRow = thead.insertRow();

  const thName = document.createElement('th');
  thName.className = 'col-name';
  thName.textContent = 'スタッフ';
  headRow.appendChild(thName);

  for (const { day, dow } of dates) {
    const th = document.createElement('th');
    th.innerHTML = `${day}<br><small>${DOW_JA[dow]}</small>`;
    if (dow === 0) th.className = 'sun';
    if (dow === 6) th.className = 'sat';
    headRow.appendChild(th);
  }

  // 右端の集計列ヘッダー（勤務・休み・有休）
  [['勤務', 'col-total'], ['休み', 'col-kyukyu'], ['有休', 'col-yukyu']].forEach(([label, cls]) => {
    const th = document.createElement('th');
    th.textContent = label;
    th.className = cls;
    headRow.appendChild(th);
  });

  const tbody = table.createTBody();

  if (currentShop === 'all') {
    // 全事業所ビュー：各事業所をセクションに分けて連続表示する
    // 兼務スタッフは両方のセクションに現れ、その事業所のシフトを表示する
    let hasAny = false;
    for (const shop of SHOPS) {
      const shopStaff = staffList.filter(s => s.shops.includes(shop));
      if (shopStaff.length === 0) continue;
      hasAny = true;

      // 事業所名セクション区切り行
      const sectionRow = tbody.insertRow();
      sectionRow.className = 'shop-section-row';
      const tdSection = sectionRow.insertCell();
      tdSection.colSpan = dates.length + 4;
      tdSection.textContent = `  ${shop}`;

      const shiftMap = buildShiftMap(shop);
      appendStaffRows(tbody, shopStaff, dates, shiftMap, shop);
      appendSummaryRows(tbody, shopStaff, dates, shiftMap);
    }
    if (!hasAny) {
      wrapper.innerHTML = '<div style="padding:2rem;text-align:center;color:var(--muted);">スタッフが見つかりません</div>';
      return;
    }
  } else {
    // 単一事業所ビュー
    const shopStaff = staffList.filter(s => s.shops.includes(currentShop));
    if (shopStaff.length === 0) {
      wrapper.innerHTML = '<div style="padding:2rem;text-align:center;color:var(--muted);">スタッフが見つかりません</div>';
      return;
    }
    const shiftMap = buildShiftMap(currentShop);
    appendStaffRows(tbody, shopStaff, dates, shiftMap, currentShop);
    appendSummaryRows(tbody, shopStaff, dates, shiftMap);
  }

  wrapper.innerHTML = '';
  wrapper.appendChild(table);
}

// ============================================================
// スタッフ行をtbodyに追加するヘルパー
// ============================================================
function appendStaffRows(tbody, shopStaff, dates, shiftMap, shop) {
  for (const staff of shopStaff) {
    const row = tbody.insertRow();

    const tdName = row.insertCell();
    tdName.className = 'col-name';
    tdName.textContent = staff.name;

    // 右端集計カウンター（勤務・公休系・有休）
    let workDays = 0, kyukuDays = 0, yukuDays = 0;

    for (const { str, dow } of dates) {
      const td  = row.insertCell();
      const s   = shiftMap[`${staff.name}__${str}`];
      const typ = s?.shiftType || '';

      if (dow === 0) td.className = 'sun';
      if (dow === 6) td.className = 'sat';

      if (['日勤', '日勤(16)', '日勤(18)', '夜勤'].includes(typ)) workDays++;
      else if (['公休', '公休(希)', '定休'].includes(typ)) kyukuDays++;
      else if (typ === '有休') yukuDays++;

      const badge = document.createElement('span');
      badge.className = 'shift-badge';
      badge.textContent = typ || '－';
      badge.style.background = BADGE_COLOR[typ] || '#eee';
      badge.style.color = BADGE_COLOR[typ] ? '#fff' : '#999';
      if (!BADGE_COLOR[typ]) badge.style.border = '1px dashed #ccc';

      // クリック編集：事業所名をクロージャで保持してドロップダウンに渡す
      badge.addEventListener('click', (e) => {
        e.stopPropagation();
        openDropdown(e, staff.name, str, s, badge, shop);
      });

      td.appendChild(badge);
    }

    // 右端に勤務・公休・有休の合計セルを追加
    const tdWork = row.insertCell();
    tdWork.className = 'col-total';
    tdWork.textContent = workDays;

    const tdKyuku = row.insertCell();
    tdKyuku.className = 'col-kyukyu';
    tdKyuku.textContent = kyukuDays || '－';

    const tdYukyu = row.insertCell();
    tdYukyu.className = 'col-yukyu';
    tdYukyu.textContent = yukuDays || '－';
  }
}

// ============================================================
// 集計行（日勤計・夜勤計）をtbodyに追加するヘルパー
// ============================================================
function appendSummaryRows(tbody, shopStaff, dates, shiftMap) {
  const summaryTypes = [
    { label: '日勤計', types: ['日勤', '日勤(16)', '日勤(18)'] },
    { label: '夜勤計', types: ['夜勤'] },
  ];
  for (const { label, types } of summaryTypes) {
    const row = tbody.insertRow();
    row.className = 'summary-row';

    const tdName = row.insertCell();
    tdName.className = 'col-name';
    tdName.textContent = label;

    for (const { str } of dates) {
      const td  = row.insertCell();
      const cnt = shopStaff.filter(s =>
        types.includes(shiftMap[`${s.name}__${str}`]?.shiftType)
      ).length;
      td.textContent = cnt || '－';
      if (cnt === 0) td.style.color = '#e63946';
    }

    // 右端集計列（集計行には per-staff の公休・有休数は非該当のため空欄）
    const tdTotal = row.insertCell();
    tdTotal.className = 'col-total';
    const tdKS = row.insertCell();
    tdKS.className = 'col-kyukyu';
    const tdYS = row.insertCell();
    tdYS.className = 'col-yukyu';
  }
}

// ============================================================
// ドロップダウン（シフト編集）
// shopName：全事業所ビューでの編集対象事業所を特定するために必要
// ============================================================
function openDropdown(e, staffName, dateStr, currentShift, badgeEl, shopName) {
  const dd = document.getElementById('dropdown');
  dd.innerHTML = '';

  for (const typ of SHIFT_TYPES) {
    const btn = document.createElement('button');
    btn.className = 'dd-item';
    btn.innerHTML = `<span style="display:inline-block;width:0.7rem;height:0.7rem;border-radius:2px;background:${BADGE_COLOR[typ]||'#eee'};margin-right:0.4rem;"></span>${typ}`;
    if (currentShift?.shiftType === typ) btn.style.fontWeight = '800';
    btn.addEventListener('click', () => {
      applyShiftChange(staffName, dateStr, typ, currentShift, badgeEl, shopName);
      closeDropdown();
    });
    dd.appendChild(btn);
  }

  dd.classList.remove('hidden');
  const rect = e.target.getBoundingClientRect();
  const ddH  = dd.offsetHeight || 300;
  const top  = rect.bottom + 4 + ddH > window.innerHeight
    ? rect.top - ddH - 4
    : rect.bottom + 4;
  dd.style.top  = `${top}px`;
  dd.style.left = `${Math.min(rect.left, window.innerWidth - 160)}px`;
}

function closeDropdown() {
  document.getElementById('dropdown').classList.add('hidden');
}
document.addEventListener('click', closeDropdown);

// ============================================================
// シフト変更をメモリに反映
// shopName：全事業所ビューでの新規シフト作成時に事業所を正しく設定するために受け取る
// ============================================================
function applyShiftChange(staffName, dateStr, newType, currentShift, badgeEl, shopName) {
  if (currentShift) {
    currentShift.shiftType = newType;
    currentShift._dirty    = true;
  } else {
    const staff = staffList.find(s => s.name === staffName);
    shifts.push({
      date:        dateStr,
      shop:        shopName,
      staffName,
      openId:      staff?.openId || '',
      shiftType:   newType,
      isManual:    true,
      isConfirmed: false,
      _dirty:      true,
      _isNew:      true,
    });
  }

  badgeEl.textContent      = newType;
  badgeEl.style.background = BADGE_COLOR[newType] || '#eee';
  badgeEl.style.color      = BADGE_COLOR[newType] ? '#fff' : '#999';
  badgeEl.style.border     = BADGE_COLOR[newType] ? 'none' : '1px dashed #ccc';

  dirty = true;
  document.getElementById('btn-save').disabled = false;

  // 集計行を再描画
  renderTable();
}

// ============================================================
// 自動作成：サーバー側で全事業所・全スタッフのシフトを一括生成する
// ============================================================
async function onGenerate() {
  if (shifts.length > 0 &&
      !confirm(`${currentYear}年${currentMonth}月のシフトが既にあります。上書きしますか？`)) return;

  showOverlay(true);
  document.getElementById('warning-panel').classList.add('hidden');

  try {
    const res = await fetch(`${API}/api/shift/generate`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ year: currentYear, month: currentMonth }),
    });
    const d = await res.json();
    if (!d.ok) throw new Error(d.error);

    shifts = d.shifts;
    dirty  = true;
    document.getElementById('btn-save').disabled = false;

    if (d.warnings?.length > 0) {
      const panel = document.getElementById('warning-panel');
      const list  = document.getElementById('warning-list');
      list.innerHTML = d.warnings.map(w => `<li>${w}</li>`).join('');
      panel.classList.remove('hidden');
    }

    renderTable();
    showToast('自動作成が完了しました');
  } catch (e) {
    showToast(`エラー: ${e.message}`, 'error');
  } finally {
    showOverlay(false);
  }
}

// ============================================================
// 保存
// ============================================================
async function onSave() {
  showOverlay(true);
  try {
    const res = await fetch(`${API}/api/shift/save`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        year:   currentYear,
        month:  currentMonth,
        shifts: shifts.map(s => ({
          date:        s.date,
          shop:        s.shop,
          staffName:   s.staffName,
          openId:      s.openId,
          shiftType:   s.shiftType,
          isManual:    s.isManual    || false,
          isConfirmed: s.isConfirmed || false,
        })),
      }),
    });
    const d = await res.json();
    if (!d.ok) throw new Error(d.error);

    dirty = false;
    document.getElementById('btn-save').disabled = true;
    showToast(`${d.count}件のシフトを保存しました`);
    await loadShiftResult();
  } catch (e) {
    showToast(`保存エラー: ${e.message}`, 'error');
  } finally {
    showOverlay(false);
  }
}

// ============================================================
// PDF出力（印刷CSS）
// ============================================================
function onPrint() {
  window.print();
}

// ============================================================
// ユーティリティ
// ============================================================
function showOverlay(show) {
  document.getElementById('overlay').classList.toggle('hidden', !show);
}

let toastTimer;
function showToast(msg, type = 'info') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = type === 'error' ? '#e63946' : '#333';
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}
</script>

  .shift-table { font-size: 0.65rem; }
  .shift-badge { padding: 0.05rem 0.2rem; font-size: 0.6rem; }
}
