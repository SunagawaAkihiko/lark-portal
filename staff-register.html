<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>スタッフ入職登録</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    /* ===== CSS変数（lark-portal統一デザイン） ===== */
    :root {
      --bg-color:      #fdf6ec;
      --text-color:    #4a3f35;
      --text-muted:    #8c7c6b;
      --primary-color: #e76f51;
      --primary-light: #fcece8;
      --card-bg:       #fff0e3;
      --border-color:  #dcbfa6;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Zen Kaku Gothic New', sans-serif;
      background: var(--bg-color);
      color: var(--text-color);
      -webkit-font-smoothing: antialiased;
      /* 送信ボタン分の下部余白 */
      padding-bottom: 5rem;
    }

    /* ===== ページヘッダー ===== */
    .page-header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--primary-color);
      color: white;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.9rem 1rem;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }
    .page-header h1 { font-size: 1.05rem; font-weight: 700; }
    /* 戻るボタン：前のページへ戻る */
    .back-btn {
      background: none;
      border: none;
      color: white;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 0.2rem;
    }

    /* ===== フォーム全体コンテナ ===== */
    .form-container {
      padding: 1rem;
      max-width: 600px;
      margin: 0 auto;
    }

    /* ===== セクション見出し ===== */
    .section-heading {
      padding: 0.5rem 0.7rem;
      background: var(--primary-light);
      border-radius: 6px;
      margin: 1.4rem 0 0.8rem;
    }
    .section-heading:first-of-type { margin-top: 0.4rem; }
    .section-heading-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--primary-color);
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    /* セクション補足注記（小さく薄く） */
    .section-heading-note {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
      padding-left: 0.1rem;
      line-height: 1.4;
    }

    /* ===== フォームグループ・行レイアウト ===== */
    .form-group { margin-bottom: 0.9rem; }
    /* 2カラムグリッド（姓/名など横並びにする） */
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.7rem;
      margin-bottom: 0.9rem;
    }
    .form-row .form-group { margin-bottom: 0; }

    /* ===== ラベル ===== */
    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-muted);
      margin-bottom: 0.3rem;
    }
    /* 必須マーク */
    label .required { color: var(--primary-color); margin-left: 0.2rem; }

    /* ===== 入力フィールド共通スタイル ===== */
    input[type="text"],
    input[type="tel"],
    input[type="email"],
    select {
      width: 100%;
      padding: 0.7rem 0.75rem;
      border: 1.5px solid var(--border-color);
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.95rem;
      background: var(--card-bg);
      color: var(--text-color);
      -webkit-appearance: none;
      appearance: none;
      max-width: 100%;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--primary-color);
    }

    /* ===== 日付セレクト（月・日）パディング縮小 ===== */
    .date-select-sm {
      padding-left: 0.3rem;
      padding-right: 0.2rem;
    }

    /* ===== 郵便番号入力行 ===== */
    .zip-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.6rem;
    }
    .zip-row input { flex: 1; }
    /* 郵便番号検索ボタン */
    .zip-btn {
      flex-shrink: 0;
      padding: 0.7rem 1rem;
      background: var(--primary-color);
      color: white;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }
    .zip-btn:disabled { opacity: 0.6; cursor: default; }

    /* ===== 住所自動補完表示欄 ===== */
    .address-auto {
      background: white;
      border: 1.5px solid var(--border-color);
      border-radius: 8px;
      padding: 0.55rem 0.75rem;
      font-size: 0.88rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      min-height: 2.4rem;
    }
    .address-auto.filled { color: var(--text-color); }

    /* ===== チェックボックスグリッド（事業所・保有資格） ===== */
    .checkbox-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
    }
    /* チェックボックス1項目のスタイル */
    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.55rem 0.7rem;
      background: var(--card-bg);
      border: 1.5px solid var(--border-color);
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      /* 未選択時はやや薄い色にして選択済みとの差をわかりやすくする */
      color: var(--text-muted);
      transition: all 0.15s;
      /* labelタグのfont-weight上書きを防ぐ */
      font-weight: 400;
      margin-bottom: 0;
    }
    .checkbox-item input[type="checkbox"] {
      /* チェックボックス本体のサイズ調整 */
      width: auto;
      accent-color: var(--primary-color);
      transform: scale(1.2);
      flex-shrink: 0;
      padding: 0;
      border: none;
      background: none;
    }
    /* チェック済みの項目は色を変えて強調する */
    .checkbox-item:has(input:checked) {
      background: var(--primary-light);
      border-color: var(--primary-color);
      color: var(--primary-color);
      font-weight: 700;
    }

    /* ===== 送信ボタン（画面下部固定） ===== */
    .submit-area {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 0.8rem 1rem;
      background: var(--bg-color);
      border-top: 1px solid var(--border-color);
      z-index: 10;
    }
    .submit-btn {
      width: 100%;
      padding: 0.9rem;
      background: var(--primary-color);
      color: white;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
    }
    .submit-btn:disabled { opacity: 0.6; cursor: default; }

    /* ===== トースト通知（登録結果表示） ===== */
    .toast {
      position: fixed;
      bottom: 5.5rem;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: white;
      padding: 0.7rem 1.4rem;
      border-radius: 20px;
      font-size: 0.9rem;
      white-space: nowrap;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
    .toast.success { background: #2e7d32; }
    .toast.error   { background: #c62828; }
  </style>
</head>
<body>

  <!-- ===== ページヘッダー ===== -->
  <header class="page-header">
    <button class="back-btn" onclick="history.back()">
      <i class="fa-solid fa-arrow-left"></i>
    </button>
    <h1><i class="fa-solid fa-user-tie" style="margin-right:.4rem"></i>スタッフ入職登録</h1>
  </header>

  <!-- ===== フォーム本体 ===== -->
  <div class="form-container">

    <!-- ===== 勤務情報セクション ===== -->
    <div class="section-heading">
      <div class="section-heading-title">
        <i class="fa-solid fa-briefcase"></i> 勤務情報
      </div>
    </div>

    <!-- 入社日（全幅：2カラムに入れると年の和暦表示が見切れるため縦並び） -->
    <div class="form-group">
      <label>入社日 <span class="required">*</span></label>
      <div style="display:flex; gap:0.4rem; align-items:center">
        <select id="joinYear" style="flex:3" required>
          <option value="">年</option>
        </select>
        <select id="joinMonth" style="flex:2" class="date-select-sm" required>
          <option value="">月</option>
        </select>
        <select id="joinDay" style="flex:2" class="date-select-sm" required>
          <option value="">日</option>
        </select>
      </div>
    </div>

    <!-- 勤務開始日（全幅） -->
    <div class="form-group">
      <label>勤務開始日 <span class="required">*</span></label>
      <div style="display:flex; gap:0.4rem; align-items:center">
        <select id="workStartYear" style="flex:3" required>
          <option value="">年</option>
        </select>
        <select id="workStartMonth" style="flex:2" class="date-select-sm" required>
          <option value="">月</option>
        </select>
        <select id="workStartDay" style="flex:2" class="date-select-sm" required>
          <option value="">日</option>
        </select>
      </div>
    </div>

    <!-- 事業所名（複数選択可・チェックボックス） -->
    <div class="form-group">
      <label>事業所名（複数選択可） <span class="required">*</span></label>
      <div class="checkbox-grid">
        <label class="checkbox-item">
          <input type="checkbox" name="office" value="大浦家"> 大浦家
        </label>
        <label class="checkbox-item">
          <input type="checkbox" name="office" value="上津役家"> 上津役家
        </label>
      </div>
    </div>

    <!-- 雇用形態 -->
    <div class="form-group">
      <label>雇用形態 <span class="required">*</span></label>
      <select id="employmentType" required>
        <option value="">選択してください</option>
        <option>正社員</option>
        <option>正社員(夜勤専従)</option>
        <option>正社員(日勤夜勤兼務)</option>
        <option>日勤パート</option>
        <option>夜勤パート</option>
        <option>調理パート</option>
      </select>
    </div>

    <!-- ===== 本人情報セクション ===== -->
    <div class="section-heading">
      <div class="section-heading-title">
        <i class="fa-solid fa-circle-user"></i> 本人情報
      </div>
    </div>

    <!-- 姓・名（テキスト入力） -->
    <div class="form-row">
      <div class="form-group">
        <label>姓 <span class="required">*</span></label>
        <input type="text" id="lastName" placeholder="例: 田中" required>
      </div>
      <div class="form-group">
        <label>名 <span class="required">*</span></label>
        <input type="text" id="firstName" placeholder="例: 一郎" required>
      </div>
    </div>

    <!-- 住所（郵便番号検索→都道府県+市区町村自動入力→番地手入力） -->
    <div class="form-group">
      <label>住所 <span class="required">*</span></label>
      <!-- 郵便番号入力 + 検索ボタン行 -->
      <div class="zip-row">
        <input type="text" id="staffZip" placeholder="郵便番号（ハイフン不要・7桁）"
               maxlength="7" inputmode="numeric" required>
        <button class="zip-btn" onclick="searchZip()">
          <i class="fa-solid fa-magnifying-glass"></i> 検索
        </button>
      </div>
      <!-- HeartRails APIで取得した都道府県+市区町村の表示欄 -->
      <div class="address-auto" id="staffPrefDisplay">
        ← 郵便番号を入力して検索すると自動入力されます
      </div>
      <!-- 隠しフィールド：都道府県+市区町村の実データ -->
      <input type="hidden" id="staffPref">
      <!-- 番地・建物名の手入力欄 -->
      <input type="text" id="staffDetail" placeholder="番地・建物名・号室を入力" required>
    </div>

    <!-- 生年月日 -->
    <div class="form-group">
      <label>生年月日 <span class="required">*</span></label>
      <div style="display:flex; gap:0.4rem; align-items:center">
        <select id="birthYear" style="flex:3" required>
          <option value="">年</option>
        </select>
        <select id="birthMonth" style="flex:2" class="date-select-sm" required>
          <option value="">月</option>
        </select>
        <select id="birthDay" style="flex:2" class="date-select-sm" required>
          <option value="">日</option>
        </select>
      </div>
    </div>

    <!-- 電話番号・メールアドレス -->
    <div class="form-row">
      <div class="form-group">
        <label>電話番号（ハイフン不要） <span class="required">*</span></label>
        <input type="tel" id="phone" placeholder="例: 09012345678" required>
      </div>
      <div class="form-group">
        <label>メールアドレス（給与明細などの受取先） <span class="required">*</span></label>
        <input type="email" id="email" placeholder="例: tanaka@example.com" required>
      </div>
    </div>

    <!-- ===== 保有資格セクション ===== -->
    <div class="section-heading">
      <div class="section-heading-title">
        <i class="fa-solid fa-certificate"></i> 保有資格 <span class="required" style="margin-left:.3rem">*</span>
      </div>
      <div class="section-heading-note">
        ※該当するものをすべて選択してください。（なし含む）
      </div>
    </div>

    <div class="form-group">
      <div class="checkbox-grid">
        <label class="checkbox-item">
          <input type="checkbox" name="qual" value="なし"> なし
        </label>
        <label class="checkbox-item">
          <input type="checkbox" name="qual" value="自動車運転免許"> 自動車運転免許
        </label>
        <label class="checkbox-item">
          <input type="checkbox" name="qual" value="初任者研修"> 初任者研修
        </label>
        <label class="checkbox-item">
          <input type="checkbox" name="qual" value="実務者研修"> 実務者研修
        </label>
        <label class="checkbox-item">
          <input type="checkbox" name="qual" value="介護福祉士"> 介護福祉士
        </label>
        <label class="checkbox-item">
          <input type="checkbox" name="qual" value="ケアマネ"> ケアマネ
        </label>
        <label class="checkbox-item">
          <input type="checkbox" name="qual" value="認定介護福祉士"> 認定介護福祉士
        </label>
        <label class="checkbox-item">
          <input type="checkbox" name="qual" value="認知症介護基礎研修"> 認知症介護基礎研修
        </label>
        <label class="checkbox-item">
          <input type="checkbox" name="qual" value="認知症ケア専門士"> 認知症ケア専門士
        </label>
        <label class="checkbox-item">
          <input type="checkbox" name="qual" value="ガイドヘルパー"> ガイドヘルパー
        </label>
        <label class="checkbox-item">
          <input type="checkbox" name="qual" value="社会福祉士"> 社会福祉士
        </label>
        <label class="checkbox-item">
          <input type="checkbox" name="qual" value="准看護師"> 准看護師
        </label>
        <label class="checkbox-item">
          <input type="checkbox" name="qual" value="正看護師"> 正看護師
        </label>
        <label class="checkbox-item">
          <input type="checkbox" name="qual" value="作業療法士"> 作業療法士
        </label>
      </div>
    </div>

  </div><!-- /form-container -->

  <!-- ===== 送信ボタン（画面下部固定） ===== -->
  <div class="submit-area">
    <button class="submit-btn" id="submitBtn" onclick="submitForm()">
      <i class="fa-solid fa-floppy-disk" style="margin-right:.4rem"></i>登録する
    </button>
  </div>

  <!-- ===== トースト通知 ===== -->
  <div class="toast" id="toast"></div>

  <script>
    // ============================================================
    // 定数
    // ============================================================

    /** APIサーバーのベースURL（production: Render） */
    const API_BASE = 'https://attendance-app-irf1.onrender.com';

    // Renderフリー枠はスリープするため、ページ読み込み時にサーバーをウォームアップする
    fetch(`${API_BASE}/api/care/meta`).catch(() => {});


    // ============================================================
    // 和暦変換ヘルパー
    // 西暦から元号年を「令和X年」形式の文字列で返す
    // ============================================================
    function warekiStr(year) {
      if      (year >= 2019) return `令和${year - 2018 === 1 ? '元' : year - 2018}年`;
      else if (year >= 1989) return `平成${year - 1988 === 1 ? '元' : year - 1988}年`;
      else if (year >= 1926) return `昭和${year - 1925 === 1 ? '元' : year - 1925}年`;
      else if (year >= 1912) return `大正${year - 1911 === 1 ? '元' : year - 1911}年`;
      else                   return `明治${year - 1867 === 1 ? '元' : year - 1867}年`;
    }

    // ============================================================
    // 月・日セレクトに共通の選択肢を追加するヘルパー
    // ============================================================
    function fillMonthDay(monthId, dayId) {
      const monthSel = document.getElementById(monthId);
      for (let m = 1; m <= 12; m++) {
        const opt = document.createElement('option');
        opt.value = m;
        opt.textContent = m + '月';
        monthSel.appendChild(opt);
      }
      const daySel = document.getElementById(dayId);
      for (let d = 1; d <= 31; d++) {
        const opt = document.createElement('option');
        opt.value = d;
        opt.textContent = d + '日';
        daySel.appendChild(opt);
      }
    }

    // ============================================================
    // 各日付セレクトの選択肢を初期化する
    // ============================================================
    (function initDateSelects() {
      const currentYear = new Date().getFullYear();

      // ── 入社日：前年〜翌年+1の範囲（降順）──
      const joinYearSel = document.getElementById('joinYear');
      for (let y = currentYear + 1; y >= currentYear - 1; y--) {
        const opt = document.createElement('option');
        opt.value = y;
        opt.textContent = `${y}年（${warekiStr(y)}）`;
        joinYearSel.appendChild(opt);
      }
      fillMonthDay('joinMonth', 'joinDay');

      // ── 勤務開始日：前年〜翌年+1の範囲（降順）──
      const workStartYearSel = document.getElementById('workStartYear');
      for (let y = currentYear + 1; y >= currentYear - 1; y--) {
        const opt = document.createElement('option');
        opt.value = y;
        opt.textContent = `${y}年（${warekiStr(y)}）`;
        workStartYearSel.appendChild(opt);
      }
      fillMonthDay('workStartMonth', 'workStartDay');

      // ── 生年月日：現在年〜1960年（降順）──
      const birthYearSel = document.getElementById('birthYear');
      for (let y = currentYear; y >= 1960; y--) {
        const opt = document.createElement('option');
        opt.value = y;
        opt.textContent = `${y}年（${warekiStr(y)}）`;
        birthYearSel.appendChild(opt);
      }
      fillMonthDay('birthMonth', 'birthDay');
    })();


    // ============================================================
    // zipcloudレスポンス互換形式から住所文字列を組み立てるヘルパー
    // サーバープロキシは zipcloud 互換形式（results 配列）で返す
    // address3 に「以下に掲載がない場合」が含まれる場合は除外する
    // ============================================================
    function parseZipcloudResult(d) {
      if (!d || !d.results || !d.results.length) return '';
      const a  = d.results[0];
      const a3 = (a.address3 || '').replace('以下に掲載がない場合', '').trim();
      return (a.address1 || '') + (a.address2 || '') + a3;
    }

    // ============================================================
    // 郵便番号から住所を検索する（スタッフ住所用・単一フィールド）
    //
    // ① HeartRails GeoAPI（CORS対応・町名まで取得可能）
    // ② サーバープロキシ（HeartRails経由・最大3回リトライ）
    //    Renderスリープ中の場合は2秒待って最大3回リトライする
    // ============================================================
    async function searchZip() {
      const zipInput = document.getElementById('staffZip');
      const zipcode  = zipInput.value.replace(/[^0-9]/g, '');

      if (zipcode.length !== 7) {
        showToast('郵便番号は7桁で入力してください', 'error');
        return;
      }

      const btn = zipInput.closest('.zip-row').querySelector('.zip-btn');
      btn.disabled = true;
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 検索中';

      try {
        let pref = '';

        // ── ①: HeartRails GeoAPI（CORS対応・町名まで取得可能） ──
        // 政令指定都市はcityに市名、townに「区名＋町名」が入る
        try {
          const r = await fetch(
            'https://geoapi.heartrails.com/api/json?method=searchByPostal&postal=' + zipcode
          );
          if (r.ok) {
            const d = await r.json();
            const loc = d?.response?.location?.[0];
            if (loc) {
              pref = (loc.prefecture || '') + (loc.city || '') + (loc.town || '');
            }
          }
        } catch { /* ネットワークエラー等は無視して②へ */ }

        // ── ②: サーバープロキシ（HeartRails経由・最大3回リトライ） ──
        for (let attempt = 1; attempt <= 3; attempt++) {
          try {
            const r = await fetch(API_BASE + '/api/zipcode?zipcode=' + zipcode);
            const d = await r.json();
            const candidate = parseZipcloudResult(d);
            if (candidate.length > pref.length) pref = candidate;
            if (pref) break;
          } catch { /* サーバー未起動等は無視 */ }

          if (attempt < 3 && !pref) {
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 接続中…';
            await new Promise(res => setTimeout(res, 2000));
          }
        }

        if (!pref) {
          showToast('住所が取得できませんでした。郵便番号をご確認ください。', 'error');
          return;
        }

        // 表示欄を更新する
        const display = document.getElementById('staffPrefDisplay');
        display.textContent = pref;
        display.classList.add('filled');
        // 隠しフィールドにも保存する（送信時に使用）
        document.getElementById('staffPref').value = pref;

      } catch (e) {
        showToast('住所検索でエラーが発生しました。', 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-magnifying-glass"></i> 検索';
      }
    }


    // ============================================================
    // フォームバリデーション
    // 必須項目の未入力・未選択をチェックしてエラーメッセージを返す
    // ============================================================
    function validateForm() {
      // 入社日（年・月・日すべて選択されているか確認する）
      if (!document.getElementById('joinYear').value ||
          !document.getElementById('joinMonth').value ||
          !document.getElementById('joinDay').value) {
        document.getElementById('joinYear').scrollIntoView({ behavior: 'smooth', block: 'center' });
        return '入社日を選択してください。';
      }

      // 勤務開始日
      if (!document.getElementById('workStartYear').value ||
          !document.getElementById('workStartMonth').value ||
          !document.getElementById('workStartDay').value) {
        document.getElementById('workStartYear').scrollIntoView({ behavior: 'smooth', block: 'center' });
        return '勤務開始日を選択してください。';
      }

      // 事業所名（少なくとも1つチェックされているか確認する）
      const officeChecked = [...document.querySelectorAll('input[name="office"]:checked')];
      if (officeChecked.length === 0) {
        document.querySelector('input[name="office"]').scrollIntoView({ behavior: 'smooth', block: 'center' });
        return '事業所名を選択してください。';
      }

      // 雇用形態
      if (!document.getElementById('employmentType').value) {
        document.getElementById('employmentType').scrollIntoView({ behavior: 'smooth', block: 'center' });
        return '雇用形態を選択してください。';
      }

      // 姓・名
      if (!document.getElementById('lastName').value.trim()) {
        document.getElementById('lastName').scrollIntoView({ behavior: 'smooth', block: 'center' });
        return '姓を入力してください。';
      }
      if (!document.getElementById('firstName').value.trim()) {
        document.getElementById('firstName').scrollIntoView({ behavior: 'smooth', block: 'center' });
        return '名を入力してください。';
      }

      // 住所：郵便番号検索が完了しているか確認する
      if (!document.getElementById('staffZip').value.trim()) {
        document.getElementById('staffZip').scrollIntoView({ behavior: 'smooth', block: 'center' });
        return '郵便番号を入力して検索してください。';
      }
      if (!document.getElementById('staffPref').value) {
        document.getElementById('staffZip').scrollIntoView({ behavior: 'smooth', block: 'center' });
        return '郵便番号を検索してください。';
      }
      if (!document.getElementById('staffDetail').value.trim()) {
        document.getElementById('staffDetail').scrollIntoView({ behavior: 'smooth', block: 'center' });
        return '番地・建物名を入力してください。';
      }

      // 生年月日
      if (!document.getElementById('birthYear').value ||
          !document.getElementById('birthMonth').value ||
          !document.getElementById('birthDay').value) {
        document.getElementById('birthYear').scrollIntoView({ behavior: 'smooth', block: 'center' });
        return '生年月日を選択してください。';
      }

      // 電話番号・メールアドレス
      if (!document.getElementById('phone').value.trim()) {
        document.getElementById('phone').scrollIntoView({ behavior: 'smooth', block: 'center' });
        return '電話番号を入力してください。';
      }
      if (!document.getElementById('email').value.trim()) {
        document.getElementById('email').scrollIntoView({ behavior: 'smooth', block: 'center' });
        return 'メールアドレスを入力してください。';
      }

      // 保有資格（少なくとも1つチェックされているか確認する）
      const qualChecked = [...document.querySelectorAll('input[name="qual"]:checked')];
      if (qualChecked.length === 0) {
        document.querySelector('input[name="qual"]').scrollIntoView({ behavior: 'smooth', block: 'center' });
        return '保有資格を選択してください。（なし含む）';
      }

      return null; // バリデーション通過
    }


    // ============================================================
    // フォーム送信処理
    // バリデーション → APIリクエスト → 完了処理
    // ============================================================
    async function submitForm() {
      const errMsg = validateForm();
      if (errMsg) {
        showToast(errMsg, 'error');
        return;
      }

      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 登録中...';

      try {
        // 日付を YYYY-MM-DD 形式に組み立てる
        const joinDate = (() => {
          const y = document.getElementById('joinYear').value;
          const m = String(document.getElementById('joinMonth').value).padStart(2, '0');
          const d = String(document.getElementById('joinDay').value).padStart(2, '0');
          return `${y}-${m}-${d}`;
        })();

        const workStartDate = (() => {
          const y = document.getElementById('workStartYear').value;
          const m = String(document.getElementById('workStartMonth').value).padStart(2, '0');
          const d = String(document.getElementById('workStartDay').value).padStart(2, '0');
          return `${y}-${m}-${d}`;
        })();

        const birthDate = (() => {
          const y = document.getElementById('birthYear').value;
          const m = String(document.getElementById('birthMonth').value).padStart(2, '0');
          const d = String(document.getElementById('birthDay').value).padStart(2, '0');
          return `${y}-${m}-${d}`;
        })();

        // チェックボックスの選択値を配列で収集する
        const offices = [...document.querySelectorAll('input[name="office"]:checked')]
          .map(el => el.value);
        const qualifications = [...document.querySelectorAll('input[name="qual"]:checked')]
          .map(el => el.value);

        const body = {
          joinDate,
          workStartDate,
          offices,
          employmentType: document.getElementById('employmentType').value,
          lastName:       document.getElementById('lastName').value.trim(),
          firstName:      document.getElementById('firstName').value.trim(),
          zip:            document.getElementById('staffZip').value.trim(),
          pref:           document.getElementById('staffPref').value,
          addressDetail:  document.getElementById('staffDetail').value.trim(),
          birthDate,
          phone:          document.getElementById('phone').value.trim(),
          email:          document.getElementById('email').value.trim(),
          qualifications,
        };

        const res  = await fetch(`${API_BASE}/api/staff/add`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify(body),
        });
        const data = await res.json();

        if (!data.ok) {
          // エラー詳細をalertで表示してスマホでもデバッグできるようにする
          const detail = data.larkDetail ? JSON.stringify(data.larkDetail) : '';
          const sent   = data.sentFields  ? '送信フィールド: ' + data.sentFields.join(', ') : '';
          alert('登録失敗\n' + data.error + '\n\n' + detail + '\n' + sent);
          throw new Error(data.error || '登録に失敗しました');
        }

        // 登録成功：成功メッセージを表示してポータルに戻る
        showToast('登録が完了しました', 'success');
        setTimeout(() => { window.location.href = 'index.html'; }, 1800);

      } catch (err) {
        console.error('[submitForm] エラー:', err);
        showToast('登録に失敗しました: ' + err.message, 'error');
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="fa-solid fa-floppy-disk" style="margin-right:.4rem"></i>登録する';
      }
    }


    // ============================================================
    // トースト通知の表示
    // ============================================================
    function showToast(msg, type = '') {
      const el = document.getElementById('toast');
      el.textContent  = msg;
      el.className    = 'toast show' + (type ? ' ' + type : '');
      // 3秒後に非表示にする
      clearTimeout(el._timer);
      el._timer = setTimeout(() => { el.classList.remove('show'); }, 3000);
    }
  </script>
</body>
</html>
