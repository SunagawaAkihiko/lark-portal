<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ヘルパー記録</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      --bg-color:      #fdf6ec;
      --text-color:    #4a3f35;
      --text-muted:    #8c7c6b;
      --primary-color: #e76f51;
      --primary-light: #fcece8;
      --border-color:  #dcbfa6;
      --card-bg:       #fff0e3;
      --green:         #2a9d8f;
      --green-light:   #e6f7f5;
      --blue:          #457b9d;
      --red:           #e63946;
      --red-light:     #fdecea;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Zen Kaku Gothic New', sans-serif;
      background: var(--bg-color);
      color: var(--text-color);
      -webkit-font-smoothing: antialiased;
      padding-bottom: 4rem;
    }
    .hidden { display: none !important; }

    /* ===== 固定ヘッダー ===== */
    .sticky-header {
      position: sticky; top: 0; z-index: 21;
      box-shadow: 0 2px 6px rgba(139,115,95,0.12);
    }

    /* ===== 1段目：事業所タブ ===== */
    .office-tabs {
      display: flex; flex-wrap: wrap;
      background: var(--text-color);
      padding: 0 1rem 0.75rem; gap: 0.5rem;
    }
    .office-tabs-label {
      width: 100%; color: white;
      font-size: 1.05rem; font-weight: 700;
      padding: 0.75rem 0 0.1rem;
      display: flex; align-items: center; gap: 0.4rem;
    }
    .office-tabs-label i { color: #f4a261; }
    .office-tab {
      flex: 1; padding: 0.55rem 0; border: none; border-radius: 8px;
      font-family: inherit; font-size: 0.95rem; font-weight: 700; cursor: pointer;
      background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.6);
      transition: background 0.2s, color 0.2s;
    }
    .office-tab.active { background: var(--primary-color); color: white; }

    /* ===== 2段目：機能タブ ===== */
    .tab-bar {
      display: flex;
      background: #ede0d4;
      padding: 0.45rem 0.7rem; gap: 0.4rem;
      border-bottom: 2px solid #c9a98a;
    }
    .tab-btn {
      flex: 1; text-align: center;
      padding: 0.4rem 0.5rem; border-radius: 6px;
      border: 1.5px solid #9a7a6b;
      background: #f5ebe0; color: #6b4f3a;
      font-family: inherit; font-size: 0.82rem; font-weight: 700;
      cursor: pointer; transition: all 0.18s;
      white-space: nowrap;
    }
    .tab-btn.active { background: #6b4f3a; color: white; border-color: #6b4f3a; }

    /* ===== コンテンツ共通 ===== */
    .tab-content { padding: 1rem; }

    /* ===== フィルターエリア（1行コンパクト） ===== */
    .filter-area {
      background: white;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 0.5rem 0.75rem;
      margin-bottom: 0.75rem;
      display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap;
    }
    /* ラベル＋入力欄をまとめたチップ単位 */
    .filter-chip {
      display: flex; align-items: center; gap: 0.3rem;
      flex: 1; min-width: 7rem;
    }
    .filter-label {
      font-size: 0.72rem; font-weight: 700; color: var(--text-muted);
      white-space: nowrap; flex-shrink: 0;
    }
    .filter-select, .filter-input {
      flex: 1; min-width: 0;
      border: 1.5px solid var(--border-color); border-radius: 8px;
      padding: 0.4rem 0.5rem; font-family: inherit; font-size: 0.85rem;
      background: var(--bg-color); color: var(--text-color);
    }
    .filter-select:focus, .filter-input:focus {
      outline: none; border-color: var(--primary-color);
    }
    .filter-btn {
      padding: 0.42rem 0.9rem; border-radius: 8px; border: none;
      background: var(--primary-color); color: white;
      font-family: inherit; font-size: 0.9rem; font-weight: 700;
      cursor: pointer; flex-shrink: 0;
    }

    /* ===== レコード一覧（日付グループ形式） ===== */
    .records-area {
      background: white;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      overflow: hidden;
    }
    /* 日付グループのヘッダー帯：濃いブラウンで強調する */
    .date-group-header {
      padding: 0.28rem 0.75rem;
      background: #4a3f35;
      border-bottom: 2px solid #2e2620;
      font-size: 0.8rem; font-weight: 700; color: #ffffff;
      letter-spacing: 0.05em;
    }
    /* 氏名サブグループのヘッダー帯：日付帯と明確に差別化したオレンジ系 */
    .name-group-header {
      padding: 0.22rem 1.1rem;
      background: #e8a070;
      border-bottom: 1px solid #c8784a;
      font-size: 0.82rem; font-weight: 700; color: #fff;
    }
    /* 1レコード：2行レイアウト */
    .record-item {
      padding: 0.45rem 0.75rem;
      border-bottom: 1px solid var(--border-color);
    }
    /* 名前グループ内の最後のアイテムは下線不要（次が氏名帯か日付帯になるため） */
    .record-item:last-child { border-bottom: none; }
    .record-item:active { background: var(--primary-light); }
    /* 1行目：氏名・作業項目・提供時間 ＋ 操作ボタン */
    .record-item-main {
      display: flex; align-items: flex-start; gap: 0.4rem;
    }
    .record-item-info { flex: 1; min-width: 0; }
    .record-item-line1 {
      display: flex; align-items: baseline; gap: 0.35rem;
      flex-wrap: wrap;
    }
    .record-item-name {
      font-size: 0.88rem; font-weight: 700;
      white-space: nowrap;
    }
    .record-item-sagyou {
      font-size: 0.8rem; color: var(--text-color);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .record-item-time {
      font-size: 0.8rem; color: var(--text-color);
      white-space: nowrap; flex-shrink: 0;
    }
    .record-item-staff {
      font-size: 0.75rem; color: var(--text-color);
      white-space: nowrap; flex-shrink: 0;
    }
    /* 2行目：記録内容（全文表示） */
    .record-item-content {
      font-size: 0.72rem; color: var(--text-muted);
      margin-top: 0.12rem;
      white-space: normal; line-height: 1.4;
    }
    /* タップ選択時のハイライト */
    .record-item { cursor: pointer; }
    .record-item.selected { background: #fff3e0; outline: 2px solid var(--primary-color); outline-offset: -2px; }

    /* ===== 下部アクションバー（記録選択時に表示） ===== */
    .record-action-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      display: flex; z-index: 30;
      border-top: 2px solid var(--border-color);
      box-shadow: 0 -3px 14px rgba(0,0,0,0.15);
    }
    .rab-btn {
      flex: 1; padding: 1rem 0.4rem;
      border: none; font-family: inherit; font-size: 0.88rem; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.35rem;
      transition: filter 0.12s;
    }
    .rab-btn:active { filter: brightness(0.88); }
    /* 異常（左）・中止（中）・削除（右） */
    .rab-ijo    { background: #fff3e0; color: #e65100; border-right: 1px solid var(--border-color); }
    .rab-chushi { background: #f5f0eb; color: var(--text-muted); border-right: 1px solid var(--border-color); }
    .rab-delete { background: #fdecea; color: #c62828; }

    /* ===== 空状態・ローディング ===== */
    .status-msg {
      text-align: center; padding: 3rem 1rem;
      color: var(--text-muted); font-size: 0.95rem;
      display: flex; flex-direction: column; align-items: center; gap: 0.75rem;
    }
    .status-msg i { font-size: 2rem; }

    /* ===== 記録作成フォーム ===== */
    .create-form {
      background: white;
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 1rem;
      display: flex; flex-direction: column; gap: 0.85rem;
    }
    .form-row { display: flex; flex-direction: column; gap: 0.3rem; }
    .form-label {
      font-size: 0.82rem; font-weight: 700; color: var(--text-muted);
    }
    .form-required { color: var(--red); }
    .form-select, .form-input {
      display: block; width: 100%; box-sizing: border-box;
      border: 1.5px solid var(--border-color); border-radius: 8px;
      padding: 0.6rem 0.75rem; font-family: inherit; font-size: 0.95rem;
      background: var(--bg-color); color: var(--text-color);
    }
    .form-select:focus, .form-input:focus {
      outline: none; border-color: var(--primary-color);
    }
    /* iOS Safari は input[type=date] に独自の最小幅を強制するため、
       -webkit-appearance: none でネイティブスタイルを剥がして CSS 幅を有効にする。
       タップ時の日付ピッカーの動作は維持される。 */
    .form-input[type=date] {
      -webkit-appearance: none;
      appearance: none;
      width: 100% !important;
      min-width: 0 !important;
    }
    .create-btn {
      width: 100%; padding: 0.8rem; border-radius: 10px; border: none;
      background: var(--primary-color); color: white;
      font-family: inherit; font-size: 1rem; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      transition: opacity 0.2s;
    }
    .create-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .create-result {
      border-radius: 10px; padding: 0.8rem 1rem;
      font-size: 0.9rem; font-weight: 700; text-align: center;
    }
    .create-result.ok  { background: var(--green-light); color: var(--green); }
    .create-result.err { background: var(--red-light);   color: var(--red); }

    /* ===== 一時停止管理 ===== */
    .pause-customer-group {
      margin-bottom: 1rem;
    }
    .pause-customer-header {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.5rem 0.75rem;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 10px 10px 0 0;
      font-weight: 700; font-size: 0.95rem;
      cursor: pointer;
    }
    .pause-customer-header i { color: var(--text-muted); transition: transform 0.2s; }
    .pause-customer-header.collapsed i.chevron { transform: rotate(-90deg); }
    .pause-service-list {
      border: 1px solid var(--border-color); border-top: none;
      border-radius: 0 0 10px 10px; overflow: hidden;
    }
    .pause-service-item {
      padding: 0.75rem 1rem;
      background: white;
      border-bottom: 1px solid #f0e0d0;
      display: flex; flex-direction: column; gap: 0.4rem;
    }
    .pause-service-item:last-child { border-bottom: none; }
    .pause-service-title {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 0.4rem;
    }
    .pause-service-name { font-size: 0.88rem; font-weight: 700; }
    .pause-status {
      font-size: 0.75rem; font-weight: 700; padding: 0.15rem 0.5rem;
      border-radius: 20px;
    }
    .status-active  { background: var(--green-light); color: var(--green); }
    .status-paused  { background: var(--red-light);   color: var(--red); }
    .status-waiting { background: #fff3cd; color: #7a5700; }
    .pause-date-info { font-size: 0.78rem; color: var(--text-muted); }
    .pause-actions {
      display: flex; gap: 0.4rem; flex-wrap: wrap; margin-top: 0.3rem;
    }
    .btn-pause, .btn-resume {
      padding: 0.3rem 0.85rem; border-radius: 6px; border: none;
      font-family: inherit; font-size: 0.78rem; font-weight: 700; cursor: pointer;
    }
    .btn-pause  { background: var(--red-light);   color: var(--red); }
    .btn-resume { background: var(--green-light); color: var(--green); }
    .btn-set-date {
      padding: 0.3rem 0.85rem; border-radius: 6px; border: none;
      background: #e8f4fd; color: var(--blue);
      font-family: inherit; font-size: 0.78rem; font-weight: 700; cursor: pointer;
    }
    .pause-date-input {
      border: 1.5px solid var(--border-color); border-radius: 6px;
      padding: 0.3rem 0.5rem; font-family: inherit; font-size: 0.85rem;
      background: var(--bg-color); color: var(--text-color);
    }

    /* ===== 編集モーダル ===== */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(74,63,53,0.55);
      display: flex; align-items: center; justify-content: center;
      padding: 1rem;
    }
    .modal {
      background: white; border-radius: 16px;
      width: 100%; max-width: 480px; max-height: 90vh;
      overflow-y: auto;
      padding: 1.25rem;
      display: flex; flex-direction: column; gap: 0.85rem;
    }
    .modal-title {
      font-size: 1.05rem; font-weight: 700;
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-close {
      background: none; border: none; cursor: pointer;
      font-size: 1.2rem; color: var(--text-muted); padding: 0.2rem;
    }
    .modal-footer {
      display: flex; gap: 0.5rem; margin-top: 0.5rem;
    }
    .btn-save {
      flex: 1; padding: 0.7rem; border-radius: 8px; border: none;
      background: var(--green); color: white;
      font-family: inherit; font-size: 0.95rem; font-weight: 700; cursor: pointer;
    }
    .btn-cancel {
      padding: 0.7rem 1.2rem; border-radius: 8px;
      border: 1.5px solid var(--border-color);
      background: white; color: var(--text-muted);
      font-family: inherit; font-size: 0.95rem; font-weight: 700; cursor: pointer;
    }

    /* ===== 一時停止管理：一括操作カード ===== */
    .bulk-op-card {
      background: white; border: 1px solid var(--border-color);
      border-radius: 12px; padding: 1rem;
      display: flex; flex-direction: column; gap: 0.85rem;
      margin-bottom: 1.25rem;
    }
    .bulk-op-title {
      font-size: 0.95rem; font-weight: 700;
      display: flex; align-items: center; gap: 0.4rem;
      color: var(--text-color);
    }
    .action-toggle {
      display: flex; gap: 0.5rem;
    }
    .action-btn {
      flex: 1; padding: 0.55rem 0; border-radius: 8px;
      border: 1.5px solid var(--border-color);
      background: var(--bg-color); color: var(--text-muted);
      font-family: inherit; font-size: 0.9rem; font-weight: 700; cursor: pointer;
      transition: all 0.18s;
    }
    .action-btn.active.pause  { background: var(--red-light);   color: var(--red);   border-color: var(--red); }
    .action-btn.active.resume { background: var(--green-light); color: var(--green); border-color: var(--green); }
    .bulk-service-list {
      display: flex; flex-direction: column; gap: 0.4rem;
    }
    .bulk-svc-item {
      display: flex; align-items: flex-start; gap: 0.65rem;
      padding: 0.55rem 0.75rem; background: var(--bg-color);
      border: 1px solid var(--border-color); border-radius: 8px;
    }
    .bulk-svc-item input[type=checkbox] {
      width: 1.1rem; height: 1.1rem; margin-top: 0.15rem; flex-shrink: 0;
      accent-color: var(--primary-color); cursor: pointer;
    }
    .bulk-svc-info { flex: 1; min-width: 0; }
    .bulk-svc-name { font-size: 0.88rem; font-weight: 700; }
    .bulk-svc-meta { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.1rem; }
    .bulk-result {
      border-radius: 10px; padding: 0.7rem 1rem;
      font-size: 0.88rem; font-weight: 700; text-align: center;
    }
    .bulk-result.ok  { background: var(--green-light); color: var(--green); }
    .bulk-result.err { background: var(--red-light);   color: var(--red); }

    /* ===== 一時停止日程設定サブエリア（個別編集用） ===== */
    .pause-date-form {
      background: #fdf0eb; border: 1px solid var(--border-color);
      border-radius: 8px; padding: 0.65rem 0.85rem;
      display: flex; flex-direction: column; gap: 0.5rem;
      margin-top: 0.3rem;
    }
    .pause-date-row {
      display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap;
    }
    .pause-date-row label {
      font-size: 0.78rem; font-weight: 700; color: var(--text-muted);
      width: 4rem; flex-shrink: 0;
    }
    .pause-date-confirm {
      padding: 0.35rem 0.9rem; border-radius: 6px; border: none;
      background: var(--primary-color); color: white;
      font-family: inherit; font-size: 0.82rem; font-weight: 700; cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- ===== 固定ヘッダー ===== -->
  <div class="sticky-header">
    <!-- 1段目：タイトル + 事業所タブ -->
    <div class="office-tabs">
      <div class="office-tabs-label">
        <i class="fa-solid fa-clipboard-user"></i>
        ヘルパー記録
      </div>
      <div id="officeTabs" style="display:flex;gap:0.5rem;width:100%;"></div>
    </div>
    <!-- 2段目：機能タブ（一時停止管理は管理者モード時のみ表示） -->
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="list">
        <i class="fa-solid fa-list"></i> 記録履歴
      </button>
      <button class="tab-btn" data-tab="create">
        <i class="fa-solid fa-plus"></i> 記録作成
      </button>
      <button class="tab-btn hidden" id="pauseTabBtn" data-tab="pause">
        <i class="fa-solid fa-pause"></i> 一時停止管理
      </button>
    </div>
  </div>

  <!-- ===== タブ①：記録一覧 ===== -->
  <div id="tab-list" class="tab-content">
    <!-- フィルターエリア（1行コンパクト） -->
    <div class="filter-area">
      <div class="filter-chip">
        <span class="filter-label">年月</span>
        <input type="month" id="filterMonth" class="filter-input">
      </div>
      <div class="filter-chip">
        <span class="filter-label">氏名</span>
        <select id="filterName" class="filter-select">
          <option value="">全員</option>
        </select>
      </div>
      <div class="filter-chip">
        <span class="filter-label">区分</span>
        <select id="filterKinmu" class="filter-select">
          <option value="">全区分</option>
        </select>
      </div>
      <button class="filter-btn" id="searchBtn">
        <i class="fa-solid fa-magnifying-glass"></i>
      </button>
    </div>
    <!-- 件数表示 -->
    <div id="recordCount" style="font-size:0.82rem;color:var(--text-muted);margin-bottom:0.5rem;"></div>
    <!-- レコードリスト -->
    <div class="records-area" id="recordsList">
      <div class="status-msg">
        <i class="fa-solid fa-magnifying-glass"></i>
        検索してください
      </div>
    </div>
  </div>

  <!-- ===== タブ②：記録作成 ===== -->
  <div id="tab-create" class="tab-content hidden">
    <div class="create-form">
      <div style="font-size:0.88rem;color:var(--text-muted);line-height:1.5;padding:0.2rem 0.5rem;background:var(--primary-light);border-radius:8px;">
        <i class="fa-solid fa-circle-info" style="color:var(--primary-color);"></i>
        実施日・事業所・勤務区分を指定すると、対象の顧客別作業設定から記録を一括作成します。
      </div>

      <div class="form-row">
        <label class="form-label">実施日 <span class="form-required">*</span></label>
        <input type="date" id="createDate" class="form-input">
      </div>
      <div class="form-row">
        <label class="form-label">事業所 <span class="form-required">*</span></label>
        <select id="createOffice" class="form-select">
          <option value="">選択してください</option>
        </select>
      </div>
      <div class="form-row">
        <label class="form-label">勤務区分 <span class="form-required">*</span></label>
        <select id="createKinmu" class="form-select">
          <option value="">選択してください</option>
        </select>
      </div>
      <div class="form-row">
        <label class="form-label">スタッフ <span class="form-required">*</span></label>
        <select id="createStaff" class="form-select">
          <option value="">選択してください</option>
        </select>
      </div>

      <button class="create-btn" id="createBtn" onclick="submitCreate()">
        <i class="fa-solid fa-pen-to-square"></i>
        記録を一括作成する
      </button>
      <div id="createResult" class="hidden"></div>
    </div>
  </div>

  <!-- ===== タブ③：一時停止管理 ===== -->
  <div id="tab-pause" class="tab-content hidden">

    <!-- 一括操作カード -->
    <div class="bulk-op-card">
      <div class="bulk-op-title">
        <i class="fa-solid fa-sliders"></i> 一括停止・再開
      </div>

      <div class="form-row">
        <label class="form-label">利用者 <span class="form-required">*</span></label>
        <select id="bulkCustomer" class="form-select" onchange="onBulkCustomerChange()">
          <option value="">選択してください</option>
        </select>
      </div>

      <div class="form-row">
        <label class="form-label">日時 <span class="form-required">*</span></label>
        <div style="display:flex;gap:0.5rem;">
          <input type="date" id="bulkDate" class="form-input" style="flex:1;">
          <input type="time" id="bulkTime" class="form-input" style="width:7.5rem;flex:none;">
        </div>
        <div style="font-size:0.73rem;color:var(--text-muted);margin-top:0.2rem;">
          停止: 指定時刻以前のサービスは記録する・以降は記録しない<br>
          再開: 指定時刻以前のサービスは翌日から・以降はその日から記録する
        </div>
      </div>

      <div class="form-row">
        <label class="form-label">操作 <span class="form-required">*</span></label>
        <div class="action-toggle">
          <button class="action-btn active pause" id="actionPauseBtn" onclick="setBulkAction('pause')">
            <i class="fa-solid fa-pause"></i> 停止
          </button>
          <button class="action-btn resume" id="actionResumeBtn" onclick="setBulkAction('resume')">
            <i class="fa-solid fa-play"></i> 再開
          </button>
        </div>
      </div>

      <!-- サービス選択（利用者選択後に表示） -->
      <div id="bulkServiceArea" class="hidden">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem;">
          <span style="font-size:0.82rem;font-weight:700;color:var(--text-muted);">
            対象サービス
          </span>
          <div style="display:flex;gap:0.4rem;">
            <button onclick="setAllBulkChecks(true)"  class="btn-set-date" style="font-size:0.72rem;padding:0.2rem 0.6rem;">全選択</button>
            <button onclick="setAllBulkChecks(false)" class="btn-set-date" style="font-size:0.72rem;padding:0.2rem 0.6rem;">全解除</button>
          </div>
        </div>
        <div id="bulkServiceList" class="bulk-service-list"></div>
      </div>

      <button class="create-btn" id="bulkApplyBtn" onclick="applyBulkOperation()">
        <i class="fa-solid fa-check"></i> 適用する
      </button>
      <div id="bulkResult" class="hidden"></div>
    </div>

    <!-- 設定一覧（現在の開始日・終了日の確認と個別編集） -->
    <div>
      <div style="font-size:0.88rem;font-weight:700;color:var(--text-muted);margin-bottom:0.5rem;padding-left:0.25rem;">
        <i class="fa-solid fa-list"></i> 設定一覧
      </div>
      <div id="pauseList">
        <div class="status-msg">
          <i class="fa-solid fa-spinner fa-spin"></i>
          読み込み中...
        </div>
      </div>
    </div>
  </div>

  <!-- ===== 編集モーダル ===== -->
  <div id="editModal" class="modal-overlay hidden" onclick="closeEditModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-title">
        <span><i class="fa-solid fa-pen"></i> 記録を編集</span>
        <button class="modal-close" onclick="closeEditModal()">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>

      <input type="hidden" id="editRecordId">

      <div class="form-row">
        <label class="form-label">実施日</label>
        <input type="date" id="editDate" class="form-input">
      </div>
      <div class="form-row">
        <label class="form-label">氏名</label>
        <input type="text" id="editName" class="form-input" readonly
          style="background:#f0e0d0;color:var(--text-muted);">
        <div style="font-size:0.73rem;color:var(--text-muted);margin-top:0.2rem;">
          ※ 氏名の変更はLarkで直接行ってください
        </div>
      </div>
      <div class="form-row">
        <label class="form-label">勤務区分</label>
        <select id="editKinmu" class="form-select">
        </select>
      </div>
      <div class="form-row">
        <label class="form-label">スタッフ</label>
        <select id="editStaff" class="form-select"></select>
      </div>
      <div class="form-row">
        <label class="form-label">作業項目</label>
        <input type="text" id="editSagyou" class="form-input">
      </div>
      <div class="form-row">
        <label class="form-label">サービス略称</label>
        <input type="text" id="editServiceName" class="form-input">
      </div>
      <div class="form-row">
        <label class="form-label">記録内容</label>
        <textarea id="editContent" class="form-input" rows="3"
          style="resize:vertical;"></textarea>
      </div>

      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeEditModal()">キャンセル</button>
        <button class="btn-save" id="editSaveBtn" onclick="submitEdit()">
          <i class="fa-solid fa-floppy-disk"></i> 保存する
        </button>
      </div>
    </div>
  </div>

  <script>
    // ============================================================
    // 設定・定数
    // ============================================================

    // APIベースURL（ローカル開発時とRenderデプロイ時で切り替える）
    const isLocal  = location.hostname === 'localhost' || location.hostname === '127.0.0.1' || location.protocol === 'file:';
    const API_BASE = isLocal ? 'http://localhost:3000' : 'https://attendance-app-irf1.onrender.com';

    // URLパラメータから管理者モードを判定する
    const isAdmin = new URLSearchParams(location.search).get('mode') === 'admin';

    // 事業所ごとの勤務区分選択肢（label: 画面表示、value: Larkに保存する値）
    const KINMU_OPTIONS = {
      '大浦家': [
        { label: '日勤', value: '日勤' },
        { label: '夜勤', value: '夜勤担当①' },
      ],
      '上津役家': [
        { label: '日勤',    value: '日勤' },
        { label: '夜勤1人目', value: '夜勤担当①' },
        { label: '夜勤2人目', value: '夜勤担当②' },
      ],
    };

    /**
     * 事業所に合わせて勤務区分セレクトの選択肢を更新する。
     * フィルター・記録作成・編集モーダルの3箇所を同時に更新する。
     */
    function updateKinmuSelects(office) {
      const opts = KINMU_OPTIONS[office] || [
        { label: '日勤',    value: '日勤' },
        { label: '夜勤担当①', value: '夜勤担当①' },
        { label: '夜勤担当②', value: '夜勤担当②' },
      ];
      // フィルター用（先頭に「全区分」を追加する）
      const filterSel = document.getElementById('filterKinmu');
      filterSel.innerHTML = '<option value="">全区分</option>';
      opts.forEach(o => {
        const opt = document.createElement('option');
        opt.value = o.value; opt.textContent = o.label;
        filterSel.appendChild(opt);
      });
      // 記録作成用
      const createSel = document.getElementById('createKinmu');
      createSel.innerHTML = '<option value="">選択してください</option>';
      opts.forEach(o => {
        const opt = document.createElement('option');
        opt.value = o.value; opt.textContent = o.label;
        createSel.appendChild(opt);
      });
      // 編集モーダル用
      const editSel = document.getElementById('editKinmu');
      if (editSel) {
        const cur = editSel.value; // 現在値を保持して再設定する
        editSel.innerHTML = '';
        opts.forEach(o => {
          const opt = document.createElement('option');
          opt.value = o.value; opt.textContent = o.label;
          editSel.appendChild(opt);
        });
        if (cur && opts.some(o => o.value === cur)) editSel.value = cur;
      }
    }

    // 勤務区分に対応するバッジスタイルを返す
    function kinmuBadge(kinmu) {
      if (!kinmu) return `<span class="record-badge badge-other">-</span>`;
      if (kinmu === '日勤')       return `<span class="record-badge badge-nikkin">日勤</span>`;
      if (kinmu === '夜勤担当①') return `<span class="record-badge badge-yakinha">夜勤①</span>`;
      if (kinmu === '夜勤担当②') return `<span class="record-badge badge-yakinhb">夜勤②</span>`;
      return `<span class="record-badge badge-other">${escHtml(kinmu)}</span>`;
    }

    // タイムスタンプ(ms)を "YYYY/MM/DD (曜)" 形式に変換する
    function fmtDate(ms) {
      if (!ms) return '-';
      const d = new Date(ms);
      // JSTで表示するため +9h をオフセットする
      const jst = new Date(ms + 9 * 60 * 60 * 1000);
      const days = ['日','月','火','水','木','金','土'];
      return `${jst.getUTCFullYear()}/${String(jst.getUTCMonth()+1).padStart(2,'0')}/${String(jst.getUTCDate()).padStart(2,'0')} (${days[jst.getUTCDay()]})`;
    }

    // ms → "YYYY-MM-DD" 形式（input[type=date]のvalue用）
    function msToInputDate(ms) {
      if (!ms) return '';
      const jst = new Date(ms + 9 * 60 * 60 * 1000);
      return `${jst.getUTCFullYear()}-${String(jst.getUTCMonth()+1).padStart(2,'0')}-${String(jst.getUTCDate()).padStart(2,'0')}`;
    }

    // HTMLエスケープ
    function escHtml(str) {
      return String(str || '')
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    // ============================================================
    // 状態管理
    // ============================================================

    let activeOffice      = '';   // 選択中の事業所
    let officeList        = [];   // 事業所リスト
    let staffList         = [];   // スタッフリスト
    let customerList      = [];   // 利用者リスト
    let currentRecords    = [];   // 現在表示中の記録一覧
    let pauseRecords      = [];   // 一時停止管理用の顧客別作業設定
    let currentTab        = 'list'; // 現在のタブ
    let selectedRecordId  = null; // 下部アクションバーで操作対象の記録ID

    // ============================================================
    // 初期化
    // ============================================================

    // 今月をデフォルト値としてセットする
    (function initDefaultMonth() {
      const now = new Date();
      const y = now.getFullYear();
      const m = String(now.getMonth() + 1).padStart(2, '0');
      document.getElementById('filterMonth').value = `${y}-${m}`;
      // 記録作成の実施日は今日をデフォルトにする
      const today = `${y}-${m}-${String(now.getDate()).padStart(2,'0')}`;
      document.getElementById('createDate').value = today;
    })();

    // 事業所リストは固定順で即座にタブを描画する（APIを待たない）
    const OFFICE_ORDER = ['大浦家', '上津役家'];

    function initOfficeTabs() {
      officeList = [...OFFICE_ORDER];
      renderOfficeTabs();

      // 記録作成フォームの事業所セレクトにも即座に追加する
      const createOffice = document.getElementById('createOffice');
      officeList.forEach(o => {
        const opt = document.createElement('option');
        opt.value = opt.textContent = o;
        createOffice.appendChild(opt);
      });
    }

    // スタッフ・利用者リストをAPIから非同期で取得してセレクトに追加する
    // 事業所タブ描画後にバックグラウンドで実行するため、表示速度に影響しない
    async function loadMeta() {
      try {
        const res  = await fetch(`${API_BASE}/api/helper/meta`);
        const data = await res.json();
        if (!data.ok) throw new Error(data.error);

        staffList    = data.staffList    || [];
        customerList = data.customerList || [];

        // 利用者フィルターに選択肢を追加する
        const filterName = document.getElementById('filterName');
        customerList.forEach(n => {
          const opt = document.createElement('option');
          opt.value = opt.textContent = n;
          filterName.appendChild(opt);
        });

        // スタッフセレクトに選択肢を追加する（記録作成・編集モーダル両方）
        [document.getElementById('createStaff'), document.getElementById('editStaff')].forEach(sel => {
          sel.innerHTML = '<option value="">選択してください</option>';
          staffList.forEach(s => {
            const opt = document.createElement('option');
            opt.value = opt.textContent = s;
            sel.appendChild(opt);
          });
        });
      } catch (err) {
        console.error('[loadMeta] スタッフ・利用者リスト取得失敗:', err);
      }
    }

    // ============================================================
    // 事業所タブ
    // ============================================================

    function renderOfficeTabs() {
      const container = document.getElementById('officeTabs');
      container.innerHTML = '';
      officeList.forEach((office, i) => {
        const btn = document.createElement('button');
        btn.className = 'office-tab' + (i === 0 ? ' active' : '');
        btn.textContent = office;
        btn.addEventListener('click', () => selectOffice(office, btn));
        container.appendChild(btn);
      });
      // 先頭事業所を選択状態にする
      if (officeList.length > 0) selectOffice(officeList[0]);
    }

    function selectOffice(office, clickedBtn) {
      activeOffice = office;
      // 事業所タブのactiveを更新する
      document.querySelectorAll('.office-tab').forEach(b => {
        b.classList.toggle('active', b.textContent === office);
      });
      // 事業所に応じた勤務区分選択肢へ更新する
      updateKinmuSelects(office);

      // 記録作成フォームの事業所セレクトも同期する
      const createOfficeEl = document.getElementById('createOffice');
      if (createOfficeEl) createOfficeEl.value = office;

      // 一時停止タブが表示中なら再読み込みする
      if (currentTab === 'pause') loadPauseSettings();

      // 事業所切り替え時に選択をリセットして記録履歴を自動で再取得する（初回表示も含む）
      clearSelection();
      loadRecords();
    }

    // ============================================================
    // タブ切り替え
    // ============================================================

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const tab = btn.dataset.tab;
        currentTab = tab;
        // タブボタンのactiveを更新する
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b === btn));
        // コンテンツの表示切り替え
        ['list', 'create', 'pause'].forEach(t => {
          document.getElementById(`tab-${t}`).classList.toggle('hidden', t !== tab);
        });
        // 一時停止タブを開いたときにデータを読み込む
        if (tab === 'pause') loadPauseSettings();
      });
    });

    // ============================================================
    // タブ①：記録一覧
    // ============================================================

    document.getElementById('searchBtn').addEventListener('click', loadRecords);

    async function loadRecords() {
      const [year, month] = (document.getElementById('filterMonth').value || '').split('-');
      const name  = document.getElementById('filterName').value;
      const kinmu = document.getElementById('filterKinmu').value;

      const list = document.getElementById('recordsList');
      list.innerHTML = `<div class="status-msg"><i class="fa-solid fa-spinner fa-spin"></i>読み込み中...</div>`;
      document.getElementById('recordCount').textContent = '';

      try {
        const params = new URLSearchParams({ office: activeOffice });
        if (year)  params.set('year',  year);
        if (month) params.set('month', month);
        if (name)  params.set('name',  name);
        if (kinmu) params.set('kinmu', kinmu);

        const res  = await fetch(`${API_BASE}/api/helper/records?${params}`);
        const data = await res.json();
        if (!data.ok) throw new Error(data.error);

        currentRecords = data.records || [];
        document.getElementById('recordCount').textContent = `${currentRecords.length} 件`;
        renderRecords(currentRecords);
      } catch (err) {
        list.innerHTML = `<div class="status-msg"><i class="fa-solid fa-triangle-exclamation"></i>${escHtml(err.message)}</div>`;
      }
    }

    // "H:MM" 形式の提供時間文字列を0時からの分数に変換する（時系列ソート用）
    function teikyoToMins(str) {
      if (!str) return 9999; // 時間未設定は最後に回す
      const [h, m] = str.split(':').map(Number);
      return (h || 0) * 60 + (m || 0);
    }

    // タイムスタンプを "M/D(曜)" の短縮形式に変換する（一覧行用）
    function fmtDateShort(ms) {
      if (!ms) return '-';
      const jst  = new Date(ms + 9 * 60 * 60 * 1000);
      const days = ['日','月','火','水','木','金','土'];
      return `${jst.getUTCMonth()+1}/${jst.getUTCDate()}(${days[jst.getUTCDay()]})`;
    }

    function renderRecords(records) {
      const list = document.getElementById('recordsList');
      if (records.length === 0) {
        list.innerHTML = `<div class="status-msg"><i class="fa-solid fa-folder-open"></i>記録がありません</div>`;
        return;
      }

      // 実施日の降順でソートしてから、日付→氏名の2段階でグループ化する
      const sorted = [...records].sort((a, b) => b.実施日 - a.実施日);
      const dateGroups = new Map(); // Map<dateStr, Map<name, record[]>>
      for (const r of sorted) {
        const dateKey = fmtDateShort(r.実施日);
        const nameKey = r.氏名 || '氏名未設定';
        if (!dateGroups.has(dateKey)) dateGroups.set(dateKey, new Map());
        const nameMap = dateGroups.get(dateKey);
        if (!nameMap.has(nameKey)) nameMap.set(nameKey, []);
        nameMap.get(nameKey).push(r);
      }

      let html = '';
      for (const [date, nameMap] of dateGroups) {
        // 日付ヘッダー帯
        html += `<div class="date-group-header">${date}</div>`;
        for (const [name, recs] of nameMap) {
          // 氏名サブヘッダー帯（同日・同氏名の記録をまとめる）
          html += `<div class="name-group-header">${escHtml(name)}</div>`;
          // 提供時間の昇順（時系列）で並べる
          recs.sort((a, b) => teikyoToMins(a.提供時間) - teikyoToMins(b.提供時間));
          for (const r of recs) {
            // 1行目：時間・作業項目・スタッフ名（氏名・記録内容は非表示）
            const timeHtml   = r.提供時間 ? `<span class="record-item-time">${escHtml(r.提供時間)}</span>` : '';
            const sagyouHtml = r.作業項目 ? `<span class="record-item-sagyou">${escHtml(r.作業項目)}</span>` : '';
            const staffHtml  = r.スタッフ  ? `<span class="record-item-staff">${escHtml(r.スタッフ)}</span>`  : '';
            html += `
              <div class="record-item" onclick="selectRecord(this, '${r.recordId}')">
                <div class="record-item-main">
                  <div class="record-item-info">
                    <div class="record-item-line1">${timeHtml}${sagyouHtml}${staffHtml}</div>
                  </div>
                </div>
              </div>`;
          }
        }
      }
      list.innerHTML = html;
    }

    // ============================================================
    // 記録削除
    // ============================================================

    async function deleteRecord(recordId, name) {
      if (!confirm(`「${name}」の記録を削除しますか？\nこの操作は元に戻せません。`)) return;
      try {
        const res  = await fetch(`${API_BASE}/api/helper/records/${recordId}`, { method: 'DELETE' });
        const data = await res.json();
        if (!data.ok) throw new Error(data.error);
        // 画面上から削除して再描画する
        currentRecords = currentRecords.filter(r => r.recordId !== recordId);
        document.getElementById('recordCount').textContent = `${currentRecords.length} 件`;
        renderRecords(currentRecords);
        // 削除後に選択状態とアクションバーをリセットする
        clearSelection();
      } catch (err) {
        alert('削除に失敗しました: ' + err.message);
      }
    }

    // ============================================================
    // 記録選択とアクションバー操作
    // ============================================================

    // 選択状態を解除してアクションバーを隠す
    function clearSelection() {
      selectedRecordId = null;
      document.querySelectorAll('.record-item.selected').forEach(e => e.classList.remove('selected'));
      document.getElementById('recordActionBar').classList.add('hidden');
    }

    // 記録行タップ：同じ行なら選択解除、別の行なら選択切り替え
    function selectRecord(el, recordId) {
      if (selectedRecordId === recordId) {
        clearSelection();
        return;
      }
      document.querySelectorAll('.record-item.selected').forEach(e => e.classList.remove('selected'));
      selectedRecordId = recordId;
      el.classList.add('selected');
      document.getElementById('recordActionBar').classList.remove('hidden');
    }

    // 選択中の記録オブジェクトを返す
    function getSelectedRecord() {
      return currentRecords.find(r => r.recordId === selectedRecordId) || null;
    }

    // 異常ボタン：編集モーダルを開いて記録内容・種別を修正できるようにする
    function onIjo() {
      const r = getSelectedRecord();
      if (!r) return;
      openEditModal(r.recordId);
    }

    // 中止ボタン：確認後に記録タイプを「中止」に更新する
    async function onChushi() {
      const r = getSelectedRecord();
      if (!r) return;
      if (!confirm(`「${r.氏名}」の記録を中止にしますか？`)) return;
      try {
        const res  = await fetch(`${API_BASE}/api/helper/records/${r.recordId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 記録タイプ: '中止' }),
        });
        const data = await res.json();
        if (!data.ok) throw new Error(data.error);
        // ローカルの記録タイプも更新する
        const local = currentRecords.find(rec => rec.recordId === r.recordId);
        if (local) local.記録タイプ = '中止';
        clearSelection();
      } catch (err) {
        alert('中止の設定に失敗しました: ' + err.message);
      }
    }

    // 削除ボタン（アクションバー用）：選択中の記録を削除する
    function onFabDelete() {
      const r = getSelectedRecord();
      if (!r) return;
      deleteRecord(r.recordId, r.氏名);
    }

    // ============================================================
    // 記録編集モーダル
    // ============================================================

    function openEditModal(recordId) {
      const r = currentRecords.find(rec => rec.recordId === recordId);
      if (!r) return;

      document.getElementById('editRecordId').value    = recordId;
      document.getElementById('editDate').value        = msToInputDate(r.実施日);
      document.getElementById('editName').value        = r.氏名 || '';
      document.getElementById('editKinmu').value       = r.勤務区分 || '日勤';
      document.getElementById('editStaff').value       = r.スタッフ || '';
      document.getElementById('editSagyou').value      = r.作業項目 || '';
      document.getElementById('editServiceName').value = r.サービス略称 || '';
      document.getElementById('editContent').value     = r.記録内容 || '';

      document.getElementById('editModal').classList.remove('hidden');
    }

    function closeEditModal(e) {
      if (e && e.target !== document.getElementById('editModal')) return;
      document.getElementById('editModal').classList.add('hidden');
    }

    async function submitEdit() {
      const recordId = document.getElementById('editRecordId').value;
      const btn = document.getElementById('editSaveBtn');
      btn.disabled = true;
      btn.textContent = '保存中...';

      try {
        const body = {
          実施日:       document.getElementById('editDate').value,
          勤務区分:     document.getElementById('editKinmu').value,
          スタッフ:     document.getElementById('editStaff').value,
          作業項目:     document.getElementById('editSagyou').value,
          サービス略称: document.getElementById('editServiceName').value,
          記録内容:     document.getElementById('editContent').value,
        };

        const res  = await fetch(`${API_BASE}/api/helper/records/${recordId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (!data.ok) throw new Error(data.error);

        // ローカルの currentRecords も更新して再描画する
        const idx = currentRecords.findIndex(r => r.recordId === recordId);
        if (idx !== -1) {
          currentRecords[idx] = {
            ...currentRecords[idx],
            実施日:       body.実施日 ? new Date(body.実施日).getTime() + 9*60*60*1000 : currentRecords[idx].実施日,
            勤務区分:     body.勤務区分,
            スタッフ:     body.スタッフ,
            作業項目:     body.作業項目,
            サービス略称: body.サービス略称,
            記録内容:     body.記録内容,
          };
          renderRecords(currentRecords);
        }
        document.getElementById('editModal').classList.add('hidden');
      } catch (err) {
        alert('保存に失敗しました: ' + err.message);
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> 保存する';
      }
    }

    // ============================================================
    // タブ②：記録作成
    // ============================================================

    async function submitCreate() {
      const 実施日   = document.getElementById('createDate').value;
      const 事業所   = document.getElementById('createOffice').value;
      const 勤務区分 = document.getElementById('createKinmu').value;
      const スタッフ = document.getElementById('createStaff').value;

      if (!実施日 || !事業所 || !勤務区分 || !スタッフ) {
        alert('すべての項目を入力してください。');
        return;
      }

      const btn    = document.getElementById('createBtn');
      const result = document.getElementById('createResult');
      btn.disabled = true;
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 作成中...';
      result.classList.add('hidden');

      try {
        const res  = await fetch(`${API_BASE}/api/helper/records/batch-create`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 実施日, 事業所, 勤務区分, スタッフ }),
        });
        const data = await res.json();
        if (!data.ok) throw new Error(data.error);

        result.className = 'create-result ok';
        if (data.created === 0) {
          result.textContent = data.message || '該当するサービス設定が見つかりませんでした。';
        } else {
          result.textContent = `✓ ${data.created} 件の記録を作成しました（全 ${data.total} 件中）`;
          if (data.errors && data.errors.length > 0) {
            result.textContent += `\n⚠ ${data.errors.length} 件エラー`;
          }
        }
        result.classList.remove('hidden');
      } catch (err) {
        result.className = 'create-result err';
        result.textContent = '作成に失敗しました: ' + err.message;
        result.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-pen-to-square"></i> 記録を一括作成する';
      }
    }

    // ============================================================
    // ============================================================
    // タブ③：一時停止管理
    // ============================================================

    let bulkAction = 'pause'; // 現在の操作（'pause' or 'resume'）

    // 設定一覧を取得して描画する（一括操作後・タブ切り替え時に呼ぶ）
    async function loadPauseSettings() {
      const container = document.getElementById('pauseList');
      container.innerHTML = `<div class="status-msg"><i class="fa-solid fa-spinner fa-spin"></i>読み込み中...</div>`;

      try {
        const params = new URLSearchParams({ office: activeOffice });
        const res    = await fetch(`${API_BASE}/api/helper/pause-settings?${params}`);
        const data   = await res.json();
        if (!data.ok) throw new Error(data.error);

        pauseRecords = data.records || [];

        // 一括操作の利用者ドロップダウンを更新する
        const nameSet = new Set(pauseRecords.map(r => r.氏名).filter(Boolean));
        const bulkSel = document.getElementById('bulkCustomer');
        const curVal  = bulkSel.value;
        bulkSel.innerHTML = '<option value="">選択してください</option>';
        [...nameSet].sort((a, b) => a.localeCompare(b, 'ja')).forEach(n => {
          const opt = document.createElement('option');
          opt.value = opt.textContent = n;
          bulkSel.appendChild(opt);
        });
        if (curVal) bulkSel.value = curVal;

        renderPauseList(pauseRecords);
      } catch (err) {
        container.innerHTML = `<div class="status-msg"><i class="fa-solid fa-triangle-exclamation"></i>${escHtml(err.message)}</div>`;
      }
    }

    // 設定一覧を利用者別グループで描画する
    function renderPauseList(records) {
      const container = document.getElementById('pauseList');
      if (records.length === 0) {
        container.innerHTML = `<div class="status-msg"><i class="fa-solid fa-folder-open"></i>設定データがありません</div>`;
        return;
      }

      // 氏名でグループ化する
      const groups = {};
      records.forEach(r => {
        if (!groups[r.氏名]) groups[r.氏名] = [];
        groups[r.氏名].push(r);
      });

      container.innerHTML = '';
      Object.entries(groups).forEach(([name, items]) => {
        const group = document.createElement('div');
        group.className = 'pause-customer-group';

        const header = document.createElement('div');
        header.className = 'pause-customer-header';
        header.innerHTML = `
          <i class="fa-solid fa-user"></i>
          <span>${escHtml(name)}</span>
          <span style="margin-left:auto;font-size:0.78rem;color:var(--text-muted);">${items.length} サービス</span>
          <i class="fa-solid fa-chevron-down chevron"></i>
        `;

        const serviceList = document.createElement('div');
        serviceList.className = 'pause-service-list';

        header.addEventListener('click', () => {
          header.classList.toggle('collapsed');
          serviceList.classList.toggle('hidden');
        });

        items.forEach(item => {
          const now = Date.now();
          const isPaused  = item.終了日 && item.終了日 < now;
          const isWaiting = item.終了日 && item.終了日 >= now;
          let statusLabel, statusClass;
          if (isPaused)       { statusLabel = '停止中';   statusClass = 'status-paused'; }
          else if (isWaiting) { statusLabel = '停止予定'; statusClass = 'status-waiting'; }
          else                { statusLabel = '稼働中';   statusClass = 'status-active'; }

          const kinmuShort = (item.勤務区分 || '').replace('夜勤担当①','夜勤①').replace('夜勤担当②','夜勤②');
          const yobi = item.提供曜日 ? `${item.提供曜日}曜日` : '';
          const jikan = item.提供時間 ? ` ${item.提供時間}` : '';

          const itemEl = document.createElement('div');
          itemEl.className = 'pause-service-item';
          itemEl.innerHTML = `
            <div class="pause-service-title">
              <div class="pause-service-name">
                ${escHtml(item.作業項目 || item.サービス略称 || '?')}
                <span style="font-size:0.75rem;color:var(--text-muted);">
                  ${escHtml(kinmuShort)}${yobi ? ` / ${escHtml(yobi)}` : ''}${escHtml(jikan)}
                </span>
              </div>
              <span class="pause-status ${statusClass}">${statusLabel}</span>
            </div>
            <div class="pause-date-info">
              開始日: ${item.開始日 ? fmtDate(item.開始日) : '未設定'}
              &nbsp;/&nbsp;
              終了日: ${item.終了日 ? fmtDate(item.終了日) : '未設定'}
            </div>
          `;
          serviceList.appendChild(itemEl);
        });

        group.appendChild(header);
        group.appendChild(serviceList);
        container.appendChild(group);
      });
    }

    // ── 一括操作パネル ──

    // 停止/再開トグルを切り替える
    function setBulkAction(action) {
      bulkAction = action;
      document.getElementById('actionPauseBtn') .classList.toggle('active', action === 'pause');
      document.getElementById('actionResumeBtn').classList.toggle('active', action === 'resume');
    }

    // 利用者を選択したときに対象サービスのチェックリストを表示する
    function onBulkCustomerChange() {
      const name = document.getElementById('bulkCustomer').value;
      const area = document.getElementById('bulkServiceArea');
      const list = document.getElementById('bulkServiceList');

      if (!name) { area.classList.add('hidden'); return; }

      // 選択した利用者のサービスをチェックボックスで表示する
      const svcs = pauseRecords.filter(r => r.氏名 === name);
      list.innerHTML = '';
      svcs.forEach(svc => {
        const kinmuShort = (svc.勤務区分 || '').replace('夜勤担当①','夜勤①').replace('夜勤担当②','夜勤②');
        const yobi  = svc.提供曜日 ? `${svc.提供曜日}曜日` : '';
        const jikan = svc.提供時間 ? ` ${svc.提供時間}` : '';
        const now   = Date.now();
        const isPaused  = svc.終了日 && svc.終了日 < now;
        const isWaiting = svc.終了日 && svc.終了日 >= now;
        let stLabel = '稼働中', stClass = 'status-active';
        if (isPaused)       { stLabel = '停止中';   stClass = 'status-paused'; }
        else if (isWaiting) { stLabel = '停止予定'; stClass = 'status-waiting'; }

        const item = document.createElement('label');
        item.className = 'bulk-svc-item';
        item.innerHTML = `
          <input type="checkbox" checked data-record-id="${svc.recordId}" data-teikyo-mins="${svc.teikyoMins ?? 0}">
          <div class="bulk-svc-info">
            <div class="bulk-svc-name">${escHtml(svc.作業項目 || svc.サービス略称 || '?')}</div>
            <div class="bulk-svc-meta">
              ${escHtml(kinmuShort)}${yobi ? ` / ${escHtml(yobi)}` : ''}${escHtml(jikan)}
              &nbsp;<span class="pause-status ${stClass}" style="font-size:0.7rem;">${stLabel}</span>
            </div>
          </div>
        `;
        list.appendChild(item);
      });

      area.classList.toggle('hidden', svcs.length === 0);
    }

    // 全チェックボックスを選択/解除する
    function setAllBulkChecks(checked) {
      document.querySelectorAll('#bulkServiceList input[type=checkbox]')
        .forEach(cb => cb.checked = checked);
    }

    // 一括操作を実行してサーバーに送信する
    async function applyBulkOperation() {
      const date = document.getElementById('bulkDate').value;
      const time = document.getElementById('bulkTime').value;
      const name = document.getElementById('bulkCustomer').value;

      if (!name)  { alert('利用者を選択してください。'); return; }
      if (!date)  { alert('日付を入力してください。');   return; }
      if (!time)  { alert('時刻を入力してください。');   return; }

      // チェックされたサービスを収集する
      const checked = [...document.querySelectorAll('#bulkServiceList input[type=checkbox]:checked')];
      if (checked.length === 0) { alert('対象サービスを1つ以上選択してください。'); return; }

      const services = checked.map(cb => ({
        recordId:   cb.dataset.recordId,
        teikyoMins: Number(cb.dataset.teikyoMins),
      }));

      const btn    = document.getElementById('bulkApplyBtn');
      const result = document.getElementById('bulkResult');
      btn.disabled = true;
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 処理中...';
      result.classList.add('hidden');

      try {
        const res  = await fetch(`${API_BASE}/api/helper/pause-settings/bulk`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ action: bulkAction, date, time, services }),
        });
        const data = await res.json();
        if (!data.ok) throw new Error(data.error);

        result.className = 'bulk-result ok';
        const label = bulkAction === 'pause' ? '停止' : '再開';
        result.textContent = `✓ ${data.succeeded} 件のサービスを${label}しました`;
        if (data.errors?.length) result.textContent += `（${data.errors.length} 件エラー）`;
        result.classList.remove('hidden');

        // 設定一覧を再取得して最新状態を反映する
        await loadPauseSettings();
        // チェックリストも更新する
        onBulkCustomerChange();
      } catch (err) {
        result.className = 'bulk-result err';
        result.textContent = '失敗しました: ' + err.message;
        result.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-check"></i> 適用する';
      }
    }

    // ============================================================
    // 起動
    // ============================================================

    // 管理者モード（?mode=admin）のときのみ一時停止管理タブを表示する
    if (isAdmin) {
      document.getElementById('pauseTabBtn').classList.remove('hidden');
    }

    // 事業所タブを即座に描画する（APIを待たないため画面表示が速い）
    initOfficeTabs();
    // スタッフ・利用者リストはバックグラウンドで非同期取得する
    loadMeta();
  </script>

  <!-- 記録選択時に表示される下部アクションバー（異常・中止・削除） -->
  <div id="recordActionBar" class="record-action-bar hidden">
    <button class="rab-btn rab-ijo"    onclick="onIjo()">
      <i class="fa-solid fa-triangle-exclamation"></i> 異常
    </button>
    <button class="rab-btn rab-chushi" onclick="onChushi()">
      <i class="fa-solid fa-ban"></i> 中止
    </button>
    <button class="rab-btn rab-delete" onclick="onFabDelete()">
      <i class="fa-solid fa-trash"></i> 削除
    </button>
  </div>
</body>
</html>
