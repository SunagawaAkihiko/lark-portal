<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>利用者情報</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      --bg-color:      #fdf6ec;
      --text-color:    #4a3f35;
      --text-muted:    #8c7c6b;
      --primary-color: #e76f51;
      --primary-light: #fcece8;
      --border-color:  #dcbfa6;
      --card-bg:       #fff0e3;
      --green:         #2a9d8f;
      --green-light:   #e6f7f5;
      --blue:          #457b9d;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Zen Kaku Gothic New', sans-serif;
      background: var(--bg-color);
      color: var(--text-color);
      -webkit-font-smoothing: antialiased;
      padding-bottom: 4rem;
    }
    .hidden { display: none !important; }

    /* ===== 固定ヘッダーラッパー（各種データと同一） ===== */
    .sticky-header {
      position: sticky; top: 0; z-index: 21;
      box-shadow: 0 2px 6px rgba(139,115,95,0.12);
    }

    /* ===== 1段目：事業所タブ ===== */
    .office-tabs {
      display: flex; flex-wrap: wrap;
      background: var(--text-color);
      padding: 0 1rem 0.75rem; gap: 0.5rem;
    }
    .office-tabs-label {
      width: 100%; color: white;
      font-size: 1.05rem; font-weight: 700;
      padding: 0.75rem 0 0.1rem;
      display: flex; align-items: center; gap: 0.4rem;
    }
    .office-tab {
      flex: 1; padding: 0.55rem 0; border: none; border-radius: 8px;
      font-family: inherit; font-size: 0.95rem; font-weight: 700; cursor: pointer;
      background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.6);
      transition: background 0.2s, color 0.2s;
    }
    .office-tab.active { background: var(--primary-color); color: white; }

    /* ===== 2段目：詳細タブ（各種データのtab-barと同一スタイル） ===== */
    .tab-bar {
      display: flex; flex-wrap: wrap;
      background: #ede0d4;
      padding: 0.45rem 0.7rem; gap: 0.4rem;
      border-bottom: 2px solid #c9a98a;
    }
    .tab-btn {
      white-space: nowrap;
      padding: 0.35rem 0.75rem; border-radius: 6px;
      border: 1.5px solid #9a7a6b;
      background: #f5ebe0; color: #6b4f3a;
      font-family: inherit; font-size: 0.82rem; font-weight: 700;
      cursor: pointer; transition: all 0.18s;
    }
    .tab-btn.active { background: #6b4f3a; color: white; border-color: #6b4f3a; }

    /* ===== 3段目：氏名セレクト ===== */
    .name-bar {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.6rem 1rem;
      background: var(--bg-color);
      border-bottom: 1px solid var(--border-color);
    }
    .name-bar select {
      flex: 1; padding: 0.6rem 0.5rem;
      border: 1.5px solid var(--border-color); border-radius: 8px;
      background: var(--card-bg); font-family: inherit;
      font-size: 0.95rem; color: var(--text-color);
      -webkit-appearance: none; appearance: none;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="5"><path fill="%23888" d="M0 0l5 5 5-5z"/></svg>');
      background-repeat: no-repeat; background-position: right 0.6rem center;
      background-size: 10px 5px; background-color: var(--card-bg);
    }

    /* ===== ローディング ===== */
    .loading-screen {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 4rem 1rem; gap: 1rem; color: var(--text-muted);
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border-color);
      border-top-color: var(--primary-color);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== コンテンツ ===== */
    .tab-content {
      padding: 1rem; max-width: 600px; margin: 0 auto;
      display: flex; flex-direction: column; gap: 1rem;
    }

    /* セクションカード */
    .section-card {
      background: white; border: 1px solid var(--border-color); border-radius: 14px; overflow: hidden;
    }
    .section-head {
      background: var(--primary-light); padding: 0.6rem 1rem;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .section-head-title { font-size: 0.82rem; font-weight: 700; color: var(--primary-color); }
    .section-body { padding: 0.75rem 1rem; display: flex; flex-direction: column; gap: 0.5rem; }

    /* フィールド行 */
    .info-row {
      display: flex; gap: 0.5rem;
      padding: 0.45rem 0; border-bottom: 1px solid var(--bg-color);
    }
    .info-row:last-child { border-bottom: none; }
    .info-label {
      font-size: 0.75rem; color: var(--text-muted); font-weight: 700;
      width: 7rem; flex-shrink: 0; padding-top: 0.1rem;
    }
    .info-value { font-size: 0.9rem; flex: 1; word-break: break-all; }

    /* バッジ */
    .badge {
      display: inline-block; padding: 0.18rem 0.55rem; border-radius: 5px;
      font-size: 0.68rem; font-weight: 700;
    }
    .badge-care  { background: var(--primary-light); color: var(--primary-color); }
    .badge-on    { background: var(--green-light);   color: var(--green); }
    .badge-off   { background: #f0e0e0; color: #9b2226; }

    /* 既往歴リスト */
    .history-list { list-style: none; display: flex; flex-direction: column; gap: 0.4rem; }
    .history-item {
      padding: 0.55rem 0.75rem; background: var(--bg-color); border-radius: 8px;
      font-size: 0.9rem; display: flex; align-items: center; gap: 0.5rem;
    }
    .history-num {
      font-size: 0.7rem; font-weight: 700; color: white;
      background: var(--primary-color); border-radius: 4px;
      padding: 0.1rem 0.4rem; flex-shrink: 0;
    }

    /* 関係先 */
    .relation-card {
      background: var(--bg-color); border-radius: 10px; padding: 0.75rem;
      display: flex; flex-direction: column; gap: 0.3rem;
    }
    .relation-name { font-size: 0.95rem; font-weight: 700; }
    .relation-meta { font-size: 0.78rem; color: var(--text-muted); }
    .relation-tel {
      display: flex; align-items: center; gap: 0.4rem;
      font-size: 1.05rem; color: var(--blue); font-weight: 700;
      text-decoration: none;
    }
    .relation-fax {
      display: flex; align-items: center; gap: 0.4rem;
      font-size: 0.82rem; color: var(--text-muted);
    }

    /* 薬手帳：追加ボタン */
    .medicine-add-btn {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.55rem 1rem; border-radius: 8px; border: none;
      background: var(--primary-color); color: white;
      font-family: inherit; font-size: 0.88rem; font-weight: 700;
      cursor: pointer; margin-bottom: 0.5rem; width: 100%;
      justify-content: center;
    }
    .medicine-add-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* 薬手帳：画像グリッド */
    .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.4rem; }
    .photo-thumb {
      aspect-ratio: 1; border-radius: 8px; overflow: hidden;
      background: var(--card-bg); cursor: pointer;
      position: relative;
    }
    .photo-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    /* 削除ボタン（サムネイル右上） */
    .photo-delete-btn {
      position: absolute; top: 3px; right: 3px;
      width: 22px; height: 22px; border-radius: 50%; border: none;
      background: rgba(0,0,0,0.55); color: white;
      font-size: 0.7rem; cursor: pointer; z-index: 2;
      display: flex; align-items: center; justify-content: center;
    }

    /* 画像ライトボックス */
    .lightbox {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.92);
      display: flex; align-items: center; justify-content: center;
    }
    .lightbox img {
      max-width: 100%; max-height: 100vh; object-fit: contain;
      /* 長押し保存・ドラッグを無効化する */
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      pointer-events: none;
    }
    .lightbox-close {
      position: absolute; top: 1rem; right: 1rem;
      background: rgba(255,255,255,0.15); border: none; border-radius: 50%;
      color: white; width: 40px; height: 40px; font-size: 1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    /* 資料ファイルリスト */
    .file-item {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.75rem; background: var(--bg-color); border-radius: 10px;
    }
    .file-icon {
      width: 40px; height: 40px; border-radius: 8px;
      background: #e63946; color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; font-weight: 700; flex-shrink: 0;
    }
    .file-info { flex: 1; min-width: 0; }
    .file-name {
      font-size: 0.88rem; font-weight: 700;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .file-size { font-size: 0.72rem; color: var(--text-muted); margin-top: 0.1rem; }
    .file-view-btn {
      width: 36px; height: 36px; border-radius: 8px; border: none; cursor: pointer;
      background: #e8f0f7; color: var(--blue); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 0.88rem;
      text-decoration: none;
    }

    /* 空データ表示 */
    .empty-msg {
      text-align: center; padding: 2.5rem 1rem;
      color: var(--text-muted); font-size: 0.88rem;
    }
    .empty-msg i { display: block; font-size: 1.8rem; margin-bottom: 0.4rem; color: var(--border-color); }

    /* ===== FABボタン（画面右下固定・カレンダーと同一スタイル） ===== */
    .info-fab {
      position: fixed; bottom: 2rem; right: 2rem;
      padding: 1rem 1.5rem; border-radius: 30px;
      background: var(--primary-color); color: white; border: none;
      font-family: inherit; font-size: 1.1rem; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; gap: 0.5rem;
      z-index: 30; box-shadow: 0 4px 10px rgba(231,111,81,0.4);
      transition: transform 0.2s;
    }
    .info-fab:active { transform: scale(0.95); }

    /* ===== インライン小ボタン（削除・編集のみ） ===== */
    .btn-act {
      padding: 0.28rem 0.65rem; border-radius: 5px; border: none; cursor: pointer;
      font-family: inherit; font-size: 0.72rem; font-weight: 700;
      display: inline-flex; align-items: center; gap: 0.3rem;
    }
    .btn-act-edit   { background: #e8f0f7; color: var(--blue); }
    .btn-act-delete { background: #fee2e2; color: #c1121f; }

    /* ===== 汎用モーダル（底部シート） ===== */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 60;
      background: rgba(0,0,0,0.45);
      display: flex; align-items: flex-end;
    }
    .modal-sheet {
      width: 100%; max-height: 88vh;
      background: white; border-radius: 20px 20px 0 0;
      display: flex; flex-direction: column;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
    }
    .modal-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1rem 1.2rem 0.85rem; border-bottom: 1px solid var(--border-color);
      font-weight: 700; font-size: 1rem; flex-shrink: 0;
    }
    .modal-close-btn {
      width: 32px; height: 32px; border-radius: 50%; border: none;
      background: var(--bg-color); color: var(--text-muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .modal-body { flex: 1; overflow-y: auto; padding: 1rem; }
    .modal-footer {
      display: flex; gap: 0.6rem; padding: 0.75rem 1rem;
      border-top: 1px solid var(--border-color); flex-shrink: 0;
    }
    .btn-modal-cancel {
      flex: 1; padding: 0.75rem; border: 1.5px solid var(--border-color);
      border-radius: 10px; background: white; font-family: inherit;
      font-size: 0.9rem; cursor: pointer; color: var(--text-color);
    }
    .btn-modal-save {
      flex: 2; padding: 0.75rem; border: none;
      border-radius: 10px; background: var(--primary-color); color: white;
      font-family: inherit; font-size: 0.9rem; font-weight: 700; cursor: pointer;
    }
    .btn-modal-save:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ===== フォーム部品 ===== */
    .form-group { display: flex; flex-direction: column; gap: 0.3rem; margin-bottom: 0.75rem; }
    .form-label { font-size: 0.77rem; font-weight: 700; color: var(--text-muted); }
    .form-input {
      padding: 0.6rem 0.75rem; border: 1.5px solid var(--border-color);
      border-radius: 8px; font-family: inherit; font-size: 0.9rem;
      color: var(--text-color); background: var(--card-bg); width: 100%; box-sizing: border-box;
    }
    .form-section-title {
      font-size: 0.82rem; font-weight: 700; color: var(--primary-color);
      margin: 1rem 0 0.5rem; padding-bottom: 0.3rem;
      border-bottom: 1px solid var(--primary-light);
    }

    /* ===== ファイルアップロードボタン ===== */
    .file-add-btn {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.5rem 0.9rem; border-radius: 8px; border: 1.5px dashed var(--border-color);
      background: var(--bg-color); color: var(--text-muted);
      font-family: inherit; font-size: 0.82rem; font-weight: 700;
      cursor: pointer; width: 100%; justify-content: center; margin-bottom: 0.5rem;
    }

    /* ===== 横画面 ===== */
    @media (orientation: landscape) {
      .office-tabs { padding: 0 0.8rem 0.5rem; }
      .office-tabs-label { padding: 0.5rem 0 0.1rem; font-size: 1rem; }
      .office-tab { padding: 0.3rem 0; font-size: 0.82rem; }
      .tab-bar { padding: 0.35rem 0.7rem; }
      .name-bar { padding: 0.45rem 0.8rem; }
      .info-fab { padding: 0.65rem 1rem; font-size: 0.9rem; bottom: 0.8rem; right: 0.8rem; }
    }
  </style>
</head>
<body>

<!-- ===== スティッキーコンテナ（各種データと同一3段構成） ===== -->
<div class="sticky-header">
  <!-- 1段目：事業所タブ（ラベル＋タブボタンをJSで生成） -->
  <div class="office-tabs" id="officeTabs"></div>
  <!-- 2段目：詳細タブ -->
  <nav class="tab-bar hidden" id="detailTabsWrap">
    <button class="tab-btn active" data-tab="basic"    onclick="switchDetailTab('basic',this)">基本情報</button>
    <button class="tab-btn"        data-tab="history"  onclick="switchDetailTab('history',this)">既往歴</button>
    <button class="tab-btn"        data-tab="relation" onclick="switchDetailTab('relation',this)">関係先</button>
    <button class="tab-btn"        data-tab="medicine" onclick="switchDetailTab('medicine',this)">薬手帳</button>
    <button class="tab-btn"        data-tab="doc"      onclick="switchDetailTab('doc',this)">フェイスシート・退院時資料</button>
  </nav>
  <!-- 3段目：氏名セレクト -->
  <div class="name-bar hidden" id="nameBarWrap">
    <select id="nameSelect" onchange="onNameSelectChange()">
      <option value="">氏名を選択</option>
    </select>
  </div>
</div>

<!-- ===== ローディング（初期） ===== -->
<div class="loading-screen" id="initLoading">
  <div class="spinner"></div>
  <span>読み込み中...</span>
</div>

<!-- ===== 詳細ローディング（利用者切り替え時） ===== -->
<div class="loading-screen hidden" id="detailLoading">
  <div class="spinner"></div>
  <span>情報を取得中...</span>
</div>

<!-- ===== コンテンツパネル ===== -->
<div id="paneBasic"    class="tab-content hidden"></div>
<div id="paneHistory"  class="tab-content hidden"></div>
<div id="paneRelation" class="tab-content hidden"></div>
<div id="paneMedicine" class="tab-content hidden"></div>
<div id="paneDoc"      class="tab-content hidden"></div>

<!-- ===== FABボタン（管理者のみ・タブに応じて動作が変わる） ===== -->
<button class="info-fab hidden" id="infoFab" onclick="onInfoFabClick()">
  <i id="infoFabIcon" class="fa-solid fa-pen"></i>
  <span id="infoFabLabel">編集</span>
</button>

<!-- ===== 汎用モーダル（底部シート） ===== -->
<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal-sheet">
    <div class="modal-header">
      <span id="modalTitle"></span>
      <button class="modal-close-btn" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <button class="btn-modal-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-modal-save"   id="modalSaveBtn" onclick="execModalSubmit()">保存</button>
    </div>
  </div>
</div>

<!-- ===== 画像ライトボックス ===== -->
<div class="lightbox hidden" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()"><i class="fa-solid fa-xmark"></i></button>
  <!-- oncontextmenu で右クリックメニューを無効化する -->
  <img id="lightboxImg" src="" alt="" draggable="false" oncontextmenu="return false">
</div>

<script>
  // APIベースURL（ローカル開発と本番Renderで切り替える）
  const isLocal  = location.hostname === 'localhost' || location.hostname === '127.0.0.1' || location.protocol === 'file:';
  const API_BASE = isLocal ? 'http://localhost:3000' : 'https://attendance-app-irf1.onrender.com';

  // URLパラメータ ?mode=admin が付いている場合は管理者モードとして扱う
  // admin.html からのリンクにのみ付与されるため、スタッフが直接URLを書き換えない限り
  // スタッフには編集系ボタンが表示されない
  const IS_ADMIN = new URLSearchParams(location.search).get('mode') === 'admin';

  // ===== 状態管理 =====
  let allCustomers    = [];   // 全利用者 { recordId, office, name, lastName, firstName, ... }
  let offices         = [];   // 事業所一覧（ソート済み）
  let activeOffice    = '';   // 選択中の事業所
  let activeRecordId  = '';   // 選択中の利用者 recordId（= 顧客テーブルの record_id）
  let activeDetailTab = 'basic'; // 選択中の詳細タブ
  const detailCache   = {};   // 詳細データのキャッシュ { [recordId]: detailData }
  // サブテーブルのレコードID（追加・編集・削除操作で使用する。利用者切り替え時に更新する）
  let activeYakuRecordId  = null; // 薬手帳
  let activeKiouRecordId  = null; // 既往歴
  let activeFaceRecordId  = null; // フェイスシート・退院時資料
  let activeCustomerName  = '';   // 選択中利用者の氏名（関係先・既往歴の新規作成時に使用する）
  // モーダルの保存ボタンに割り当てるコールバック関数
  let modalSubmitFn = null;

  // ===== 日付フォーマット（ミリ秒タイムスタンプ → 年月日） =====
  function fmtDate(ts) {
    if (!ts) return '―';
    const d = new Date(Number(ts));
    return `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日`;
  }

  // ===== ファイルサイズフォーマット =====
  function fmtSize(bytes) {
    if (!bytes) return '';
    if (bytes >= 1024 * 1024) return (bytes / 1024 / 1024).toFixed(1) + ' MB';
    return Math.round(bytes / 1024) + ' KB';
  }

  // ===== ファイルプロキシURLを生成する =====
  function proxyUrl(url, opts = {}) {
    const base = `${API_BASE}/api/file-proxy?url=${encodeURIComponent(url)}`;
    if (opts.download && opts.name) {
      return `${base}&download=1&name=${encodeURIComponent(opts.name)}`;
    }
    return base;
  }

  // ===== 初期化 =====
  async function init() {
    try {
      const res  = await fetch(`${API_BASE}/api/customer-info/list`);
      const data = await res.json();
      if (!data.ok) throw new Error(data.error);

      allCustomers = data.customers;
      offices      = data.offices;

      buildOfficeTabs();
      // 最初の事業所を選択する
      if (offices.length > 0) switchOffice(offices[0], /* noAutoSelect */ false);

      document.getElementById('initLoading').classList.add('hidden');
      document.getElementById('detailTabsWrap').classList.remove('hidden');
      document.getElementById('nameBarWrap').classList.remove('hidden');

    } catch (err) {
      document.getElementById('initLoading').innerHTML =
        `<div style="color:#c1121f"><i class="fa-solid fa-circle-exclamation"></i> 読み込みに失敗しました<br><small>${err.message}</small></div>`;
    }
  }

  // ===== 事業所タブを生成する（ラベル＋タブボタン） =====
  function buildOfficeTabs() {
    const bar = document.getElementById('officeTabs');
    bar.innerHTML = '';
    // セクションラベルを先頭に追加する
    const label = document.createElement('span');
    label.className = 'office-tabs-label';
    label.innerHTML = '<i class="fa-solid fa-address-card"></i> 利用者情報';
    bar.appendChild(label);
    offices.forEach(office => {
      const btn = document.createElement('button');
      btn.className   = 'office-tab';
      btn.textContent = office;
      btn.onclick     = () => switchOffice(office, false);
      bar.appendChild(btn);
    });
  }

  // ===== 事業所を切り替える =====
  function switchOffice(office, skipAutoSelect) {
    activeOffice = office;
    document.querySelectorAll('.office-tab').forEach(btn => {
      btn.classList.toggle('active', btn.textContent.trim() === office);
    });
    buildNameSelect();
    // 最初の利用者を自動選択する
    const officeCustomers = getOfficeCustomers();
    if (!skipAutoSelect && officeCustomers.length > 0) {
      switchCustomer(officeCustomers[0].recordId);
    }
  }

  // ===== 選択中の事業所の利用者一覧を返す（フリガナ順） =====
  function getOfficeCustomers() {
    return allCustomers
      .filter(c => c.office === activeOffice)
      .sort((a, b) => {
        const ka = (a.lastNameKana + a.firstNameKana) || (a.lastName + a.firstName);
        const kb = (b.lastNameKana + b.firstNameKana) || (b.lastName + b.firstName);
        return ka.localeCompare(kb, 'ja');
      });
  }

  // ===== 氏名セレクトを再生成する =====
  function buildNameSelect() {
    const sel       = document.getElementById('nameSelect');
    sel.innerHTML   = '<option value="">氏名を選択</option>';
    const customers = getOfficeCustomers();

    customers.forEach(c => {
      const opt = document.createElement('option');
      opt.value       = c.recordId;
      const dispName  = `${c.lastName} ${c.firstName}`.trim() || c.name;
      // 契約終了の利用者は視覚的に区別するため括弧付きで表示する
      opt.textContent = c.status === '終了' ? `${dispName}（終了）` : dispName;
      sel.appendChild(opt);
    });
  }

  // ===== 氏名セレクト変更時のハンドラ =====
  function onNameSelectChange() {
    const recordId = document.getElementById('nameSelect').value;
    if (recordId) switchCustomer(recordId);
  }

  // ===== 利用者を切り替える =====
  async function switchCustomer(recordId) {
    activeRecordId = recordId;

    // セレクトボックスの選択状態を更新する
    const sel = document.getElementById('nameSelect');
    if (sel) sel.value = recordId;

    // キャッシュ済みなら即座に描画する
    if (detailCache[recordId]) {
      renderAllPanes(detailCache[recordId]);
      return;
    }

    // 未取得の場合はAPIから取得する
    showDetailLoading(true);
    try {
      const res  = await fetch(`${API_BASE}/api/customer-info/detail?recordId=${encodeURIComponent(recordId)}`);
      const data = await res.json();
      if (!data.ok) throw new Error(data.error);

      detailCache[recordId] = data;
      renderAllPanes(data);

    } catch (err) {
      showDetailLoading(false);
      document.getElementById('paneBasic').classList.remove('hidden');
      document.getElementById('paneBasic').innerHTML =
        `<div class="empty-msg"><i class="fa-solid fa-circle-exclamation"></i>取得に失敗しました<br><small>${err.message}</small></div>`;
    }
  }

  // ===== ローディング表示切り替え =====
  function showDetailLoading(show) {
    const PANES = ['basic','history','relation','medicine','doc'];
    PANES.forEach(p => document.getElementById('pane' + capitalize(p)).classList.add('hidden'));
    document.getElementById('detailLoading').classList.toggle('hidden', !show);
  }

  // ===== 全パネルを描画して現在タブを表示する =====
  function renderAllPanes(data) {
    document.getElementById('detailLoading').classList.add('hidden');
    // サブテーブルのレコードIDをグローバルに保持して追加・編集・削除操作で参照する
    activeYakuRecordId = data.yakuRecordId  || null;
    activeKiouRecordId = data.kiouRecordId  || null;
    activeFaceRecordId = data.faceRecordId  || null;
    // 選択中利用者の氏名を保持する（新規レコード作成時に使用する）
    const cust = allCustomers.find(c => c.recordId === activeRecordId);
    activeCustomerName = cust
      ? (`${cust.lastName} ${cust.firstName}`.trim() || cust.name)
      : '';
    renderBasic(data.customer);
    renderHistory(data.history);
    renderRelations(data.relations);
    renderMedicine(data.medicinePhotos);
    renderDocs(data.faceSheets, data.dischargeFiles);
    // 現在タブのパネルだけ表示し、FABを更新する
    showPane(activeDetailTab);
    updateInfoFab();
  }

  // ===== ファイル選択後に画像をアップロードする =====
  async function onMedicineFileSelected(input) {
    const file = input.files[0];
    if (!file) return;
    input.value = ''; // 同じファイルを再選択できるようリセットする

    const btn = document.getElementById('medicineAddBtn');
    if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 送信中...'; }

    try {
      // FileReaderでbase64に変換する
      const base64 = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload  = e => resolve(e.target.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });

      // 選択中の利用者名を取得する
      const customer = allCustomers.find(c => c.recordId === activeRecordId);
      const customerName = customer ? (`${customer.lastName} ${customer.firstName}`.trim() || customer.name) : '';

      const res  = await fetch(`${API_BASE}/api/medicine/add-photo`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ yakuRecordId: activeYakuRecordId, customerName, photoBase64: base64 }),
      });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error);

      // 新規作成の場合は取得したレコードIDを保持する
      activeYakuRecordId = data.yakuRecordId;
      // キャッシュを破棄して再取得・再描画する
      delete detailCache[activeRecordId];
      await switchCustomer(activeRecordId);

    } catch (err) {
      alert(`写真の追加に失敗しました\n${err.message}`);
      if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-camera"></i> 写真を追加'; }
    }
  }

  // ===== 薬手帳写真を削除する =====
  async function deleteMedicinePhoto(fileToken, btnEl) {
    if (!confirm('この写真を削除しますか？')) return;
    btnEl.disabled = true;

    try {
      const res  = await fetch(`${API_BASE}/api/medicine/delete-photo`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ yakuRecordId: activeYakuRecordId, fileToken }),
      });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error);

      // キャッシュを破棄して再取得・再描画する
      delete detailCache[activeRecordId];
      await switchCustomer(activeRecordId);

    } catch (err) {
      alert(`削除に失敗しました\n${err.message}`);
      btnEl.disabled = false;
    }
  }

  // タイムスタンプを date input 用の YYYY-MM-DD 文字列に変換する

    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function inp(id, label, value, type='text') {

    return `<div class="form-group">

      <select id="${id}" class="form-input"><option value=""></option>${opts}</select>

  }

          lastName:       g('editLastName'),      firstName:       g('editFirstName'),
          lastNameKana:   g('editLastNameKana'),  firstNameKana:   g('editFirstNameKana'),

          fam1Relationship: g('editFam1Relationship'), fam1Phone:   g('editFam1Phone'),
          fam1Address:    g('editFam1Address'),
          fam2LastName:   g('editFam2LastName'),  fam2FirstName:   g('editFam2FirstName'),
          fam2LastNameKana: g('editFam2LastNameKana'), fam2FirstNameKana: g('editFam2FirstNameKana'),
          fam2Relationship: g('editFam2Relationship'), fam2Phone:   g('editFam2Phone'),
          reportEmail:    g('editReportEmail'),   mailAddress:     g('editMailAddress'),
        }),
      });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error);
      delete detailCache[activeRecordId];
      closeModal();
      await switchCustomer(activeRecordId);
    } catch (err) {
      alert(`保存に失敗しました\n${err.message}`);
      setModalSaving(false);
    }
  }

  // ============================================================
  // 既往歴 追加・削除
  // ============================================================

  function openAddHistoryModal() {
    openModal('既往歴を追加', `
      <div class="form-group">
        <label class="form-label">病名・診断名</label>
        <input type="text" id="historyInput" class="form-input" placeholder="例：高血圧、糖尿病">
      </div>`, submitAddHistory);
  }

  async function submitAddHistory() {
    const val = document.getElementById('historyInput')?.value.trim();
    if (!val) return alert('入力してください');
    const current = (detailCache[activeRecordId]?.history || []);
    if (current.length >= 15) return alert('既往歴は最大15件です');
    await saveHistoryList([...current, val]);
  }

  async function deleteHistoryItem(index) {
    if (!confirm('この既往歴を削除しますか？')) return;
    const newList = (detailCache[activeRecordId]?.history || []).filter((_, i) => i !== index);
    await saveHistoryList(newList);
  }

  async function saveHistoryList(historyList) {
    setModalSaving(true);
    try {
      const res  = await fetch(`${API_BASE}/api/kiou/save`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ kiouRecordId: activeKiouRecordId, customerName: activeCustomerName, historyList }),
      });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error);
      if (data.kiouRecordId) activeKiouRecordId = data.kiouRecordId;
      delete detailCache[activeRecordId];
      closeModal();
      await switchCustomer(activeRecordId);
    } catch (err) {
      alert(`保存に失敗しました\n${err.message}`);
      setModalSaving(false);
    }
  }

  // ============================================================
  // 関係先 追加・編集・削除
  // ============================================================

  function relationFormHtml(r = {}) {
    return `
      ${inp('relOfficeName', '事業所名・施設名', r.officeName || '')}
      ${inp('relRelation',   '関係性（例：主治医、ケアマネ）', r.relation || '')}
      ${inp('relPerson',     '担当者名', r.person || '')}
      ${inp('relTel',        '電話番号', r.tel || '', 'tel')}
      ${inp('relFax',        'FAX番号',  r.fax || '', 'tel')}`;
  }

  function openAddRelationModal() {
    openModal('関係先を追加', relationFormHtml(), submitAddRelation);
  }

  function openEditRelationModal(r) {
    openModal('関係先を編集', relationFormHtml(r), () => submitEditRelation(r.recordId));
  }

  async function submitAddRelation() {
    setModalSaving(true);
    const g = id => document.getElementById(id)?.value || '';
    try {
      const res  = await fetch(`${API_BASE}/api/kankei/add`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          customerName: activeCustomerName,
          officeName: g('relOfficeName'), relation: g('relRelation'),
          person: g('relPerson'), tel: g('relTel'), fax: g('relFax'),
        }),
      });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error);
      delete detailCache[activeRecordId];
      closeModal();
      await switchCustomer(activeRecordId);
    } catch (err) {
      alert(`保存に失敗しました\n${err.message}`);
      setModalSaving(false);
    }
  }

  async function submitEditRelation(recordId) {
    setModalSaving(true);
    const g = id => document.getElementById(id)?.value || '';
    try {
      const res  = await fetch(`${API_BASE}/api/kankei/update`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          recordId,
          officeName: g('relOfficeName'), relation: g('relRelation'),
          person: g('relPerson'), tel: g('relTel'), fax: g('relFax'),
        }),
      });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error);
      delete detailCache[activeRecordId];
      closeModal();
      await switchCustomer(activeRecordId);
    } catch (err) {
      alert(`保存に失敗しました\n${err.message}`);
      setModalSaving(false);
    }
  }

  async function deleteRelation(recordId) {
    if (!confirm('この関係先を削除しますか？')) return;
    try {
      const res  = await fetch(`${API_BASE}/api/kankei/delete`, {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ recordId }),
      });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error);
      delete detailCache[activeRecordId];
      await switchCustomer(activeRecordId);
    } catch (err) {
      alert(`削除に失敗しました\n${err.message}`);
    }
  }

  // ============================================================
  // フェイスシート・退院時資料 ファイル追加・削除
  // ============================================================

  async function onFacesheetFileSelected(input, fieldName) {
    const file = input.files[0];
    if (!file) return;
    input.value = '';
    try {
      const base64 = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload  = e => resolve(e.target.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
      const res  = await fetch(`${API_BASE}/api/facesheet/add-file`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          faceRecordId: activeFaceRecordId,
          customerName: activeCustomerName,
          fileBase64: base64,
          fileName: file.name,
          fieldName,
        }),
      });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error);
      if (data.faceRecordId) activeFaceRecordId = data.faceRecordId;
      delete detailCache[activeRecordId];
      await switchCustomer(activeRecordId);
    } catch (err) {
      alert(`ファイルの追加に失敗しました\n${err.message}`);
    }
  }

  async function deleteFacesheetFile(fileToken, fieldName) {
    if (!confirm('このファイルを削除しますか？')) return;
    try {
      const res  = await fetch(`${API_BASE}/api/facesheet/delete-file`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ faceRecordId: activeFaceRecordId, fileToken, fieldName }),
      });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error);
      delete detailCache[activeRecordId];
      await switchCustomer(activeRecordId);
    } catch (err) {
      alert(`削除に失敗しました\n${err.message}`);
    }
  }

  // ===== FAB の表示・ラベル・アイコンをアクティブタブに合わせて更新する =====
  function updateInfoFab() {
    const fab = document.getElementById('infoFab');
    if (!fab) return;
    if (!IS_ADMIN) { fab.classList.add('hidden'); return; }

    const icon  = document.getElementById('infoFabIcon');
    const label = document.getElementById('infoFabLabel');
    if (activeDetailTab === 'basic') {
      fab.classList.remove('hidden');
      icon.className = 'fa-solid fa-pen'; label.textContent = '編集';
    } else if (activeDetailTab === 'history' || activeDetailTab === 'relation') {
      fab.classList.remove('hidden');
      icon.className = 'fa-solid fa-plus'; label.textContent = '追加';
    } else {
      fab.classList.add('hidden');
    }
  }

  // ===== FAB クリック時に現在タブに応じたモーダルを開く =====
  function onInfoFabClick() {
    if (activeDetailTab === 'basic')    openEditBasicModal();
    else if (activeDetailTab === 'history')  openAddHistoryModal();
    else if (activeDetailTab === 'relation') openAddRelationModal();
  }

  // ===== 詳細タブを切り替える =====
  function switchDetailTab(name, btn) {
    activeDetailTab = name;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    showPane(name);
    updateInfoFab();
  }

  // ===== 指定タブのパネルのみ表示する =====
  function showPane(name) {
    const TABS = ['basic','history','relation','medicine','doc'];
    TABS.forEach(t => document.getElementById('pane' + capitalize(t)).classList.add('hidden'));
    document.getElementById('pane' + capitalize(name)).classList.remove('hidden');
  }

  // ===== ライトボックスを開く =====
  function openLightbox(src) {
    document.getElementById('lightboxImg').src = src;
    document.getElementById('lightbox').classList.remove('hidden');
  }

  // ===== ライトボックスを閉じる =====
  function closeLightbox() {
    document.getElementById('lightbox').classList.add('hidden');
    document.getElementById('lightboxImg').src = '';
  }

  // ===== HTMLエスケープ =====
  function escHtml(str) {
    return String(str || '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  // ===== 先頭文字を大文字にする =====
  function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

  document.addEventListener('DOMContentLoaded', init);
</script>
</body>
